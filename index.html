    // ─── HELPERS ──────────────────────────────────────────
    function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function makeEditable(value, fieldKey, charKey, tag = 'span', className = '') {
      const uniqueId = `editable-${charKey}-${fieldKey}-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
      const escaped = escapeHtml(String(value));
      if (tag === 'input') {
        return `<span class="editable-field"><input type="text" id="${uniqueId}" class="editable-text ${className}" value="${escaped}" data-field="${fieldKey}" data-char="${charKey}"><button class="pencil-btn" onclick="toggleEditField('${uniqueId}')" title="Edit">✎</button></span>`;
      }
      return `<span class="editable-field"><span id="${uniqueId}" class="editable-text ${className}" contenteditable="false" data-field="${fieldKey}" data-char="${charKey}">${escaped}</span><button class="pencil-btn" onclick="toggleEditField('${uniqueId}')" title="Edit">✎</button></span>`;
    }

    window.toggleEditField = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.contentEditable === 'true' || (el.tagName === 'INPUT' && !el.readOnly)) {
        if (el.tagName === 'INPUT') { el.readOnly = true; el.style.border = '1px solid transparent'; }
        else { el.contentEditable = 'false'; el.style.border = '1px solid transparent'; el.style.background = 'transparent'; }
      } else {
        if (el.tagName === 'INPUT') { el.readOnly = false; el.style.border = '1px solid rgba(160,140,220,0.6)'; el.focus(); }
        else { el.contentEditable = 'true'; el.style.border = '1px solid rgba(160,140,220,0.6)'; el.style.background = 'rgba(120,100,180,0.15)'; el.focus(); }
      }
    };

    function renderUsageCheckboxes(charKey, featureIndex, maxUses) {
      if (maxUses === "∞" || maxUses === "Passive" || !maxUses || maxUses === 0) return '';
      const num = parseInt(maxUses);
      if (isNaN(num) || num <= 0 || num > 20) return '';
      const storageKey = `uses-${charKey}-feat-${featureIndex}`;
      let usedCount = parseInt(localStorage.getItem(storageKey) || '0');
      if (usedCount > num) usedCount = num;
      let boxes = '';
      for (let i = 0; i < num; i++) {
        boxes += `<span class="usage-checkbox${i < usedCount ? ' used' : ''}" onclick="toggleUsageCheckbox(this, '${storageKey}', ${num})" title="Use ${i+1}"></span>`;
      }
      return `<div class="usage-tracker"><span class="usage-label">Used:</span><div class="usage-checkboxes">${boxes}</div><button class="btn-reset-uses" onclick="resetUsage('${storageKey}', this)" title="Reset">↺</button></div>`;
    }

    window.toggleUsageCheckbox = function(el, storageKey, num) {
      const all = el.parentElement.querySelectorAll('.usage-checkbox');
      const idx = Array.from(all).indexOf(el);
      if (el.classList.contains('used')) {
        for (let i = all.length - 1; i >= idx; i--) all[i].classList.remove('used');
      } else {
        for (let i = 0; i <= idx; i++) all[i].classList.add('used');
      }
      let count = 0;
      all.forEach(b => { if (b.classList.contains('used')) count++; });
      localStorage.setItem(storageKey, count);
    };

    window.resetUsage = function(storageKey, btn) {
      localStorage.setItem(storageKey, '0');
      btn.parentElement.querySelectorAll('.usage-checkbox').forEach(b => b.classList.remove('used'));
    };

    // ─── ADD/REMOVE FUNCTIONS ────────────────────────────
    window.addSpell = function(charKey) {
      const input = document.getElementById(`newSpell-${charKey}`);
      if (!input || !input.value.trim()) return;
      const name = input.value.trim();
      db.ref(`characters/${charKey}/spells`).once('value').then(s => {
        const cur = s.val() || [];
        cur.push(name);
        return db.ref(`characters/${charKey}/spells`).set(cur);
      }).then(() => {
        const list = document.getElementById(`spellsList-${charKey}`);
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid rgba(100,80,160,0.2);';
        div.innerHTML = `<span class="editable-text" contenteditable="true" style="flex:1;">${escapeHtml(name)}</span><button class="pencil-btn" onclick="editItem(this,'${charKey}','spells')">✎</button><button class="btn-remove" onclick="removeItem(this,'${charKey}','spells','${escapeHtml(name)}')">✕</button>`;
        list.appendChild(div);
        input.value = '';
      });
    };

    window.addFeature = function(charKey) {
      const n = document.getElementById(`newFeatName-${charKey}`);
      const d = document.getElementById(`newFeatDesc-${charKey}`);

      db.ref(`characters/${charKey}/customFeatures`).once('value').then(s => {

        list.appendChild(div);
        n.value = ''; d.value = ''; u.value = '';

    window.removeItem = function(btn, charKey, category, name) {
      if (!confirm('Remove?')) return;
      db.ref(`characters/${charKey}/${category}`).once('value').then(s => {
        const items = s.val() || [];
        return db.ref(`characters/${charKey}/${category}`).set(items.filter(i => (typeof i === 'string' ? i !== name : i.name !== name)));
      }).then(() => btn.closest('div, li').remove());
    };

    window.editItem = function(btn, charKey, category) {
      const span = btn.parentElement.querySelector('.editable-text');
      if (!span) return;
      const oldVal = span.textContent;
      const input = document.createElement('input');
      input.type = 'text'; input.value = oldVal;
      input.style.cssText = 'flex:1;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.6);color:#e8e0ff;padding:0.3rem;border-radius:0.3rem;font-family:inherit;';
      span.replaceWith(input); input.focus();
      input.addEventListener('blur', () => {
        const newVal = input.value.trim() || oldVal;
        const newSpan = document.createElement('span');
        newSpan.className = 'editable-text'; newSpan.contentEditable = 'true'; newSpan.textContent = newVal; newSpan.style.flex = '1';
        input.replaceWith(newSpan);
        db.ref(`characters/${charKey}/${category}`).once('value').then(s => {
          const items = s.val() || [];
          return db.ref(`characters/${charKey}/${category}`).set(items.map(i => (typeof i === 'string' && i === oldVal) ? newVal : (i.name === oldVal ? {...i, name: newVal} : i)));
        });
      });
    };

    window.saveAllEdits = function(charKey) {
      const edits = {};
      document.querySelectorAll(`[data-char="${charKey}"][data-field]`).forEach(el => {
        edits[el.getAttribute('data-field')] = el.tagName === 'INPUT' ? el.value : el.textContent;
      });
      Object.entries(edits).forEach(([f, v]) => db.ref(`characters/${charKey}/${f}`).set(v));
      alert('Edits saved! ✦');
    };

    // ─── KEY FIX: LOAD WITH BASE DATA FIRST ──────────────
    function loadDynamicLists(charKey) {
      const c = characterData[charKey];
      if (!c) return;

      // Load spells: merge base spells from characterData with Firebase additions
      db.ref(`characters/${charKey}/spells`).once('value').then(snapshot => {
        const fbSpells = snapshot.val();
        // Use Firebase data if it exists, otherwise use base data
        const spells = (fbSpells && Array.isArray(fbSpells)) ? fbSpells : (c.spells || []);
        // If Firebase was empty, initialize it with base data
        if (!fbSpells) {
          db.ref(`characters/${charKey}/spells`).set(c.spells || []);
        }
        renderSpellsList(charKey, spells);
      });

      // Load equipment: merge base equipment with Firebase additions
      db.ref(`characters/${charKey}/equipment`).once('value').then(snapshot => {
        const fbEquip = snapshot.val();
        const equipment = (fbEquip && Array.isArray(fbEquip)) ? fbEquip : (c.equipment || []);
        if (!fbEquip) {
          db.ref(`characters/${charKey}/equipment`).set(c.equipment || []);
        }
        renderEquipmentList(charKey, equipment);
      });

      // Load custom features
      db.ref(`characters/${charKey}/customFeatures`).once('value').then(snapshot => {
        const feats = snapshot.val();
        if (feats && Array.isArray(feats)) {
          renderCustomFeatures(charKey, feats);
        }
      });
    }

    function renderSpellsList(charKey, spells) {
      const container = document.getElementById(`spellsList-${charKey}`);
      if (!container) return;
      const addForm = container.querySelector('.add-form');
      container.innerHTML = '';

        const div = document.createElement('div');
        div.style.cssText = 'display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid rgba(100,80,160,0.2);';
        div.innerHTML = `<span class="editable-text" contenteditable="true" style="flex:1;">${escapeHtml(spell)}</span><button class="pencil-btn" onclick="editItem(this,'${charKey}','spells')">✎</button><button class="btn-remove" onclick="removeItem(this,'${charKey}','spells','${escapeHtml(spell)}')">✕</button>`;
        container.appendChild(div);
      });
      if (addForm) container.appendChild(addForm);
    }

    function renderEquipmentList(charKey, equipment) {
      const container = document.getElementById(`equipList-${charKey}`);

      if (addForm) container.appendChild(addForm);

    function renderCustomFeatures(charKey, feats) {
      const container = document.getElementById(`featList-${charKey}`);
      if (!container) return;
      container.querySelectorAll('.custom-feature').forEach(el => el.remove());
      feats.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'ability-card custom-feature';
        div.innerHTML = `<div class="ability-name"><span class="editable-text" contenteditable="true">${escapeHtml(f.name)}</span>${f.cost ? `<span class="ability-cost">${escapeHtml(f.cost)}</span>` : ''}<button class="btn-remove" onclick="this.closest('.ability-card').remove();removeItem(this,'${charKey}','customFeatures','${escapeHtml(f.name)}')">✕</button></div><div class="ability-desc"><span class="editable-text" contenteditable="true">${escapeHtml(f.desc)}</span></div>${renderUsageCheckboxes(charKey, `custom-${i}`, f.uses)}`;
        container.appendChild(div);
      });
    }

    // ─── RENDER CHARACTER SHEET ──────────────────────────
    function renderCharacterSheet(charKey) {
      const c = characterData[charKey];
      if (!c) return '<p style="color:#c8b8f0;">Character not found.</p>';

      const statsHtml = Object.entries(c.stats).map(([name, data]) => {
        const modStr = data.mod >= 0 ? `+${data.mod}` : `${data.mod}`;
        const saveStr = data.save >= 0 ? `+${data.save}` : `${data.save}`;
        return `<div class="stat-box"><div class="stat-label">${name}</div><div class="stat-value">${makeEditable(data.score, `stat-${name}-score`, charKey)}</div><span class="stat-mod">${modStr}</span><div style="font-size:0.7rem;color:#9088c0;margin-top:0.2rem;">Save ${saveStr}</div></div>`;
      }).join('');

      const attacksHtml = c.attacks.map((a, i) => `<div class="attack-row"><span class="attack-name">⚔️ ${makeEditable(a.name, `atk-name-${i}`, charKey)}</span><span class="attack-bonus">${makeEditable(a.bonus, `atk-bonus-${i}`, charKey)}</span><span class="attack-damage">${makeEditable(a.damage, `atk-dmg-${i}`, charKey)}</span><span style="color:#a098d0;font-size:0.8rem;">${makeEditable(a.notes, `atk-notes-${i}`, charKey)}</span></div>`).join('');

      const featuresHtml = c.features.map((f, i) => `<div class="ability-card"><div class="ability-name">${makeEditable(f.name, `feat-name-${i}`, charKey)}${f.cost ? `<span class="ability-cost">${makeEditable(f.cost, `feat-cost-${i}`, charKey)}</span>` : ''}</div><div class="ability-desc">${makeEditable(f.desc, `feat-desc-${i}`, charKey)}</div>${renderUsageCheckboxes(charKey, i, f.uses)}</div>`).join('');

      const skillsHtml = c.skills ? Object.entries(c.skills).map(([name, bonus]) => `<div class="info-item"><span class="info-label">${name}</span><span class="info-value" style="float:right;">${bonus >= 0 ? '+' + bonus : bonus}</span></div>`).join('') : '';

      const spellSlotsHtml = c.spellSlots ? Object.entries(c.spellSlots).map(([level, count]) => `<div class="spell-slot"><div class="slot-level">${level}</div><div class="slot-count">${count}</div>${count !== "∞" ? renderUsageCheckboxes(charKey, `slot-${level}`, parseInt(count) || 0) : ''}</div>`).join('') : '';

      return `<div class="char-sheet">
        <div class="sheet-section"><div class="section-header"><span>📜 ${escapeHtml(c.name)}</span></div>
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Class</span><span class="info-value">${makeEditable(c.classLevel, 'classLevel', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Race</span><span class="info-value">${makeEditable(c.race, 'race', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Background</span><span class="info-value">${makeEditable(c.background, 'background', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Player</span><span class="info-value">${makeEditable(c.playerName, 'playerName', charKey, 'input', '')}</span></div>
          </div>
        </div>

        <div class="sheet-section"><div class="section-header">📊 ABILITY SCORES</div><div class="stat-row">${statsHtml}</div>
          <div class="info-grid" style="margin-top:0.8rem;">
            <div class="info-item"><span class="info-label">AC</span><span class="info-value">${makeEditable(c.combat.ac, 'ac', charKey)}</span></div>
            <div class="info-item"><span class="info-label">HP</span><span class="info-value">${makeEditable(c.combat.hp, 'hp', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Speed</span><span class="info-value">${makeEditable(c.combat.speed, 'speed', charKey)} ft.</span></div>
          </div>
        </div>

        ${skillsHtml ? `<div class="sheet-section"><div class="section-header">🎯 SKILLS</div><div class="info-grid">${skillsHtml}</div></div>` : ''}

        <div class="sheet-section"><div class="section-header">⚔️ ATTACKS</div>${attacksHtml}</div>

        ${spellSlotsHtml ? `<div class="sheet-section"><div class="section-header">🔮 SPELL SLOTS</div><div class="spell-slot-grid">${spellSlotsHtml}</div></div>` : ''}

        <div class="sheet-section"><div class="section-header"><span>📜 SPELLS</span></div><div id="spellsList-${charKey}"><p style="color:#9088c0;">Loading spells…</p></div>
          <div class="add-form"><input type="text" id="newSpell-${charKey}" placeholder="Spell name"><button class="btn-add" onclick="addSpell('${charKey}')">+ Add Spell</button></div>
        </div>

        <div class="sheet-section"><div class="section-header"><span>✨ FEATURES & ABILITIES</span></div><div id="featList-${charKey}">${featuresHtml}</div>
          <div class="add-form">
            <input type="text" id="newFeatName-${charKey}" placeholder="Ability name" style="flex:1;">
            <input type="text" id="newFeatDesc-${charKey}" placeholder="Description" style="flex:2;">
            <input type="text" id="newFeatUses-${charKey}" placeholder="Uses (# or ∞)" style="width:80px;">
            <button class="btn-add" onclick="addFeature('${charKey}')">+ Add Ability</button>
          </div>
        </div>

        <div class="sheet-section"><div class="section-header"><span>🎒 EQUIPMENT</span></div><ul class="equipment-list" id="equipList-${charKey}"><li style="color:#9088c0;">Loading equipment…</li></ul>
          <div class="add-form"><input type="text" id="newEquip-${charKey}" placeholder="Item name"><button class="btn-add" onclick="addEquipment('${charKey}')">+ Add Item</button></div>
        </div>

        <div class="sheet-section"><div class="section-header">📖 BACKSTORY</div><div style="color:#c0b8e8;">${makeEditable(c.backstory, 'backstory', charKey)}</div></div>

        <div style="text-align:center;"><button class="btn-save" onclick="saveAllEdits('${charKey}')">💾 Save Edits</button></div>
      </div>`;
    }

    function renderDMPage() {
      return `<div class="dm-pin-section"><h2 style="color:#d4c8ff;">🔐 DM Stargate</h2><p>Enter PIN:</p><input type="password" id="pinInput" class="dm-pin-input" maxlength="8"><br><button class="btn-save" id="pinSubmit">Unlock</button><p id="pinError" style="color:#e0a0c0;"></p><div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:2rem;"><div class="section-header" style="color:#d4c8ff;">🗝️ SECRETS</div>${Object.entries(dmSecrets).map(([k, s]) => `<div class="secret-box"><div class="secret-label">${characterData[k]?.name || k}</div><div class="secret-text">${s}</div></div>`).join('')}</div></div>`;
    }

    function setActiveTab(tabId) {
      ['drunken','chronurgy','grave','psi','dm'].forEach(id => {
        const btn = document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1));
        if (btn) btn.classList.remove('active');
      });
      const btn = document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1));
      if (btn) btn.classList.add('active');
    }

    function switchTab(tabId) {
      detachListener(); currentTab = tabId; setActiveTab(tabId);
      if (tabId === 'dm') {
        dmAuthenticated = false; contentPanel.innerHTML = renderDMPage();
        document.getElementById('pinSubmit').addEventListener('click', () => {
          if (document.getElementById('pinInput').value === DM_PIN) {
            dmAuthenticated = true;
            document.getElementById('dmSecretsContainer').style.display = 'block';
          } else { document.getElementById('pinError').innerText = 'Incorrect PIN.'; }
        });
      } else {
        contentPanel.innerHTML = renderCharacterSheet(tabId);
        setTimeout(() => loadDynamicLists(tabId), 150);
        dmAuthenticated = false;
      }
    }

    document.getElementById('tabDrunken').addEventListener('click', () => switchTab('drunken'));
    document.getElementById('tabChronurgy').addEventListener('click', () => switchTab('chronurgy'));
    document.getElementById('tabGrave').addEventListener('click', () => switchTab('grave'));
    document.getElementById('tabPsi').addEventListener('click', () => switchTab('psi'));
    document.getElementById('tabDM').addEventListener('click', () => switchTab('dm'));

    switchTab('drunken');
  })();
</script>
</body>
</html>
