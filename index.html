  // ─── HELPERS ──────────────────────────────────────────
  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function makeEditable(value, fieldKey, charKey) {
    return `<span class="editable-text" contenteditable="true" data-field="${fieldKey}" data-char="${charKey}" oninput="scheduleAutoSave('${charKey}')">${escapeHtml(String(value))}</span>`;
  }
  function renderUsageBoxes(charKey, featIdx, uses) {
    if (uses === "∞" || !uses || uses === 0) return '';
    const num = parseInt(uses); if (isNaN(num) || num > 20) return '';
    const key = `uses-${charKey}-feat-${featIdx}`;
    let used = parseInt(localStorage.getItem(key) || '0');
    let boxes = '';
    for (let i = 0; i < num; i++) boxes += `<span class="usage-checkbox${i < used ? ' used' : ''}" onclick="toggleUsage(this,'${key}',${num})"></span>`;
    return `<div style="margin-top:0.15rem;display:flex;align-items:center;gap:0.2rem;"><span style="font-size:0.55rem;color:#9088c0;">Used:</span>${boxes}<button class="btn-sm" onclick="resetOneUsage('${key}',this)">↺</button></div>`;
  }
  window.toggleUsage = function(el, key, num) {
    const all = el.parentElement.querySelectorAll('.usage-checkbox'), idx = Array.from(all).indexOf(el);
    if (el.classList.contains('used')) { for (let i = all.length-1; i >= idx; i--) all[i].classList.remove('used'); }
    else { for (let i = 0; i <= idx; i++) all[i].classList.add('used'); }
    let count = 0; all.forEach(b => { if (b.classList.contains('used')) count++; });
    localStorage.setItem(key, count);
  };
  window.resetOneUsage = function(key, btn) { localStorage.setItem(key, '0'); btn.parentElement.querySelectorAll('.usage-checkbox').forEach(b => b.classList.remove('used')); };
  window.resetAllByType = function(charKey, type) {
    characterData[charKey]?.features?.forEach((f, i) => { if (f.resetOn === type || type === 'long') localStorage.setItem(`uses-${charKey}-feat-${i}`, '0'); });
    switchTab(charKey);
  };
  function scheduleAutoSave(charKey) { if (autoSaveTimers[charKey]) clearTimeout(autoSaveTimers[charKey]); autoSaveTimers[charKey] = setTimeout(() => saveAllEdits(charKey), 3000); }
  function saveAllEdits(charKey) { const edits = {}; document.querySelectorAll(`[data-char="${charKey}"]`).forEach(el => edits[el.getAttribute('data-field')] = el.textContent.trim()); Object.entries(edits).forEach(([f, v]) => { db.ref(`characters/${charKey}/${f}`).set(v); }); }
  function addToChangeLog(charKey, field, value) { changeLog.unshift({ time: new Date().toLocaleTimeString(), char: characterData[charKey]?.name || charKey, field, value: value.substring(0, 50) }); if (changeLog.length > 10) changeLog = changeLog.slice(0, 10); db.ref('changeLog').set(changeLog); }

  // ─── SPELL DETAIL TOGGLE ──────────────────────────────
  window.toggleSpellDetail = function(spellName, charKey, element) {
    const detailId = `spell-detail-${charKey}-${spellName.replace(/[^a-zA-Z0-9]/g,'')}`;
    const detailPanel = document.getElementById(detailId);
    const wasOpen = detailPanel.classList.contains('open');
    document.querySelectorAll(`.spell-detail-panel[data-char="${charKey}"]`).forEach(p => p.classList.remove('open'));
    document.querySelectorAll(`.spell-item-bar[data-char="${charKey}"]`).forEach(b => b.classList.remove('active'));
    if (!wasOpen) { 
      detailPanel.classList.add('open'); 
      element.classList.add('active'); 
      const spell = spellDatabase[spellName]; 
      if (spell) { 
        detailPanel.innerHTML = `<strong style="color:#d4c8ff;">${spellName}</strong><span class="spell-level-badge">Level ${spell.level}</span> · ${spell.school || ''}${spell.castingTime ? `<div style="margin-top:0.2rem;"><span style="color:#9088c0;">Casting Time:</span> ${spell.castingTime} | <span style="color:#9088c0;">Range:</span> ${spell.range} | <span style="color:#9088c0;">Duration:</span> ${spell.duration}</div>` : ''}<div style="margin-top:0.3rem;color:#c0b8e8;line-height:1.4;">${spell.desc}</div>`; 
      }
    }
  };

  function getFilteredSpellOptions(charKey) {
    const allowedClasses = classSpellMap[charKey] || [];
    const entries = Object.entries(spellDatabase).filter(([name, data]) => data.classes && data.classes.some(c => allowedClasses.includes(c)));
    entries.sort((a, b) => { const la = typeof a[1].level === 'number' ? a[1].level : 99; const lb = typeof b[1].level === 'number' ? b[1].level : 99; return la - lb || a[0].localeCompare(b[0]); });
    return entries.map(([name, data]) => `<option value="${name}">Level ${data.level} — ${name}</option>`).join('');
  }

  window.showSpellInfo = function(charKey) { const select = document.getElementById(`spellSelect-${charKey}`), info = document.getElementById(`spellInfo-${charKey}`); if (!select || !info) return; const name = select.value; if (!name) { info.style.display = 'none'; return; } const spell = spellDatabase[name]; info.style.display = 'block'; info.innerHTML = spell ? `<strong style="color:#d4c8ff;">${name}</strong><span class="spell-level-badge">Level ${spell.level}</span><div style="color:#c0b8e8;margin-top:0.2rem;">${spell.desc}</div>` : '<p>No description.</p>'; };
  window.addSpellFromDropdown = function(charKey) { const select = document.getElementById(`spellSelect-${charKey}`); if (!select?.value) return; const name = select.value; db.ref(`characters/${charKey}/spells`).once('value').then(s => { const cur = s.val() || []; if (!cur.includes(name)) { cur.push(name); return db.ref(`characters/${charKey}/spells`).set(cur); } }).then(() => { loadDynamicLists(charKey); select.value = ''; document.getElementById(`spellInfo-${charKey}`).style.display = 'none'; }); };

  window.addEquipment = function(charKey) { const input = document.getElementById(`newEquip-${charKey}`); if (!input?.value.trim()) return; const name = input.value.trim(); db.ref(`characters/${charKey}/equipment`).once('value').then(s => { const cur = s.val() || []; cur.push(name); return db.ref(`characters/${charKey}/equipment`).set(cur); }).then(() => { loadDynamicLists(charKey); input.value = ''; }); };
  window.addFeature = function(charKey) { const n = document.getElementById(`newFeatName-${charKey}`), d = document.getElementById(`newFeatDesc-${charKey}`), u = document.getElementById(`newFeatUses-${charKey}`); if (!n?.value.trim()) return; const feat = { name: n.value.trim(), desc: d.value.trim() || 'New', cost: u.value.trim() || 'Passive', uses: u.value.trim() || 0, resetOn: 'none' }; db.ref(`characters/${charKey}/customFeatures`).once('value').then(s => { const cur = s.val() || []; cur.push(feat); return db.ref(`characters/${charKey}/customFeatures`).set(cur); }).then(() => { loadDynamicLists(charKey); n.value = ''; d.value = ''; u.value = ''; }); };
  window.removeItem = function(btn, charKey, category, name) { if (!confirm('Remove?')) return; db.ref(`characters/${charKey}/${category}`).once('value').then(s => { const items = s.val() || []; return db.ref(`characters/${charKey}/${category}`).set(items.filter(i => (typeof i === 'string' ? i !== name : i.name !== name))); }).then(() => { btn.closest('.spell-item-bar, li').remove(); }); };

  // ─── NOTES (FIXED) ────────────────────────────────────
  window.addCharNote = function(charKey) {
    const input = document.getElementById(`charNoteInput-${charKey}`);
    if (!input || !input.value.trim()) return;
    const noteText = input.value.trim();
    const noteRef = db.ref(`characterNotes/${charKey}`);
    noteRef.once('value').then(snapshot => {
      const notes = snapshot.val() || [];
      notes.unshift({ id: Date.now(), text: noteText, time: new Date().toLocaleString() });
      return noteRef.set(notes);
    }).then(() => {
      input.value = '';
      loadCharNotes(charKey);
    }).catch(err => { console.error('Note save error:', err); });
  };

  window.removeCharNote = function(charKey, noteId) {
    if (!confirm('Delete this note?')) return;
    db.ref(`characterNotes/${charKey}`).once('value').then(s => {
      const notes = s.val() || [];
      return db.ref(`characterNotes/${charKey}`).set(notes.filter(n => n.id !== noteId));
    }).then(() => loadCharNotes(charKey));
  };

  function loadCharNotes(charKey) {
    const container = document.getElementById(`charNotes-${charKey}`);
    if (!container) return;
    db.ref(`characterNotes/${charKey}`).once('value').then(s => {
      const notes = s.val() || [];
      if (notes.length === 0) {
        container.innerHTML = '<p style="color:#9088c0;font-size:0.75rem;">No notes yet. Add one below!</p>';
      } else {
        container.innerHTML = notes.map(n => `
          <div class="char-note-card">
            <div>
              <div class="char-note-text">${escapeHtml(n.text)}</div>
              <div class="char-note-time">${n.time}</div>
            </div>
            <button class="btn-remove" onclick="removeCharNote('${charKey}',${n.id})">✕</button>
          </div>`).join('');
      }
    }).catch(err => {
      console.error('Note load error:', err);
      container.innerHTML = '<p style="color:#e0a0a0;font-size:0.75rem;">Error loading notes.</p>';
    });
  }

  // ─── SESSION NOTES ────────────────────────────────────
  window.addSessionNote = function() { const dt = document.getElementById('sessionDate'), ti = document.getElementById('sessionTitle'), nt = document.getElementById('sessionNotes'); if (!ti?.value.trim()) return; const note = { id: Date.now(), date: dt?.value || new Date().toISOString().split('T')[0], title: ti.value.trim(), notes: nt?.value.trim() || '' }; db.ref('sessionNotes').once('value').then(s => { const notes = s.val() || []; notes.push(note); return db.ref('sessionNotes').set(notes); }).then(() => { sessionNotes.push(note); renderSessionNotes(); dt.value = ''; ti.value = ''; nt.value = ''; }); };
  window.addBulletToForm = function() { const nt = document.getElementById('sessionNotes'); if (!nt) return; const pos = nt.selectionStart; nt.value = nt.value.substring(0, pos) + '\n• ' + nt.value.substring(pos); nt.focus(); nt.selectionStart = nt.selectionEnd = pos + 3; };
  window.removeSessionNote = function(id) { if (!confirm('Delete?')) return; db.ref('sessionNotes').once('value').then(s => { const notes = s.val() || []; return db.ref('sessionNotes').set(notes.filter(n => n.id !== id)); }).then(() => { sessionNotes = sessionNotes.filter(n => n.id !== id); renderSessionNotes(); }); };
  function renderSessionNotes() { const container = document.getElementById('sessionNotesContainer'); if (!container) return; let allNotes = [...sessionNotes]; if (!allNotes.find(n => n.id === 'session0')) allNotes.unshift(sessionZero); container.innerHTML = allNotes.sort((a,b) => new Date(b.date) - new Date(a.date)).map(note => { const bullets = note.notes ? note.notes.split('\n').filter(l => l.trim()) : []; return `<div class="session-note-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.4rem;border-bottom:1px solid rgba(140,160,200,0.3);padding-bottom:0.3rem;margin-bottom:0.4rem;"><span style="color:#b8c8e0;font-size:0.7rem;background:rgba(60,80,140,0.4);padding:0.15rem 0.4rem;border-radius:0.4rem;">📅 ${note.date}</span><span style="color:#d4d8ff;font-weight:bold;">${escapeHtml(note.title)}</span>${note.id !== 'session0' ? `<button class="btn-remove" onclick="removeSessionNote(${note.id})">✕</button>` : ''}</div>${bullets.length ? '<ul style="list-style:none;padding:0;">'+bullets.map(b => `<li style="padding:0.15rem 0;color:#c0c8e8;font-size:0.8rem;">• ${escapeHtml(b.replace(/^•\s*/,''))}</li>`).join('')+'</ul>' : '<p style="color:#9088c0;font-size:0.75rem;">No details.</p>'}</div>`; }).join(''); }

  // ─── LOAD LISTS ───────────────────────────────────────
  function loadDynamicLists(charKey) { const c = characterData[charKey]; if (!c) return; db.ref(`characters/${charKey}/spells`).once('value').then(s => { const spells = s.val() || c.spells || []; if (!s.val()) db.ref(`characters/${charKey}/spells`).set(c.spells || []); renderSpells(charKey, spells); }); db.ref(`characters/${charKey}/equipment`).once('value').then(s => { const equip = s.val() || c.equipment || []; if (!s.val()) db.ref(`characters/${charKey}/equipment`).set(c.equipment || []); renderEquipment(charKey, equip); }); db.ref(`characters/${charKey}/customFeatures`).once('value').then(s => { const feats = s.val(); if (feats && Array.isArray(feats)) renderCustomFeats(charKey, feats); }); loadCharNotes(charKey); }

  function renderSpells(charKey, spells) { const container = document.getElementById(`spellsList-${charKey}`); if (!container) return; const addForm = container.querySelector('.add-form'), dropdown = container.querySelector('.spell-dropdown-section'); container.innerHTML = ''; const allowedClasses = classSpellMap[charKey] || []; const currentLevel = parseInt(characterData[charKey]?.classLevel?.match(/\d+/)?.[0]) || 10; const maxSpellLevel = currentLevel >= 17 ? 9 : Math.ceil(currentLevel/2);
    spells.forEach(spellName => { const spellInfo = spellDatabase[spellName]; const detailId = `spell-detail-${charKey}-${spellName.replace(/[^a-zA-Z0-9]/g,'')}`; const div = document.createElement('div'); div.className = 'spell-item-bar'; div.setAttribute('data-char', charKey); div.innerHTML = `<div class="spell-content" onclick="toggleSpellDetail('${escapeHtml(spellName)}','${charKey}',this.parentElement)"><span class="editable-text" contenteditable="true">${escapeHtml(spellName)}</span>${spellInfo ? `<span class="spell-level-badge">Lvl ${spellInfo.level}</span>` : ''}</div><div class="spell-actions"><button class="btn-remove" onclick="event.stopPropagation();removeItem(this,'${charKey}','spells','${escapeHtml(spellName)}')">✕</button></div>`; container.appendChild(div); const detailDiv = document.createElement('div'); detailDiv.className = 'spell-detail-panel'; detailDiv.id = detailId; detailDiv.setAttribute('data-char', charKey); container.appendChild(detailDiv); });
    const futureClass = allowedClasses[0]; if (futureSpells[futureClass]) { const futureHeader = document.createElement('div'); futureHeader.style.cssText = 'margin-top:0.8rem;padding:0.3rem 0;border-top:1px dashed rgba(180,160,140,0.4);'; futureHeader.innerHTML = '<span style="color:#d8c8a0;font-size:0.75rem;font-weight:bold;">🔮 Future Spells</span>'; container.appendChild(futureHeader);
      Object.entries(futureSpells[futureClass]).forEach(([level, spellList]) => { const levelNum = parseInt(level); if (levelNum > maxSpellLevel) { spellList.forEach(fsn => { if (!spells.includes(fsn) && spellDatabase[fsn]) { const detailId = `spell-detail-${charKey}-${fsn.replace(/[^a-zA-Z0-9]/g,'')}`; const div = document.createElement('div'); div.className = 'spell-item-bar future-spell'; div.setAttribute('data-char', charKey); div.innerHTML = `<div class="spell-content" onclick="toggleSpellDetail('${escapeHtml(fsn)}','${charKey}',this.parentElement)"><span>${escapeHtml(fsn)}</span><span class="spell-level-badge">Lvl ${level}</span><span class="future-tag">future</span></div><div class="spell-actions"></div>`; container.appendChild(div); const detailDiv = document.createElement('div'); detailDiv.className = 'spell-detail-panel'; detailDiv.id = detailId; detailDiv.setAttribute('data-char', charKey); container.appendChild(detailDiv); } }); } }); } if (dropdown) container.appendChild(dropdown); if (addForm) container.appendChild(addForm); }

  function renderEquipment(charKey, items) { const container = document.getElementById(`equipList-${charKey}`); if (!container) return; const addForm = container.querySelector('.add-form'); container.innerHTML = ''; items.forEach(item => { const li = document.createElement('li'); li.innerHTML = `<span style="flex:1;">✦ <span class="editable-text" contenteditable="true">${escapeHtml(item)}</span></span><button class="btn-remove" onclick="removeItem(this,'${charKey}','equipment','${escapeHtml(item)}')">✕</button>`; container.appendChild(li); }); if (addForm) container.appendChild(addForm); }
  function renderCustomFeats(charKey, feats) { const container = document.getElementById(`featList-${charKey}`); if (!container) return; container.querySelectorAll('.custom-feature').forEach(el => el.remove()); feats.forEach((f, i) => { const div = document.createElement('div'); div.className = 'ability-card custom-feature'; div.innerHTML = `<div class="ability-name">${makeEditable(f.name, `customfeat-name-${i}`, charKey)}${f.cost ? `<span class="ability-cost">${escapeHtml(f.cost)}</span>` : ''}<button class="btn-remove" onclick="removeItem(this,'${charKey}','customFeatures','${escapeHtml(f.name)}')">✕</button></div><div class="ability-desc">${makeEditable(f.desc, `customfeat-desc-${i}`, charKey)}</div>${renderUsageBoxes(charKey, `custom-${i}`, f.uses)}`; container.appendChild(div); }); }

  // ─── RENDER ───────────────────────────────────────────
  function renderCharacterSheet(charKey) { const c = characterData[charKey]; if (!c) return '<p>Not found</p>'; const statsHtml = Object.entries(c.stats).map(([name, data]) => `<div class="stat-box"><div class="stat-label">${name}</div><div class="stat-value">${makeEditable(data.score, `stat-${name}-score`, charKey)}</div><span class="stat-mod">${data.mod >= 0 ? '+' + data.mod : data.mod}</span></div>`).join(''); const attacksHtml = c.attacks.map((a, i) => `<div style="display:flex;justify-content:space-between;padding:0.3rem;border-bottom:1px solid rgba(100,80,160,0.2);flex-wrap:wrap;gap:0.2rem;font-size:0.8rem;"><span style="font-weight:bold;color:#d4c8ff;">⚔️ ${makeEditable(a.name, `atk-name-${i}`, charKey)}</span><span style="color:#c8b8f0;">${makeEditable(a.bonus, `atk-bonus-${i}`, charKey)}</span><span style="color:#e8d8ff;">${makeEditable(a.damage, `atk-dmg-${i}`, charKey)}</span></div>`).join(''); const featuresHtml = c.features.map((f, i) => `<div class="ability-card"><div class="ability-name">${makeEditable(f.name, `feat-name-${i}`, charKey)}${f.cost ? `<span class="ability-cost">${f.cost}</span>` : ''}</div><div class="ability-desc">${makeEditable(f.desc, `feat-desc-${i}`, charKey)}</div>${renderUsageBoxes(charKey, i, f.uses)}</div>`).join(''); const skillsHtml = c.skills ? Object.entries(c.skills).map(([name, bonus]) => `<div class="info-item"><span class="info-label">${name}</span><span class="info-value" style="float:right;">${bonus >= 0 ? '+' + bonus : bonus}</span></div>`).join('') : ''; const spellSlotsHtml = c.spellSlots ? Object.entries(c.spellSlots).map(([level, count]) => `<div class="spell-slot"><div class="slot-level">${level}</div><div class="slot-count">${count}</div></div>`).join('') : ''; const passiveHtml = c.combat ? `<div class="info-grid" style="margin-top:0.3rem;">${c.combat.passivePerception ? `<div class="info-item"><span class="info-label">Pass. Perception</span><span class="info-value">${c.combat.passivePerception}</span></div>` : ''}${c.combat.passiveInvestigation ? `<div class="info-item"><span class="info-label">Pass. Investigation</span><span class="info-value">${c.combat.passiveInvestigation}</span></div>` : ''}${c.combat.passiveInsight ? `<div class="info-item"><span class="info-label">Pass. Insight</span><span class="info-value">${c.combat.passiveInsight}</span></div>` : ''}</div>` : ''; return `<div class="char-sheet"><div class="sheet-section"><div class="section-header"><span>📜 ${makeEditable(c.name, 'name', charKey)}</span><div><button class="btn-rest" onclick="resetAllByType('${charKey}','short')">🌅 Short</button><button class="btn-rest" onclick="resetAllByType('${charKey}','long')">🌙 Long</button></div></div><div class="info-grid"><div class="info-item"><span class="info-label">Class</span><span class="info-value">${makeEditable(c.classLevel, 'classLevel', charKey)}</span></div><div class="info-item"><span class="info-label">Race</span><span class="info-value">${makeEditable(c.race, 'race', charKey)}</span></div><div class="info-item"><span class="info-label">Background</span><span class="info-value">${makeEditable(c.background, 'background', charKey)}</span></div><div class="info-item"><span class="info-label">Player</span><span class="info-value">${makeEditable(c.playerName, 'playerName', charKey)}</span></div></div></div><div class="sheet-section"><div class="section-header">📊 ABILITY SCORES</div><div class="stat-row">${statsHtml}</div><div class="info-grid" style="margin-top:0.4rem;"><div class="info-item"><span class="info-label">AC</span><span class="info-value">${makeEditable(c.combat.ac, 'ac', charKey)}</span></div><div class="info-item"><span class="info-label">HP</span><span class="info-value">${makeEditable(c.combat.hp, 'hp', charKey)}</span></div><div class="info-item"><span class="info-label">Speed</span><span class="info-value">${makeEditable(c.combat.speed, 'speed', charKey)} ft.</span></div><div class="info-item"><span class="info-label">Init</span><span class="info-value">+${c.combat.initiative}</span></div></div>${passiveHtml}</div>${skillsHtml ? `<div class="sheet-section"><div class="section-header">🎯 SKILLS</div><div class="info-grid">${skillsHtml}</div></div>` : ''}<div class="sheet-section"><div class="section-header">⚔️ ATTACKS</div>${attacksHtml}</div>${spellSlotsHtml ? `<div class="sheet-section"><div class="section-header">🔮 SPELL SLOTS</div><div class="spell-slot-grid">${spellSlotsHtml}</div></div>` : ''}<div class="sheet-section"><div class="section-header">📜 SPELLS <span style="font-size:0.6rem;color:#9088c0;">Click name for details</span></div><div id="spellsList-${charKey}"></div><div class="spell-dropdown-section"><select id="spellSelect-${charKey}" onchange="showSpellInfo('${charKey}')"><option value="">— Browse spells —</option>${getFilteredSpellOptions(charKey)}</select><div id="spellInfo-${charKey}" class="spell-info-popup"></div><button class="btn-add" onclick="addSpellFromDropdown('${charKey}')" style="margin-top:0.3rem;">+ Add to List</button></div><div class="add-form"><input type="text" id="newSpell-${charKey}" placeholder="Custom spell..."><button class="btn-add" onclick="addSpell('${charKey}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">✨ FEATURES</div><div id="featList-${charKey}">${featuresHtml}</div><div class="add-form"><input type="text" id="newFeatName-${charKey}" placeholder="Name" style="flex:1;"><input type="text" id="newFeatDesc-${charKey}" placeholder="Desc" style="flex:2;"><input type="text" id="newFeatUses-${charKey}" placeholder="Uses" style="width:50px;"><button class="btn-add" onclick="addFeature('${charKey}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">🎒 EQUIPMENT</div><ul class="equipment-list" id="equipList-${charKey}"></ul><div class="add-form"><input type="text" id="newEquip-${charKey}" placeholder="Item"><button class="btn-add" onclick="addEquipment('${charKey}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">📖 BACKSTORY</div><div style="color:#c0b8e8;line-height:1.6;font-style:italic;font-size:0.8rem;">${makeEditable(c.backstory, 'backstory', charKey)}</div></div><div class="sheet-section"><div class="section-header">📝 PLAYER NOTES</div><div id="charNotes-${charKey}"><p style="color:#9088c0;font-size:0.75rem;">Loading notes...</p></div><div class="add-form" style="flex-wrap:nowrap;"><input type="text" id="charNoteInput-${charKey}" placeholder="Add a note..." style="flex:1;"><button class="btn-save-note" onclick="addCharNote('${charKey}')">Save Note</button></div></div></div>`; }

  function renderDMPage() { return `<div style="text-align:center;padding:0.5rem;"><h2 style="color:#d4c8ff;">🔐 DM Stargate</h2><p style="color:#a098d0;">Enter PIN:</p><input type="password" id="pinInput" style="background:rgba(20,15,40,0.7);border:2px solid rgba(140,120,220,0.5);color:#e8e0ff;padding:0.4rem 0.8rem;border-radius:0.3rem;font-size:1.1rem;text-align:center;letter-spacing:4px;margin:0.6rem 0;" maxlength="8"><br><button class="btn-rest" id="pinSubmit">Unlock</button><p id="pinError" style="color:#e0a0c0;"></p><div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:1rem;"><div class="section-header" style="color:#d4c8ff;">🗝️ SECRETS</div>${Object.entries(dmSecrets).map(([k,s]) => `<div style="border:2px dashed rgba(140,120,220,0.5);background:rgba(20,15,35,0.6);padding:0.6rem;border-radius:0.5rem;margin:0.5rem 0;"><div style="color:#d4c8ff;font-weight:bold;">${characterData[k]?.name||k}</div><div style="color:#c8b8f0;font-size:0.8rem;line-height:1.4;">${s}</div></div>`).join('')}<div class="section-header" style="color:#d4c8ff;">📋 CHANGE LOG</div><div class="change-log" id="changeLogContainer"></div><div class="section-header" style="color:#d4c8ff;">📝 SESSION NOTES</div><div style="border:2px dashed rgba(140,160,200,0.4);padding:0.8rem;margin:0.5rem 0;background:rgba(18,20,35,0.5);"><div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.4rem;"><div style="flex:1;"><input type="date" id="sessionDate" style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div><div style="flex:2;"><input type="text" id="sessionTitle" placeholder="Title..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div></div><div><button class="btn-sm" onclick="addBulletToForm()">• +</button><textarea id="sessionNotes" rows="4" placeholder="• Notes..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.4rem;resize:vertical;margin-top:0.2rem;"></textarea></div><button class="btn-add" onclick="addSessionNote()" style="width:100%;margin-top:0.3rem;">+ Save Note</button></div><div id="sessionNotesContainer"></div></div></div>`; }
  function renderChangeLog() { const c = document.getElementById('changeLogContainer'); if (!c) return; c.innerHTML = changeLog.length === 0 ? '<p style="color:#9088c0;">No changes.</p>' : changeLog.map(e => `<div class="log-entry">[${e.time}] <strong>${e.char}</strong> · ${e.field}: ${e.value}</div>`).join(''); }

  function setActiveTab(tabId) { ['dmpc','drunken','chronurgy','grave','psi','dm'].forEach(id => { const btn = document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1)); if (btn) btn.classList.remove('active'); }); const btn = document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1)); if (btn) btn.classList.add('active'); }
  function switchTab(tabId) { Object.values(autoSaveTimers).forEach(t => clearTimeout(t)); currentTab = tabId; setActiveTab(tabId); if (tabId === 'dm') { dmAuthenticated = false; contentPanel.innerHTML = renderDMPage(); document.getElementById('pinSubmit').addEventListener('click', () => { if (document.getElementById('pinInput').value === DM_PIN) { dmAuthenticated = true; document.getElementById('dmSecretsContainer').style.display = 'block'; db.ref('changeLog').once('value').then(s => { changeLog = s.val() || []; renderChangeLog(); }); db.ref('sessionNotes').once('value').then(s => { sessionNotes = s.val() || []; renderSessionNotes(); }); } }); } else { contentPanel.innerHTML = renderCharacterSheet(tabId); setTimeout(() => loadDynamicLists(tabId), 150); dmAuthenticated = false; } }

  document.getElementById('tabDmpc').addEventListener('click', () => switchTab('dmpc'));
  document.getElementById('tabDrunken').addEventListener('click', () => switchTab('drunken'));
  document.getElementById('tabChronurgy').addEventListener('click', () => switchTab('chronurgy'));
  document.getElementById('tabGrave').addEventListener('click', () => switchTab('grave'));
  document.getElementById('tabPsi').addEventListener('click', () => switchTab('psi'));
  document.getElementById('tabDM').addEventListener('click', () => switchTab('dm'));
  db.ref('changeLog').once('value').then(s => { changeLog = s.val() || []; });
  switchTab('dmpc');
})();
</script>
</body>
</html>
