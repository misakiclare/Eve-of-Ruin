    "Spiritual Weapon": { level: 2, school: "Evocation", castingTime: "1 bonus action", range: "60 ft", duration: "1 minute", classes: ["cleric"], desc: "You create a floating, spectral weapon within range. When you cast the spell, you can make a melee spell attack against a creature within 5 feet of the weapon. On a hit, the target takes force damage equal to 1d8 + your spellcasting ability modifier. As a bonus action on your turn, you can move the weapon up to 20 feet and repeat the attack." },
    "Hold Person": { level: 2, school: "Enchantment", castingTime: "1 action", range: "60 ft", duration: "Concentration, up to 1 minute", classes: ["cleric","wizard","sorcerer","bard"], desc: "Choose a humanoid that you can see within range. The target must succeed on a Wisdom saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another Wisdom saving throw. On a success, the spell ends on the target." },
    "Blindness/Deafness": { level: 2, school: "Necromancy", castingTime: "1 action", range: "30 ft", duration: "1 minute", classes: ["cleric","wizard","sorcerer","bard"], desc: "You can blind or deafen a foe. Choose one creature that you can see within range to make a Constitution saving throw. If it fails, the target is either blinded or deafened (your choice) for the duration. At the end of each of its turns, the target can make a Constitution saving throw. On a success, the spell ends." },
    "Spirit Guardians": { level: 3, school: "Conjuration", castingTime: "1 action", range: "Self (15-ft radius)", duration: "Concentration, up to 10 minutes", classes: ["cleric"], desc: "You call forth spirits to protect you. They flit around you to a distance of 15 feet for the duration. When you cast this spell, you can designate any number of creatures you can see to be unaffected by it. An affected creature's speed is halved in the area, and when the creature enters the area for the first time on a turn or starts its turn there, it must make a Wisdom saving throw. On a failed save, the creature takes 3d8 radiant damage (if you are good or neutral) or 3d8 necrotic damage (if you are evil). On a successful save, the creature takes half as much damage." },
    "Revivify": { level: 3, school: "Necromancy", castingTime: "1 action", range: "Touch", duration: "Instantaneous", classes: ["cleric","paladin"], desc: "You touch a creature that has died within the last minute. That creature returns to life with 1 hit point. This spell can't return to life a creature that has died of old age, nor can it restore any missing body parts." },
    "Speak with Dead": { level: 3, school: "Necromancy", castingTime: "1 action", range: "10 ft", duration: "10 minutes", classes: ["cleric"], desc: "You grant the semblance of life and intelligence to a corpse of your choice within range, allowing it to answer the questions you pose. The corpse must still have a mouth and can't be undead. The spell fails if the corpse was the target of this spell within the last 10 days. You can ask the corpse up to five questions. The corpse knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic, or repetitive." },
    "Death Ward": { level: 4, school: "Abjuration", castingTime: "1 action", range: "Touch", duration: "8 hours", classes: ["cleric","paladin"], desc: "You touch a creature and grant it a measure of protection from death. The first time the target would drop to 0 hit points as a result of taking damage, the target instead drops to 1 hit point, and the spell ends. If the spell is still in effect when the target is subjected to an effect that would kill it instantaneously without dealing damage, that effect is instead negated against the target, and the spell ends." },
    "Banishment": { level: 4, school: "Abjuration", castingTime: "1 action", range: "60 ft", duration: "Concentration, up to 1 minute", classes: ["cleric","paladin","wizard","sorcerer"], desc: "You attempt to send one creature that you can see within range to another plane of existence. The target must succeed on a Charisma saving throw or be banished. If the target is native to the plane of existence you're on, you banish the target to a harmless demiplane. While there, the target is incapacitated. The target remains there until the spell ends, at which point the target reappears in the space it left. If the target is native to a different plane of existence than the one you're on, the target is banished with a faint popping noise, returning to its home plane." },
    "Greater Restoration": { level: 5, school: "Abjuration", castingTime: "1 action", range: "Touch", duration: "Instantaneous", classes: ["cleric","druid","bard"], desc: "You imbue a creature you touch with positive energy to undo a debilitating effect. You can reduce the target's exhaustion level by one, or end one of the following effects on the target: One effect that charmed or petrified the target, One curse (including attunement to a cursed magic item), Any reduction to one of the target's ability scores, or One effect reducing the target's hit point maximum." },
    "Scrying": { level: 5, school: "Divination", castingTime: "10 minutes", range: "Self", duration: "Concentration, up to 10 minutes", classes: ["cleric","wizard","druid","bard"], desc: "You can see and hear a particular creature you choose that is on the same plane of existence as you. The target must make a Wisdom saving throw, which is modified by how well you know the target and the sort of physical connection you have to it. On a successful save, the target isn't affected, and you can't use this spell against it again for 24 hours." },
    "Mass Cure Wounds": { level: 5, school: "Evocation", castingTime: "1 action", range: "60 ft", duration: "Instantaneous", classes: ["cleric","druid","bard"], desc: "A wave of healing energy washes out from a point of your choice within range. Choose up to six creatures in a 30-foot-radius sphere centered on that point. Each target regains hit points equal to 3d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs." },
    // Wizard Spells
    "Shield": { level: 1, school: "Abjuration", castingTime: "1 reaction", range: "Self", duration: "1 round", classes: ["wizard","sorcerer"], desc: "An invisible barrier of magical force appears and protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from magic missile." },
    "Mage Armor": { level: 1, school: "Abjuration", castingTime: "1 action", range: "Touch", duration: "8 hours", classes: ["wizard","sorcerer"], desc: "You touch a willing creature who isn't wearing armor, and a protective magical force surrounds it until the spell ends. The target's base AC becomes 13 + its Dexterity modifier. The spell ends if the target dons armor or if you dismiss the spell as an action." },
    "Find Familiar": { level: 1, school: "Conjuration", castingTime: "1 hour", range: "10 ft", duration: "Instantaneous", classes: ["wizard"], desc: "You gain the service of a familiar, a spirit that takes an animal form you choose: bat, cat, crab, frog, hawk, lizard, octopus, owl, poisonous snake, fish, rat, raven, sea horse, spider, or weasel. Appearing in an unoccupied space within range, the familiar has the statistics of the chosen form, though it is a celestial, fey, or fiend (your choice) instead of a beast." },
    "Gift of Alacrity": { level: 1, school: "Divination", castingTime: "1 minute", range: "Touch", duration: "8 hours", classes: ["wizard"], desc: "You touch a willing creature. For the duration, the target can add 1d8 to its initiative rolls." },
    "Fortune's Favor": { level: 2, school: "Divination", castingTime: "1 minute", range: "60 ft", duration: "1 hour", classes: ["wizard"], desc: "You imbue a creature with a mote of luck. Once before the spell ends, the target can use the mote to reroll an ability check, attack roll, or saving throw. The target can decide to use the mote after seeing the d20 roll but before knowing the outcome. The spell then ends." },
    "Mirror Image": { level: 2, school: "Illusion", castingTime: "1 action", range: "Self", duration: "1 minute", classes: ["wizard","sorcerer"], desc: "Three illusory duplicates of yourself appear in your space. Until the spell ends, the duplicates move with you and mimic your actions, shifting position so it's impossible to track which image is real. Each time a creature targets you with an attack during the spell's duration, roll a d20 to determine whether the attack instead targets one of your duplicates." },
    "Counterspell": { level: 3, school: "Abjuration", castingTime: "1 reaction", range: "60 ft", duration: "Instantaneous", classes: ["wizard","sorcerer"], desc: "You attempt to interrupt a creature in the process of casting a spell. If the creature is casting a spell of 3rd level or lower, its spell fails and has no effect. If it is casting a spell of 4th level or higher, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a success, the creature's spell fails and has no effect." },
    "Haste": { level: 3, school: "Transmutation", castingTime: "1 action", range: "30 ft", duration: "Concentration, up to 1 minute", classes: ["wizard","sorcerer"], desc: "Choose a willing creature that you can see within range. Until the spell ends, the target's speed is doubled, it gains a +2 bonus to AC, it has advantage on Dexterity saving throws, and it gains an additional action on each of its turns. That action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or Use an Object action. When the spell ends, the target can't move or take actions until after its next turn, as a wave of lethargy sweeps over it." },
    "Slow": { level: 3, school: "Transmutation", castingTime: "1 action", range: "120 ft (40-ft cube)", duration: "Concentration, up to 1 minute", classes: ["wizard","sorcerer"], desc: "You alter time around up to six creatures of your choice in a 40-foot cube within range. An affected target's speed is halved, it takes a -2 penalty to AC and Dexterity saving throws, and it can't use reactions. On its turn, it can use either an action or a bonus action, not both. Regardless of the creature's abilities or magic items, it can't make more than one melee or ranged attack during its turn." },
    "Fireball": { level: 3, school: "Evocation", castingTime: "1 action", range: "150 ft (20-ft radius)", duration: "Instantaneous", classes: ["wizard","sorcerer"], desc: "A bright streak flashes from your pointing finger to a point you choose within range and then blossoms with a low roar into an explosion of flame. Each creature in a 20-foot-radius sphere centered on that point must make a Dexterity saving throw. A target takes 8d6 fire damage on a failed save, or half as much damage on a successful one. The fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried." },
    "Dimension Door": { level: 4, school: "Conjuration", castingTime: "1 action", range: "500 ft", duration: "Instantaneous", classes: ["wizard","sorcerer"], desc: "You teleport yourself from your current location to any other spot within range. You arrive at exactly the spot desired. It can be a place you can see, one you can visualize, or one you can describe by stating distance and direction. You can bring along one willing creature of your size or smaller who is carrying gear up to its carrying capacity. The creature must be within 5 feet of you when you cast this spell." },
    "Polymorph": { level: 4, school: "Transmutation", castingTime: "1 action", range: "60 ft", duration: "Concentration, up to 1 hour", classes: ["wizard","sorcerer"], desc: "This spell transforms a creature that you can see within range into a new form. An unwilling creature must make a Wisdom saving throw to avoid the effect. The transformation lasts for the duration, or until the target drops to 0 hit points or dies. The new form can be any beast whose challenge rating is equal to or less than the target's (or the target's level, if it doesn't have a challenge rating)." },
    "Wall of Force": { level: 5, school: "Evocation", castingTime: "1 action", range: "120 ft", duration: "Concentration, up to 10 minutes", classes: ["wizard"], desc: "An invisible wall of force springs into existence at a point you choose within range. The wall appears in any orientation you choose, as a horizontal or vertical barrier or at an angle. It can be free floating or resting on a solid surface. The wall is immune to all damage and can't be dispelled by Dispel Magic. A disintegrate spell destroys the wall instantly. Nothing can physically pass through the wall." },
    "Temporal Shunt": { level: 5, school: "Transmutation", castingTime: "1 reaction", range: "120 ft", duration: "1 round", classes: ["wizard"], desc: "You target one creature you can see within range and shunt it forward in time. The target vanishes, and it reappears at the end of your next turn in its original space or in the nearest unoccupied space. Until the end of your next turn, the target is removed from play entirely." },
    // Monk Abilities
    "Stunning Strike": { level: "Ki", school: "Monk", castingTime: "On hit", range: "Melee", duration: "Until end of next turn", classes: ["monk"], desc: "When you hit another creature with a melee weapon attack, you can spend 1 ki point to attempt a stunning strike. The target must succeed on a Constitution saving throw or be stunned until the end of your next turn." },
    "Flurry of Blows": { level: "Ki", school: "Monk", castingTime: "1 bonus action", range: "Self", duration: "Instantaneous", classes: ["monk"], desc: "Immediately after you take the Attack action on your turn, you can spend 1 ki point to make two unarmed strikes as a bonus action." },
    "Patient Defense": { level: "Ki", school: "Monk", castingTime: "1 bonus action", range: "Self", duration: "1 round", classes: ["monk"], desc: "You can spend 1 ki point to take the Dodge action as a bonus action on your turn." },
    "Step of the Wind": { level: "Ki", school: "Monk", castingTime: "1 bonus action", range: "Self", duration: "1 turn", classes: ["monk"], desc: "You can spend 1 ki point to take the Disengage or Dash action as a bonus action on your turn, and your jump distance is doubled for the turn." },
    "Deflect Missiles": { level: "Ki", school: "Monk", castingTime: "1 reaction", range: "Self", duration: "Instantaneous", classes: ["monk"], desc: "You can use your reaction to deflect or catch the missile when you are hit by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your monk level. If you reduce the damage to 0, you can catch the missile if it is small enough for you to hold in one hand and you have at least one hand free. If you catch a missile in this way, you can spend 1 ki point to make a ranged attack with the weapon or piece of ammunition you just caught, as part of the same reaction." },
    // Psi Warrior Abilities
    "Psionic Strike": { level: "Psi", school: "Psi Warrior", castingTime: "Free (once/turn)", range: "Self", duration: "Instantaneous", classes: ["psiwarrior"], desc: "Once on each of your turns, immediately after you hit a target with a weapon attack, you can expend one Psionic Energy die, rolling it and dealing force damage to the target equal to the number rolled plus your Intelligence modifier." },
    "Protective Field": { level: "Psi", school: "Psi Warrior", castingTime: "1 reaction", range: "30 ft", duration: "Instantaneous", classes: ["psiwarrior"], desc: "When you or another creature you can see within 30 feet of you takes damage, you can use your reaction to expend one Psionic Energy die, roll it, and reduce the damage taken by the number rolled plus your Intelligence modifier." },
    "Telekinetic Movement": { level: "Psi", school: "Psi Warrior", castingTime: "1 action", range: "30 ft", duration: "Instantaneous", classes: ["psiwarrior"], desc: "As an action, you can expend one Psionic Energy die to move one object or willing creature (up to Large size) up to 30 feet in any direction. The movement doesn't provoke opportunity attacks." },
    "Telekinetic Shove": { level: "Psi", school: "Psi Warrior", castingTime: "1 bonus action", range: "30 ft", duration: "Instantaneous", classes: ["psiwarrior"], desc: "As a bonus action, you can telekinetically shove one creature you can see within 30 feet. The target must succeed on a Strength saving throw (DC = 8 + proficiency bonus + Intelligence modifier) or be moved 5 feet toward or away from you, or knocked prone." }

    dmpc: { name: "Sylvara 'Syv' Mosswood", classLevel: "Ranger (Gloom Stalker) 5 / Rogue (Scout) 5", race: "Wood Elf", background: "Planar Cartographer (Wind Duke Archivist)", alignment: "Neutral Good", playerName: "DM (DMPC)", stats: { STR:{score:10,mod:0,save:4}, DEX:{score:20,mod:5,save:9}, CON:{score:14,mod:2,save:6}, INT:{score:12,mod:1,save:5}, WIS:{score:14,mod:2,save:6}, CHA:{score:8,mod:-1,save:3} }, combat:{ac:17,hp:85,speed:35,initiative:7,hitDice:"5d10+5d8",proficiency:4,passivePerception:20,passiveInvestigation:15,passiveInsight:16}, attacks:[{name:"Longbow",bonus:"+11",damage:"1d8+5"}], skills:{Stealth:13,Perception:10}, features:[{name:"Favored Foe",desc:"Bonus action: mark target, +1d4 once/turn.",cost:"4/long rest",uses:4,resetOn:"long"}], spellSlots:{"1st":4,"2nd":2}, spells:["Goodberry","Hunter's Mark","Absorb Elements","Pass Without Trace","Rope Trick","Zephyr Strike"], equipment:["Studded leather","Longbow","40 arrows","Thieves' tools","Broken compass","Journal","20 gp"], backstory:"I was a cartographer for the Wind Dukes. Not a warrior — a mapmaker. I drew the edges of reality before they were fixed. I mapped the space between the Abyss and Mechanus, the forgotten pathways that only the Rod can travel. Then the Rod was tested. A shockwave tore through the In-Between. I woke up with half my memories erased and a broken compass in my hand. The Raven Queen found me: 'Guide the ones who will find the Rod.'" },
    drunken: { name:"Kaelen 'Kettle' Morrow", classLevel:"Monk (Drunken Master) - Level 10", race:"Human (Variant)", background:"The Last of the Unremembered Path", alignment:"Chaotic Good", playerName:"__________________", stats:{ STR:{score:10,mod:0,save:4}, DEX:{score:20,mod:5,save:9}, CON:{score:14,mod:2,save:6}, INT:{score:8,mod:-1,save:3}, WIS:{score:18,mod:4,save:8}, CHA:{score:10,mod:0,save:4} }, combat:{ac:19,hp:73,speed:50,initiative:5,hitDice:"10d8",proficiency:4,passivePerception:18,passiveInsight:18}, attacks:[{name:"Unarmed Strike",bonus:"+9",damage:"1d6+5"}], skills:{Acrobatics:9,Insight:8}, features:[{name:"Ki (10 points)",desc:"10 ki, recharge short rest. DC 16.",cost:"10/short rest",uses:10,resetOn:"short"},{name:"Stunning Strike",desc:"1 ki: CON save or stunned.",cost:"1 ki",uses:10,resetOn:"short"}], spells:[], equipment:["Quarterstaff","10 darts","Worn flask","10 gp"], backstory:"The Monastery of the Unremembered Path stood on a mountain that no longer exists, in a valley that never was. Your order believed in perfect emptiness. You trained for forty years. Then a crack in time — caused by someone testing a piece of the Rod. Your monastery un-happened. You survived because you were drunk in a cave. Now you drink to forget — but forgetting is exactly what they took from you." },

  const sessionZero = { id:"session0", date:"Session 0", title:"✦ The Gathering at the Crossroads Inn ✦", notes:"The party converges at the Crossroads Inn.\n• Kaelen arrives first, chasing a memory.\n• Vesper materializes from a rift.\n• Morwen walks in at midnight.\n• The Vessel's silver cube hums.\n• Sylvara watches from the shadows." };

  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function sanitizeId(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
  function makeEditable(value, fieldKey, charKey) { return `<span class="editable-text" contenteditable="true" data-field="${fieldKey}" data-char="${charKey}" oninput="scheduleAutoSave('${charKey}')">${escapeHtml(String(value))}</span>`; }
  function renderUsageBoxes(charKey, id, uses) { if (uses==="∞"||!uses||uses===0) return ''; const num=parseInt(uses); if (isNaN(num)||num>99) return ''; const key=`uses-${charKey}-${id}`; let used=parseInt(localStorage.getItem(key)||'0'); let boxes=''; for (let i=0;i<num;i++) boxes+=`<span class="usage-checkbox${i<used?' used':''}" onclick="toggleUsage(this,'${key}',${num})"></span>`; return `<div style="margin-top:0.15rem;display:flex;align-items:center;gap:0.2rem;"><span style="font-size:0.55rem;color:#9088c0;">Used:</span>${boxes}<button class="btn-sm" onclick="resetOneUsage('${key}',this)">↺</button></div>`; }
  window.toggleUsage=function(el,key,num){const all=el.parentElement.querySelectorAll('.usage-checkbox'),idx=Array.from(all).indexOf(el);if(el.classList.contains('used')){for(let i=all.length-1;i>=idx;i--)all[i].classList.remove('used');}else{for(let i=0;i<=idx;i++)all[i].classList.add('used');}let count=0;all.forEach(b=>{if(b.classList.contains('used'))count++;});localStorage.setItem(key,count);};
  window.resetOneUsage=function(key,btn){localStorage.setItem(key,'0');btn.parentElement.querySelectorAll('.usage-checkbox').forEach(b=>b.classList.remove('used'));};
  window.resetAllByType=function(charKey,type){const c=characterData[charKey];if(!c)return;c.features.forEach((f,i)=>{if(f.resetOn===type||type==='long')localStorage.setItem(`uses-${charKey}-feat-${i}`,'0');});if(c.spellSlots){Object.keys(c.spellSlots).forEach(l=>{if(l!=='cantrips')localStorage.setItem(`uses-${charKey}-slot-${l}`,'0');});}switchTab(charKey);};
  function scheduleAutoSave(charKey){if(autoSaveTimers[charKey])clearTimeout(autoSaveTimers[charKey]);autoSaveTimers[charKey]=setTimeout(()=>saveAllEdits(charKey),3000);}
  function saveAllEdits(charKey){const edits={};document.querySelectorAll(`[data-char="${charKey}"]`).forEach(el=>edits[el.getAttribute('data-field')]=el.textContent.trim());Object.entries(edits).forEach(([f,v])=>{db.ref(`characters/${charKey}/${f}`).set(v);});}

  // ─── FIXED SPELL DETAIL TOGGLE ────────────────────────
  window.toggleSpellDetail = function(safeId, charKey, element) {
    const panel = document.getElementById(`spell-detail-${charKey}-${safeId}`);
    if (!panel) return;
    const wasOpen = panel.classList.contains('open');
    document.querySelectorAll(`.spell-detail-panel[data-char="${charKey}"]`).forEach(p => p.classList.remove('open'));
    document.querySelectorAll(`.spell-item-bar[data-char="${charKey}"]`).forEach(b => b.classList.remove('active'));
    if (!wasOpen) {
      panel.classList.add('open');
      element.classList.add('active');
      const spellName = element.getAttribute('data-spell-name');
      const spell = spellDatabase[spellName];
      if (spell) {
        panel.innerHTML = `<strong style="color:#d4c8ff;">${escapeHtml(spellName)}</strong><span class="spell-level-badge">${typeof spell.level==='number'?'Level '+spell.level:spell.level}</span> · ${spell.school||''}<div style="margin-top:0.2rem;"><span style="color:#9088c0;">Casting Time:</span> ${spell.castingTime||'—'} | <span style="color:#9088c0;">Range:</span> ${spell.range||'—'} | <span style="color:#9088c0;">Duration:</span> ${spell.duration||'—'}</div><div style="margin-top:0.3rem;color:#c0b8e8;line-height:1.4;">${spell.desc||'No description available.'}</div>`;
      } else {
        panel.innerHTML = `<p style="color:#a098d0;">No detailed information available for "${escapeHtml(spellName)}".</p>`;
      }
    }
  };

  function getFilteredSpellOptions(charKey) { const allowed=classSpellMap[charKey]||[]; const entries=Object.entries(spellDatabase).filter(([_,d])=>d.classes&&d.classes.some(c=>allowed.includes(c))); entries.sort((a,b)=>{const la=typeof a[1].level==='number'?a[1].level:99;const lb=typeof b[1].level==='number'?b[1].level:99;return la-lb||a[0].localeCompare(b[0]);}); return entries.map(([name,data])=>`<option value="${escapeHtml(name)}">${typeof data.level==='number'?'Lvl '+data.level:data.level} — ${escapeHtml(name)}</option>`).join(''); }
  window.showSpellInfo=function(charKey){const sel=document.getElementById(`spellSelect-${charKey}`),info=document.getElementById(`spellInfo-${charKey}`);if(!sel||!info)return;const name=sel.value;if(!name){info.style.display='none';return;}const sp=spellDatabase[name];info.style.display='block';info.innerHTML=sp?`<strong style="color:#d4c8ff;">${escapeHtml(name)}</strong><span class="spell-level-badge">${typeof sp.level==='number'?'Lvl '+sp.level:sp.level}</span><div style="color:#c0b8e8;margin-top:0.2rem;">${sp.desc}</div>`:'<p>No description.</p>';};
  window.addSpellFromDropdown=function(charKey){const sel=document.getElementById(`spellSelect-${charKey}`);if(!sel?.value)return;const name=sel.value;db.ref(`characters/${charKey}/spells`).once('value').then(s=>{const cur=s.val()||[];if(!cur.includes(name)){cur.push(name);return db.ref(`characters/${charKey}/spells`).set(cur);}}).then(()=>{loadDynamicLists(charKey);sel.value='';document.getElementById(`spellInfo-${charKey}`).style.display='none';});};
  window.addSpell=function(charKey){const inp=document.getElementById(`newSpell-${charKey}`);if(!inp?.value.trim())return;const name=inp.value.trim();db.ref(`characters/${charKey}/spells`).once('value').then(s=>{const cur=s.val()||[];cur.push(name);return db.ref(`characters/${charKey}/spells`).set(cur);}).then(()=>{loadDynamicLists(charKey);inp.value='';});};
  window.addEquipment=function(charKey){const inp=document.getElementById(`newEquip-${charKey}`);if(!inp?.value.trim())return;const name=inp.value.trim();db.ref(`characters/${charKey}/equipment`).once('value').then(s=>{const cur=s.val()||[];cur.push(name);return db.ref(`characters/${charKey}/equipment`).set(cur);}).then(()=>{loadDynamicLists(charKey);inp.value='';});};
  window.addFeature=function(charKey){const n=document.getElementById(`newFeatName-${charKey}`),d=document.getElementById(`newFeatDesc-${charKey}`),u=document.getElementById(`newFeatUses-${charKey}`);if(!n?.value.trim())return;const feat={name:n.value.trim(),desc:d.value.trim()||'New',cost:u.value.trim()||'Passive',uses:u.value.trim()||0,resetOn:'none'};db.ref(`characters/${charKey}/customFeatures`).once('value').then(s=>{const cur=s.val()||[];cur.push(feat);return db.ref(`characters/${charKey}/customFeatures`).set(cur);}).then(()=>{loadDynamicLists(charKey);n.value='';d.value='';u.value='';});};
  window.removeItem=function(btn,charKey,category,name){if(!confirm('Remove?'))return;db.ref(`characters/${charKey}/${category}`).once('value').then(s=>{const items=s.val()||[];return db.ref(`characters/${charKey}/${category}`).set(items.filter(i=>(typeof i==='string'?i!==name:i.name!==name)));}).then(()=>{btn.closest('.spell-item-bar, li').remove();});};

  window.addCharNote=function(charKey){const inp=document.getElementById(`charNoteInput-${charKey}`);if(!inp?.value.trim())return;const text=inp.value.trim();db.ref(`characterNotes/${charKey}`).once('value').then(s=>{const notes=s.val()||[];notes.unshift({id:Date.now(),text,time:new Date().toLocaleString()});return db.ref(`characterNotes/${charKey}`).set(notes);}).then(()=>{inp.value='';loadCharNotes(charKey);});};
  window.removeCharNote=function(charKey,noteId){if(!confirm('Delete?'))return;db.ref(`characterNotes/${charKey}`).once('value').then(s=>{const notes=s.val()||[];return db.ref(`characterNotes/${charKey}`).set(notes.filter(n=>n.id!==noteId));}).then(()=>loadCharNotes(charKey));};
  function loadCharNotes(charKey){const container=document.getElementById(`charNotes-${charKey}`);if(!container)return;db.ref(`characterNotes/${charKey}`).once('value').then(s=>{const notes=s.val()||[];container.innerHTML=notes.length===0?'<p style="color:#9088c0;font-size:0.75rem;">No notes yet.</p>':notes.map(n=>`<div class="char-note-card"><div><div class="char-note-text">${escapeHtml(n.text)}</div><div class="char-note-time">${n.time}</div></div><button class="btn-remove" onclick="removeCharNote('${charKey}',${n.id})">✕</button></div>`).join('');});}

  window.addSessionNote=function(){const dt=document.getElementById('sessionDate'),ti=document.getElementById('sessionTitle'),nt=document.getElementById('sessionNotes');if(!ti?.value.trim())return;const note={id:Date.now(),date:dt?.value||new Date().toISOString().split('T')[0],title:ti.value.trim(),notes:nt?.value.trim()||''};db.ref('sessionNotes').once('value').then(s=>{const notes=s.val()||[];notes.push(note);return db.ref('sessionNotes').set(notes);}).then(()=>{sessionNotes.push(note);renderSessionNotes();dt.value='';ti.value='';nt.value='';});};
  window.addBulletToForm=function(){const nt=document.getElementById('sessionNotes');if(!nt)return;const pos=nt.selectionStart;nt.value=nt.value.substring(0,pos)+'\n• '+nt.value.substring(pos);nt.focus();nt.selectionStart=nt.selectionEnd=pos+3;};
  window.removeSessionNote=function(id){if(!confirm('Delete?'))return;db.ref('sessionNotes').once('value').then(s=>{const notes=s.val()||[];return db.ref('sessionNotes').set(notes.filter(n=>n.id!==id));}).then(()=>{sessionNotes=sessionNotes.filter(n=>n.id!==id);renderSessionNotes();});};
  function renderSessionNotes(){const container=document.getElementById('sessionNotesContainer');if(!container)return;let all=[...sessionNotes];if(!all.find(n=>n.id==='session0'))all.unshift(sessionZero);container.innerHTML=all.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(note=>{const bullets=note.notes?note.notes.split('\n').filter(l=>l.trim()):[];return`<div class="session-note-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.4rem;border-bottom:1px solid rgba(140,160,200,0.3);padding-bottom:0.3rem;margin-bottom:0.4rem;"><span style="color:#b8c8e0;font-size:0.7rem;background:rgba(60,80,140,0.4);padding:0.15rem 0.4rem;border-radius:0.4rem;">📅 ${note.date}</span><span style="color:#d4d8ff;font-weight:bold;">${escapeHtml(note.title)}</span>${note.id!=='session0'?`<button class="btn-remove" onclick="removeSessionNote(${note.id})">✕</button>`:''}</div>${bullets.length?'<ul style="list-style:none;padding:0;">'+bullets.map(b=>`<li style="padding:0.15rem 0;color:#c0c8e8;font-size:0.8rem;">• ${escapeHtml(b.replace(/^•\s*/,''))}</li>`).join('')+'</ul>':'<p style="color:#9088c0;font-size:0.75rem;">No details.</p>'}</div>`;}).join('');}

  function renderSpells(charKey, spells) { const container=document.getElementById(`spellsList-${charKey}`); if(!container)return; const addForm=container.querySelector('.add-form'), dropdown=container.querySelector('.spell-dropdown-section'); container.innerHTML=''; const allowed=classSpellMap[charKey]||[]; spells.forEach(spellName=>{const sp=spellDatabase[spellName];const safeId=sanitizeId(spellName);const div=document.createElement('div');div.className='spell-item-bar';div.setAttribute('data-char',charKey);div.setAttribute('data-spell-name',spellName);div.innerHTML=`<div class="spell-content" onclick="toggleSpellDetail('${safeId}','${charKey}',this.parentElement)"><span class="editable-text" contenteditable="true">${escapeHtml(spellName)}</span>${sp?`<span class="spell-level-badge">${typeof sp.level==='number'?'Lvl '+sp.level:sp.level}</span>`:''}</div><div class="spell-actions"><button class="btn-remove" onclick="event.stopPropagation();removeItem(this,'${charKey}','spells','${escapeHtml(spellName)}')">✕</button></div>`;container.appendChild(div);const detail=document.createElement('div');detail.className='spell-detail-panel';detail.id=`spell-detail-${charKey}-${safeId}`;detail.setAttribute('data-char',charKey);container.appendChild(detail);});if(dropdown)container.appendChild(dropdown);if(addForm)container.appendChild(addForm); }
  function renderEquipment(charKey,items){const container=document.getElementById(`equipList-${charKey}`);if(!container)return;const addForm=container.querySelector('.add-form');container.innerHTML='';items.forEach(item=>{const li=document.createElement('li');li.innerHTML=`<span style="flex:1;">✦ <span class="editable-text" contenteditable="true">${escapeHtml(item)}</span></span><button class="btn-remove" onclick="removeItem(this,'${charKey}','equipment','${escapeHtml(item)}')">✕</button>`;container.appendChild(li);});if(addForm)container.appendChild(addForm);}
  function renderCustomFeats(charKey,feats){const container=document.getElementById(`featList-${charKey}`);if(!container)return;container.querySelectorAll('.custom-feature').forEach(el=>el.remove());feats.forEach((f,i)=>{const div=document.createElement('div');div.className='ability-card custom-feature';div.innerHTML=`<div class="ability-name">${makeEditable(f.name,`customfeat-name-${i}`,charKey)}${f.cost?`<span class="ability-cost">${escapeHtml(f.cost)}</span>`:''}<button class="btn-remove" onclick="removeItem(this,'${charKey}','customFeatures','${escapeHtml(f.name)}')">✕</button></div><div class="ability-desc">${makeEditable(f.desc,`customfeat-desc-${i}`,charKey)}</div>${renderUsageBoxes(charKey,`custom-${i}`,f.uses)}`;container.appendChild(div);});}
  function loadDynamicLists(charKey){const c=characterData[charKey];if(!c)return;db.ref(`characters/${charKey}/spells`).once('value').then(s=>{const spells=s.val()||c.spells||[];if(!s.val())db.ref(`characters/${charKey}/spells`).set(c.spells||[]);renderSpells(charKey,spells);});db.ref(`characters/${charKey}/equipment`).once('value').then(s=>{const equip=s.val()||c.equipment||[];if(!s.val())db.ref(`characters/${charKey}/equipment`).set(c.equipment||[]);renderEquipment(charKey,equip);});db.ref(`characters/${charKey}/customFeatures`).once('value').then(s=>{const feats=s.val();if(feats&&Array.isArray(feats))renderCustomFeats(charKey,feats);});loadCharNotes(charKey);}

  function renderCharacterSheet(charKey){const c=characterData[charKey];if(!c)return'<p>Not found</p>';const statsHtml=Object.entries(c.stats).map(([name,data])=>`<div class="stat-box"><div class="stat-label">${name}</div><div class="stat-value">${makeEditable(data.score,`stat-${name}-score`,charKey)}</div><span class="stat-mod">${data.mod>=0?'+'+data.mod:data.mod}</span></div>`).join('');const attacksHtml=c.attacks.map((a,i)=>`<div style="display:flex;justify-content:space-between;padding:0.3rem;border-bottom:1px solid rgba(100,80,160,0.2);flex-wrap:wrap;gap:0.2rem;font-size:0.8rem;"><span style="font-weight:bold;color:#d4c8ff;">⚔️ ${makeEditable(a.name,`atk-name-${i}`,charKey)}</span><span style="color:#c8b8f0;">${makeEditable(a.bonus,`atk-bonus-${i}`,charKey)}</span><span style="color:#e8d8ff;">${makeEditable(a.damage,`atk-dmg-${i}`,charKey)}</span></div>`).join('');const featuresHtml=c.features.map((f,i)=>`<div class="ability-card"><div class="ability-name">${makeEditable(f.name,`feat-name-${i}`,charKey)}${f.cost?`<span class="ability-cost">${escapeHtml(f.cost)}</span>`:''}</div><div class="ability-desc">${makeEditable(f.desc,`feat-desc-${i}`,charKey)}</div>${renderUsageBoxes(charKey,`feat-${i}`,f.uses)}</div>`).join('');const skillsHtml=c.skills?Object.entries(c.skills).map(([name,bonus])=>`<div class="info-item"><span class="info-label">${name}</span><span class="info-value" style="float:right;">${bonus>=0?'+'+bonus:bonus}</span></div>`).join(''):'';const spellSlotsHtml=c.spellSlots?`<div class="spell-slot-grid">${Object.entries(c.spellSlots).map(([level,count])=>{const slotUses=(count!=="∞"&&!isNaN(parseInt(count)))?parseInt(count):0;return`<div class="spell-slot"><div class="slot-level">${level}</div><div class="slot-count">${count}</div>${slotUses>0?renderUsageBoxes(charKey,`slot-${level}`,slotUses):''}</div>`;}).join('')}</div>`:'';const passiveHtml=c.combat?`<div class="info-grid" style="margin-top:0.3rem;">${c.combat.passivePerception?`<div class="info-item"><span class="info-label">Pass. Perception</span><span class="info-value">${c.combat.passivePerception}</span></div>`:''}${c.combat.passiveInvestigation?`<div class="info-item"><span class="info-label">Pass. Investigation</span><span class="info-value">${c.combat.passiveInvestigation}</span></div>`:''}${c.combat.passiveInsight?`<div class="info-item"><span class="info-label">Pass. Insight</span><span class="info-value">${c.combat.passiveInsight}</span></div>`:''}</div>`:'';return`<div class="char-sheet"><div class="sheet-section"><div class="section-header"><span>📜 ${makeEditable(c.name,'name',charKey)}</span><div><button class="btn-rest" onclick="resetAllByType('${charKey}','short')">🌅 Short</button><button class="btn-rest" onclick="resetAllByType('${charKey}','long')">🌙 Long</button></div></div><div class="info-grid"><div class="info-item"><span class="info-label">Class</span><span class="info-value">${makeEditable(c.classLevel,'classLevel',charKey)}</span></div><div class="info-item"><span class="info-label">Race</span><span class="info-value">${makeEditable(c.race,'race',charKey)}</span></div><div class="info-item"><span class="info-label">Background</span><span class="info-value">${makeEditable(c.background,'background',charKey)}</span></div><div class="info-item"><span class="info-label">Player</span><span class="info-value">${makeEditable(c.playerName,'playerName',charKey)}</span></div></div></div><div class="sheet-section"><div class="section-header">📊 ABILITY SCORES</div><div class="stat-row">${statsHtml}</div><div class="info-grid" style="margin-top:0.4rem;"><div class="info-item"><span class="info-label">AC</span><span class="info-value">${makeEditable(c.combat.ac,'ac',charKey)}</span></div><div class="info-item"><span class="info-label">HP</span><span class="info-value">${makeEditable(c.combat.hp,'hp',charKey)}</span></div><div class="info-item"><span class="info-label">Speed</span><span class="info-value">${makeEditable(c.combat.speed,'speed',charKey)} ft.</span></div><div class="info-item"><span class="info-label">Init</span><span class="info-value">+${c.combat.initiative}</span></div></div>${passiveHtml}</div>${skillsHtml?`<div class="sheet-section"><div class="section-header">🎯 SKILLS</div><div class="info-grid">${skillsHtml}</div></div>`:''}<div class="sheet-section"><div class="section-header">⚔️ ATTACKS</div>${attacksHtml}</div>${c.spellSlots?`<div class="sheet-section"><div class="section-header">🔮 SPELL SLOTS</div>${spellSlotsHtml}</div>`:''}<div class="sheet-section"><div class="section-header">📜 SPELLS <span style="font-size:0.6rem;color:#9088c0;">Click name for details</span></div><div id="spellsList-${charKey}"></div><div class="spell-dropdown-section"><select id="spellSelect-${charKey}" onchange="showSpellInfo('${charKey}')"><option value="">— Browse spells —</option>${getFilteredSpellOptions(charKey)}</select><div id="spellInfo-${charKey}" class="spell-info-popup"></div><button class="btn-add" onclick="addSpellFromDropdown('${charKey}')" style="margin-top:0.3rem;">+ Add to List</button></div><div class="add-form"><input type="text" id="newSpell-${charKey}" placeholder="Custom spell..."><button class="btn-add" onclick="addSpell('${charKey}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">✨ FEATURES</div><div id="featList-${charKey}">${featuresHtml}</div><div class="add-form"><input type="text" id="newFeatName-${charKey}" placeholder="Name" style="flex:1;"><input type="text" id="newFeatDesc-${charKey}" placeholder="Desc" style="flex:2;"><input type="text" id="newFeatUses-${charKey}" placeholder="Uses" style="width:50px;"><button class="btn-add" onclick="addFeature('${charKey}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">🎒 EQUIPMENT</div><ul class="equipment-list" id="equipList-${charKey}"></ul><div class="add-form"><input type="text" id="newEquip-${charKey}" placeholder="Item"><button class="btn-add" onclick="addEquipment('${charKey}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">📖 BACKSTORY</div><div style="color:#c0b8e8;line-height:1.6;font-style:italic;font-size:0.8rem;">${makeEditable(c.backstory,'backstory',charKey)}</div></div><div class="sheet-section"><div class="section-header">📝 PLAYER NOTES</div><div id="charNotes-${charKey}"><p style="color:#9088c0;font-size:0.75rem;">Loading notes...</p></div><div class="add-form" style="flex-wrap:nowrap;"><input type="text" id="charNoteInput-${charKey}" placeholder="Add a note..." style="flex:1;"><button class="btn-save-note" onclick="addCharNote('${charKey}')">Save Note</button></div></div></div>`;}

  function renderDMPage(){return`<div style="text-align:center;padding:0.5rem;"><h2 style="color:#d4c8ff;">🔐 DM Stargate</h2><p style="color:#a098d0;">Enter PIN:</p><input type="password" id="pinInput" style="background:rgba(20,15,40,0.7);border:2px solid rgba(140,120,220,0.5);color:#e8e0ff;padding:0.4rem 0.8rem;border-radius:0.3rem;font-size:1.1rem;text-align:center;letter-spacing:4px;margin:0.6rem 0;" maxlength="8"><br><button class="btn-rest" id="pinSubmit">Unlock</button><p id="pinError" style="color:#e0a0c0;"></p><div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:1rem;"><div class="section-header" style="color:#d4c8ff;">🗝️ SECRETS</div>${Object.entries(dmSecrets).map(([k,s])=>`<div style="border:2px dashed rgba(140,120,220,0.5);background:rgba(20,15,35,0.6);padding:0.6rem;border-radius:0.5rem;margin:0.5rem 0;"><div style="color:#d4c8ff;font-weight:bold;">${characterData[k]?.name||k}</div><div style="color:#c8b8f0;font-size:0.8rem;">${s}</div></div>`).join('')}<div class="section-header" style="color:#d4c8ff;">📋 CHANGE LOG</div><div class="change-log" id="changeLogContainer"></div><div class="section-header" style="color:#d4c8ff;">📝 SESSION NOTES</div><div style="border:2px dashed rgba(140,160,200,0.4);padding:0.8rem;margin:0.5rem 0;background:rgba(18,20,35,0.5);"><div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.4rem;"><div style="flex:1;"><input type="date" id="sessionDate" style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div><div style="flex:2;"><input type="text" id="sessionTitle" placeholder="Title..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div></div><div><button class="btn-sm" onclick="addBulletToForm()">• +</button><textarea id="sessionNotes" rows="4" placeholder="• Notes..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.4rem;resize:vertical;margin-top:0.2rem;"></textarea></div><button class="btn-add" onclick="addSessionNote()" style="width:100%;margin-top:0.3rem;">+ Save Note</button></div><div id="sessionNotesContainer"></div></div></div>`;}
  function renderChangeLog(){const c=document.getElementById('changeLogContainer');if(!c)return;c.innerHTML=changeLog.length===0?'<p style="color:#9088c0;">No changes.</p>':changeLog.map(e=>`<div class="log-entry">[${e.time}] <strong>${e.char}</strong> · ${e.field}: ${e.value}</div>`).join('');}

  function setActiveTab(tabId){['dmpc','drunken','chronurgy','grave','psi','dm'].forEach(id=>{const btn=document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1));if(btn)btn.classList.remove('active');});const btn=document.getElementById('tab'+tabId.charAt(0).toUpperCase()+tabId.slice(1));if(btn)btn.classList.add('active');}
  function switchTab(tabId){Object.values(autoSaveTimers).forEach(t=>clearTimeout(t));currentTab=tabId;setActiveTab(tabId);if(tabId==='dm'){dmAuthenticated=false;contentPanel.innerHTML=renderDMPage();document.getElementById('pinSubmit').addEventListener('click',()=>{if(document.getElementById('pinInput').value===DM_PIN){dmAuthenticated=true;document.getElementById('dmSecretsContainer').style.display='block';db.ref('changeLog').once('value').then(s=>{changeLog=s.val()||[];renderChangeLog();});db.ref('sessionNotes').once('value').then(s=>{sessionNotes=s.val()||[];renderSessionNotes();});}});}else{contentPanel.innerHTML=renderCharacterSheet(tabId);setTimeout(()=>loadDynamicLists(tabId),150);dmAuthenticated=false;}}

  document.getElementById('tabDmpc').addEventListener('click',()=>switchTab('dmpc'));
  document.getElementById('tabDrunken').addEventListener('click',()=>switchTab('drunken'));
  document.getElementById('tabChronurgy').addEventListener('click',()=>switchTab('chronurgy'));
  document.getElementById('tabGrave').addEventListener('click',()=>switchTab('grave'));
  document.getElementById('tabPsi').addEventListener('click',()=>switchTab('psi'));
  document.getElementById('tabDM').addEventListener('click',()=>switchTab('dm'));
  db.ref('changeLog').once('value').then(s=>{changeLog=s.val()||[];});
  switchTab('dmpc');
})();
</script>
</body>
</html>
