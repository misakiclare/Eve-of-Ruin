    .grimoire {
      max-width: 1200px;
      width: 100%;
      background: rgba(15, 12, 30, 0.85);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(140, 120, 220, 0.4);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 40px rgba(100, 80, 180, 0.15);
      border-radius: 2rem;
      padding: 1.8rem 2rem 2.5rem;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      text-align: center;
      letter-spacing: 6px;
      color: #d4c8ff;
      text-shadow: 0 0 20px rgba(150, 130, 220, 0.6), 0 0 40px rgba(100, 80, 180, 0.4);
      border-bottom: 2px solid rgba(140, 120, 220, 0.4);
      padding-bottom: 0.5rem;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      word-spacing: 8px;
    }

    .tab-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.65rem;
      background: rgba(20, 16, 40, 0.7);
      padding: 0.7rem 1.2rem;
      border-radius: 3rem;
      border: 1px solid rgba(140, 120, 220, 0.3);
      margin: 0.5rem 0 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: #b8b0e0;
      font-family: 'Segoe UI', 'Candara', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.6rem 1.3rem;
      border-radius: 2.5rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      background: rgba(40, 30, 70, 0.5);
      border: 1px solid rgba(120, 100, 180, 0.3);
      text-transform: uppercase;
    }

    .tab-btn:hover {
      background: rgba(60, 40, 100, 0.6);
      color: #e8e0ff;
      border-color: rgba(160, 140, 220, 0.7);
      box-shadow: 0 0 15px rgba(120, 100, 200, 0.4);
    }

    .tab-btn.active {
      background: rgba(80, 50, 140, 0.7);
      color: #ffffff;
      border-color: rgba(180, 160, 240, 0.9);
      box-shadow: 0 0 20px rgba(140, 120, 220, 0.5);
      font-weight: bold;
    }

    .dm-lock {
      background: rgba(30, 20, 50, 0.6);
      border: 1px dashed rgba(160, 140, 220, 0.5);
      color: #c8b8f0;
    }

    .content-panel {
      background: rgba(12, 10, 25, 0.7);
      border: 2px solid rgba(120, 100, 180, 0.35);
      border-radius: 2rem;
      padding: 1.8rem 2rem;
      background-image: linear-gradient(145deg, rgba(20, 15, 40, 0.7) 0%, rgba(8, 6, 18, 0.8) 100%);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 15px 30px rgba(0,0,0,0.5);
      min-height: 500px;
      max-height: 75vh;
      overflow-y: auto;
    }

    .content-panel::-webkit-scrollbar { width: 8px; }
    .content-panel::-webkit-scrollbar-track { background: rgba(20, 15, 40, 0.5); border-radius: 4px; }
    .content-panel::-webkit-scrollbar-thumb { background: rgba(120, 100, 180, 0.5); border-radius: 4px; }

    .char-sheet { display: flex; flex-direction: column; gap: 1.2rem; }

    .sheet-section {
      border: 2px solid rgba(120, 100, 180, 0.3);
      border-radius: 1rem;
      padding: 1.2rem;
      background: rgba(18, 14, 35, 0.6);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: relative;
      transition: border-color 0.3s;
    }

    .sheet-section:hover { border-color: rgba(160, 140, 220, 0.5); }

    .section-header {
      font-size: 1.2rem;
      color: #c8b8f0;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(120, 100, 180, 0.3);
      padding-bottom: 0.5rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editable-field { position: relative; display: inline-block; }

    .editable-text {
      background: transparent;
      border: 1px solid transparent;
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      padding: 0.2rem 0.4rem;
      border-radius: 0.3rem;
      outline: none;
      transition: all 0.2s;
    }

    .editable-text:hover { background: rgba(120, 100, 180, 0.1); border-color: rgba(120, 100, 180, 0.3); }
    .editable-text:focus { background: rgba(120, 100, 180, 0.15); border-color: rgba(160, 140, 220, 0.7); box-shadow: 0 0 10px rgba(120, 100, 200, 0.3); }

    .pencil-btn {
      background: rgba(120, 100, 180, 0.3);
      border: 1px solid rgba(140, 120, 200, 0.5);
      color: #c8b8f0;
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      border-radius: 0.4rem;
      cursor: pointer;
      margin-left: 0.3rem;
      transition: all 0.2s;
      vertical-align: middle;
    }

    .pencil-btn:hover { background: rgba(140, 120, 200, 0.5); color: white; box-shadow: 0 0 8px rgba(120, 100, 200, 0.4); }

    .field-group { margin: 0.4rem 0; display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem; }
    .field-label { color: #a098d0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; min-width: 60px; }

    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 0.7rem; margin: 0.8rem 0; }

    .stat-box {
      border: 2px solid rgba(120, 100, 180, 0.3);
      border-radius: 0.8rem;
      padding: 0.6rem;
      text-align: center;
      background: rgba(25, 18, 50, 0.6);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
    }

    .stat-label { font-size: 0.7rem; color: #a098d0; letter-spacing: 1px; text-transform: uppercase; }
    .stat-value { font-size: 1.5rem; font-weight: bold; color: #e8d8ff; margin: 0.1rem 0; }
    .stat-mod { font-size: 0.85rem; color: #c8b8f0; background: rgba(80, 60, 140, 0.4); border-radius: 1rem; padding: 0.1rem 0.5rem; display: inline-block; }

    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.7rem; }

    .info-item { border: 1px solid rgba(120, 100, 180, 0.25); padding: 0.5rem 0.7rem; border-radius: 0.5rem; background: rgba(20, 15, 35, 0.5); }
    .info-label { font-size: 0.7rem; color: #9088c0; text-transform: uppercase; letter-spacing: 1px; }
    .info-value { font-size: 1rem; color: #d4c8ff; font-weight: 500; }

    .ability-card {
      border: 2px solid rgba(120, 100, 180, 0.25);
      border-radius: 0.8rem;
      padding: 0.8rem;
      margin: 0.7rem 0;
      background: linear-gradient(135deg, rgba(25, 18, 45, 0.7) 0%, rgba(15, 10, 30, 0.8) 100%);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .ability-name { font-size: 1rem; color: #d4c8ff; font-weight: bold; border-bottom: 1px solid rgba(120, 100, 180, 0.3); padding-bottom: 0.3rem; margin-bottom: 0.4rem; letter-spacing: 1px; }
    .ability-desc { font-size: 0.9rem; color: #c0b8e8; line-height: 1.5; }
    .ability-cost { color: #e0c8ff; font-weight: bold; font-size: 0.8rem; background: rgba(80, 50, 140, 0.5); padding: 0.2rem 0.5rem; border-radius: 0.5rem; display: inline-block; margin-right: 0.5rem; }

    .attack-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid rgba(100, 80, 160, 0.2); flex-wrap: wrap; gap: 0.5rem; }
    .attack-name { font-weight: bold; color: #d4c8ff; min-width: 130px; }
    .attack-bonus { color: #c8b8f0; background: rgba(60, 40, 120, 0.4); padding: 0.2rem 0.5rem; border-radius: 0.5rem; }
    .attack-damage { color: #e8d8ff; }

    .spell-slot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(55px, 1fr)); gap: 0.5rem; margin: 0.8rem 0; }
    .spell-slot { text-align: center; border: 1px solid rgba(120, 100, 180, 0.3); padding: 0.4rem; border-radius: 0.5rem; background: rgba(20, 15, 35, 0.5); }
    .slot-level { font-size: 0.7rem; color: #9088c0; }
    .slot-count { font-size: 1.2rem; color: #d4c8ff; font-weight: bold; }

    .equipment-list { list-style: none; padding: 0; }
    .equipment-list li { padding: 0.35rem 0; border-bottom: 1px solid rgba(100, 80, 160, 0.2); color: #c0b8e8; }
    .equipment-list li::before { content: "✦ "; color: #b0a0e0; }

    .btn-save {
      background: rgba(80, 50, 140, 0.5);
      border: 1px solid rgba(160, 140, 220, 0.6);
      color: #e8e0ff;
      padding: 0.5rem 1.2rem;
      border-radius: 0.5rem;
      font-family: inherit;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .btn-save:hover { background: rgba(100, 60, 170, 0.7); box-shadow: 0 0 15px rgba(140, 120, 220, 0.5); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .dm-pin-section { text-align: center; padding: 2rem; }

    .dm-pin-input {
      background: rgba(20, 15, 40, 0.7);
      border: 2px solid rgba(140, 120, 220, 0.5);
      padding: 0.7rem 1.5rem;
      border-radius: 0.5rem;
      color: #e8e0ff;
      font-family: inherit;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      margin: 1rem 0;
    }

    .dm-pin-input:focus { border-color: rgba(180, 160, 240, 0.8); box-shadow: 0 0 20px rgba(140, 120, 220, 0.5); }

    .secret-box { border: 2px dashed rgba(140, 120, 220, 0.5); background: rgba(20, 15, 35, 0.6); padding: 1rem; border-radius: 0.8rem; margin: 1rem 0; }
    .secret-label { color: #d4c8ff; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
    .secret-text { color: #c8b8f0; margin-top: 0.5rem; line-height: 1.6; }

    /* Sync status indicator */
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #a098d0;
      margin-left: 1rem;
    }
    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6a6a8a;
      transition: background 0.3s;
    }
    .sync-dot.synced { background: #7bc8a0; }
    .sync-dot.saving { background: #e8c86a; animation: pulse 0.8s infinite; }
    .sync-dot.error { background: #e87070; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    @media (max-width: 768px) {
      .grimoire { padding: 1rem; }
      .stat-row { grid-template-columns: repeat(3, 1fr); }
      h1 { font-size: 1.8rem; }
    }
    @media (max-width: 480px) {
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .tab-btn { font-size: 0.7rem; padding: 0.4rem 0.7rem; }
    }
  </style>
</head>

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function makeEditable(value, fieldKey, charKey, tag = 'span', className = '') {
      const uniqueId = `editable-${charKey}-${fieldKey}-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
      const escaped = escapeHtml(String(value));
      if (tag === 'input') {
        return `<span class="editable-field"><input type="text" id="${uniqueId}" class="editable-text ${className}" value="${escaped}" data-field="${fieldKey}" data-char="${charKey}"><button class="pencil-btn" onclick="toggleEditField('${uniqueId}')" title="Edit">✎</button></span>`;
      }
      return `<span class="editable-field"><span id="${uniqueId}" class="editable-text ${className}" contenteditable="false" data-field="${fieldKey}" data-char="${charKey}">${escaped}</span><button class="pencil-btn" onclick="toggleEditField('${uniqueId}')" title="Edit">✎</button></span>`;
    }

    window.toggleEditField = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.contentEditable === 'true' || (el.tagName === 'INPUT' && !el.readOnly)) {
        if (el.tagName === 'INPUT') {
          el.readOnly = true;
          el.style.border = '1px solid transparent';
        } else {
          el.contentEditable = 'false';
          el.style.border = '1px solid transparent';
          el.style.background = 'transparent';
        }
      } else {
        if (el.tagName === 'INPUT') {
          el.readOnly = false;
          el.style.border = '1px solid rgba(160,140,220,0.6)';
          el.focus();
        } else {
          el.contentEditable = 'true';
          el.style.border = '1px solid rgba(160,140,220,0.6)';
          el.style.background = 'rgba(120,100,180,0.15)';
          el.focus();
        }
      }
    };

    // ─── Sync status helper ──────────────────────────────────────
    function setSyncStatus(state, label) {
      const dot = document.getElementById('syncDot');
      const txt = document.getElementById('syncText');
      if (!dot || !txt) return;
      dot.className = 'sync-dot ' + state;
      txt.textContent = label;
    }

    // ─── Firebase: save all edits for a character ────────────────
    window.saveAllEdits = function(charKey) {
      const editables = document.querySelectorAll(`[data-char="${charKey}"]`);
      const savedData = {};
      editables.forEach(el => {
        const field = el.getAttribute('data-field');
        if (field) savedData[field] = el.tagName === 'INPUT' ? el.value : el.textContent;
      });

      setSyncStatus('saving', 'Saving…');
      const btn = document.getElementById('saveBtn-' + charKey);
      if (btn) btn.disabled = true;

      db.ref('characters/' + charKey).set(savedData)
        .then(() => {
          setSyncStatus('synced', 'Saved ✓');
          if (btn) btn.disabled = false;
        })
        .catch(err => {
          console.error('Firebase save error:', err);
          setSyncStatus('error', 'Save failed ✗');
          if (btn) btn.disabled = false;
          alert('Save failed. Check your Firebase config in the HTML file.');
        });
    };

    // ─── Firebase: load & live-sync edits for a character ────────
    function loadCharacterEdits(charKey) {
      detachListener();
      const ref = db.ref('characters/' + charKey);
      activeListenerRef = ref;

      setSyncStatus('saving', 'Loading…');
      ref.on('value', (snapshot) => {
        const data = snapshot.val();
        setSyncStatus('synced', 'Live ✓');
        if (!data) return;
        Object.entries(data).forEach(([field, value]) => {
          document.querySelectorAll(`[data-char="${charKey}"][data-field="${field}"]`).forEach(el => {
            if (el.tagName === 'INPUT') el.value = value;
            else el.textContent = value;
          });
        });
      }, (err) => {
        console.error('Firebase read error:', err);
        setSyncStatus('error', 'Offline');
      });
    }

          <input type="password" id="pinInput" class="dm-pin-input" placeholder="****" maxlength="8">
          <br>
          <button class="btn-save" id="pinSubmit" style="margin-top:1rem;">Unlock</button>
          <p id="pinError" style="color:#e0a0c0;margin-top:1rem;"></p>
          <div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:2rem;">
            <div class="section-header" style="color:#d4c8ff;">🗝️ CHARACTER SECRETS</div>
            ${Object.entries(dmSecrets).map(([key, secret]) => `
              <div class="secret-box">
                <div class="secret-label">${characterData[key]?.name || key}</div>
                <div class="secret-text">${makeEditable(secret, `dm-secret-${key}`, 'dm')}</div>
              </div>`).join('')}
            <div style="margin-top:1.5rem;">
              <label style="color:#d4c8ff;">📝 DM Notes:</label>
              <textarea id="dmEditArea" rows="4" style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.7rem;border-radius:0.5rem;font-family:inherit;margin-top:0.5rem;" placeholder="Campaign notes…"></textarea>
              <div style="display:flex;align-items:center;gap:0.8rem;margin-top:0.7rem;">
                <button class="btn-save" onclick="saveDMNotes()">Save DM Notes for Everyone</button>
                <span class="sync-status">
                  <span class="sync-dot" id="syncDot"></span>
                  <span id="syncText">Ready</span>
                </span>
              </div>
            </div>
          </div>
        </div>`;
    }

    // ─── Firebase: save DM notes ─────────────────────────────────
    window.saveDMNotes = function() {
      const ta = document.getElementById('dmEditArea');
      if (!ta) return;
      setSyncStatus('saving', 'Saving…');
      db.ref('dm/notes').set(ta.value)
        .then(() => setSyncStatus('synced', 'Saved ✓'))
        .catch(err => {
          console.error('Firebase DM save error:', err);
          setSyncStatus('error', 'Save failed ✗');
          alert('Save failed. Check your Firebase config.');
        });
    };

    // ─── Firebase: load DM notes ─────────────────────────────────
    function loadDMNotes() {
      detachListener();
      const ref = db.ref('dm/notes');
      activeListenerRef = ref;
      ref.on('value', (snapshot) => {
        const val = snapshot.val();
        const ta = document.getElementById('dmEditArea');
        if (ta && val !== null) ta.value = val;
        setSyncStatus('synced', 'Live ✓');
      });
    }

    // ─── Tab switching ───────────────────────────────────────────
    function switchTab(tabId) {
      detachListener();
      currentTab = tabId;
      setActiveTab(tabId);

      if (tabId === 'dm') {
        dmAuthenticated = false;
        contentPanel.innerHTML = renderDMPage();
        document.getElementById('pinSubmit').addEventListener('click', () => {
          const pin = document.getElementById('pinInput').value;
          if (pin === DM_PIN) {
            dmAuthenticated = true;
            document.getElementById('dmSecretsContainer').style.display = 'block';
            document.getElementById('pinError').innerText = '';
            loadDMNotes();
          } else {
            document.getElementById('pinError').innerText = 'Incorrect PIN.';
            document.getElementById('dmSecretsContainer').style.display = 'none';
          }
        });
      } else {
        contentPanel.innerHTML = renderCharacterSheet(tabId);
        setTimeout(() => loadCharacterEdits(tabId), 50);
        dmAuthenticated = false;
      }
    }

    tabs.drunken.addEventListener('click', () => switchTab('drunken'));
    tabs.chronurgy.addEventListener('click', () => switchTab('chronurgy'));
    tabs.grave.addEventListener('click', () => switchTab('grave'));
    tabs.psi.addEventListener('click', () => switchTab('psi'));
    tabs.dm.addEventListener('click', () => switchTab('dm'));

    switchTab('drunken');
  })();
</script>
</body>
</html>
