    };

    const dmSecrets = {
      drunken: "Monastery erased by Rod fragment. Kaelen is the only survivor. Lin Wei's spirit watches over him.",
      chronurgy: "Vesper's future self is assembling the Rod to freeze the multiverse.",
      grave: "You were a Wind Duke scholar who helped design the Rod. The Raven Queen wants it assembled.",
      psi: "Sleeper agent for General Zor-Ashkev. Seven words are a psychic trigger."
    };

    // ─── HELPERS ──────────────────────────────────────────
    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function makeEditable(value, fieldKey, charKey) {
      const id = `ed-${charKey}-${fieldKey}-${Date.now()}-${Math.random().toString(36).substr(2,4)}`;
      return `<span class="editable-text" id="${id}" contenteditable="true" data-field="${fieldKey}" data-char="${charKey}" oninput="scheduleAutoSave('${charKey}')" onblur="saveFieldImmediate('${charKey}','${fieldKey}',this)">${escapeHtml(String(value))}</span>`;
    }

    function renderUsageBoxes(charKey, featIdx, uses, resetOn) {
      if (uses === "∞" || uses === "Passive" || !uses || uses === 0) return '';
      const num = parseInt(uses);
      if (isNaN(num) || num <= 0 || num > 20) return '';
      const key = `uses-${charKey}-feat-${featIdx}`;
      let used = parseInt(localStorage.getItem(key) || '0');
      if (used > num) used = num;
      let boxes = '';
      for (let i = 0; i < num; i++) {
        boxes += `<span class="usage-checkbox${i < used ? ' used' : ''}" onclick="toggleUsage(this, '${key}', ${num})" title="Use ${i+1}"></span>`;
      }
      return `<div style="margin-top:0.2rem;display:flex;align-items:center;gap:0.3rem;"><span style="font-size:0.6rem;color:#9088c0;">Used:</span>${boxes}<button class="btn-sm" onclick="resetOneUsage('${key}',this)" title="Reset">↺</button></div>`;
    }

    window.toggleUsage = function(el, key, num) {
      const all = el.parentElement.querySelectorAll('.usage-checkbox');
      const idx = Array.from(all).indexOf(el);
      if (el.classList.contains('used')) {
        for (let i = all.length-1; i >= idx; i--) all[i].classList.remove('used');
      } else {
        for (let i = 0; i <= idx; i++) all[i].classList.add('used');
      }
      let count = 0;
      all.forEach(b => { if (b.classList.contains('used')) count++; });
      localStorage.setItem(key, count);
    };

    window.resetOneUsage = function(key, btn) {
      localStorage.setItem(key, '0');
      const container = btn.parentElement;
      container.querySelectorAll('.usage-checkbox').forEach(b => b.classList.remove('used'));
    };

    window.resetAllByType = function(charKey, type) {
      const features = characterData[charKey]?.features || [];
      features.forEach((f, i) => {
        if (f.resetOn === type) {
          localStorage.setItem(`uses-${charKey}-feat-${i}`, '0');
        }
      });
      // Reset spell slots too
      const slots = characterData[charKey]?.spellSlots;
      if (slots && type === 'long') {
        Object.keys(slots).forEach(level => {
          if (level !== 'cantrips') localStorage.setItem(`uses-${charKey}-slot-${level}`, '0');
        });
      }
      if (slots && type === 'short') {
        // Only reset features on short rest, not full spell slots
      }
      switchTab(charKey);
    };

    // ─── AUTO-SAVE SYSTEM ─────────────────────────────────
    function scheduleAutoSave(charKey) {
      if (autoSaveTimers[charKey]) clearTimeout(autoSaveTimers[charKey]);
      autoSaveTimers[charKey] = setTimeout(() => {
        saveAllEdits(charKey, true);
      }, 3000);
    }

    window.saveFieldImmediate = function(charKey, field, el) {
      const value = el.textContent.trim();
      db.ref(`characters/${charKey}/${field}`).set(value);
      addToChangeLog(charKey, field, value);
    };

    function saveAllEdits(charKey, silent = false) {
      const edits = {};
      document.querySelectorAll(`[data-char="${charKey}"]`).forEach(el => {
        edits[el.getAttribute('data-field')] = el.textContent.trim();
      });
      Object.entries(edits).forEach(([field, value]) => {
        db.ref(`characters/${charKey}/${field}`).set(value);
        addToChangeLog(charKey, field, value);
      });
      if (!silent) {
        const indicator = document.getElementById(`save-indicator-${charKey}`);
        if (indicator) { indicator.textContent = '✓ Saved'; setTimeout(() => { if (indicator) indicator.textContent = ''; }, 2000); }
      }
    }

    function addToChangeLog(charKey, field, value) {
      const timestamp = new Date().toLocaleTimeString();
      const charName = characterData[charKey]?.name || charKey;
      changeLog.unshift({ time: timestamp, char: charName, field, value: value.substring(0, 40) });
      if (changeLog.length > 10) changeLog = changeLog.slice(0, 10);
      // Save log to Firebase
      db.ref('changeLog').set(changeLog);
    }

    // ─── ADD/REMOVE FUNCTIONS ────────────────────────────
    window.addSpell = function(charKey) {
      const input = document.getElementById(`newSpell-${charKey}`);
      if (!input?.value.trim()) return;
      const name = input.value.trim();
      db.ref(`characters/${charKey}/spells`).once('value').then(s => {
        const cur = s.val() || [];
        cur.push(name);
        return db.ref(`characters/${charKey}/spells`).set(cur);
      }).then(() => {
        addToChangeLog(charKey, 'spells', `Added: ${name}`);
        loadDynamicLists(charKey);
        input.value = '';
      });
    };

    window.addEquipment = function(charKey) {
      const input = document.getElementById(`newEquip-${charKey}`);
      if (!input?.value.trim()) return;
      const name = input.value.trim();
      db.ref(`characters/${charKey}/equipment`).once('value').then(s => {
        const cur = s.val() || [];
        cur.push(name);
        return db.ref(`characters/${charKey}/equipment`).set(cur);
      }).then(() => {
        addToChangeLog(charKey, 'equipment', `Added: ${name}`);
        loadDynamicLists(charKey);
        input.value = '';
      });
    };

    window.addFeature = function(charKey) {
      const n = document.getElementById(`newFeatName-${charKey}`);
      const d = document.getElementById(`newFeatDesc-${charKey}`);
      const u = document.getElementById(`newFeatUses-${charKey}`);
      if (!n?.value.trim()) return;
      const feat = { name: n.value.trim(), desc: d.value.trim() || 'New ability', cost: u.value.trim() || 'Passive', uses: u.value.trim() || 0, resetOn: 'none' };
      db.ref(`characters/${charKey}/customFeatures`).once('value').then(s => {
        const cur = s.val() || [];
        cur.push(feat);
        return db.ref(`characters/${charKey}/customFeatures`).set(cur);
      }).then(() => {
        addToChangeLog(charKey, 'features', `Added: ${feat.name}`);
        loadDynamicLists(charKey);
        n.value = ''; d.value = ''; u.value = '';
      });
    };

    window.removeItem = function(btn, charKey, category, name) {
      if (!confirm('Remove?')) return;
      db.ref(`characters/${charKey}/${category}`).once('value').then(s => {
        const items = s.val() || [];
        return db.ref(`characters/${charKey}/${category}`).set(items.filter(i => (typeof i === 'string' ? i !== name : i.name !== name)));
      }).then(() => {
        addToChangeLog(charKey, category, `Removed: ${name}`);
        btn.closest('div, li').remove();
      });
    };

    window.editItemInline = function(el, charKey, category) {
      const oldVal = el.textContent;
      el.contentEditable = 'true';
      el.focus();
      el.addEventListener('blur', function handler() {
        el.removeEventListener('blur', handler);
        const newVal = el.textContent.trim() || oldVal;
        el.textContent = newVal;
        db.ref(`characters/${charKey}/${category}`).once('value').then(s => {
          const items = s.val() || [];
          return db.ref(`characters/${charKey}/${category}`).set(items.map(i => (typeof i === 'string' && i === oldVal) ? newVal : (i.name === oldVal ? {...i, name: newVal} : i)));
        });
        addToChangeLog(charKey, category, `Edited: ${oldVal} → ${newVal}`);
      }, { once: true });
    };

    // ─── LOAD DYNAMIC LISTS ──────────────────────────────
    function loadDynamicLists(charKey) {
      const c = characterData[charKey];
      if (!c) return;

      db.ref(`characters/${charKey}/spells`).once('value').then(s => {
        const spells = s.val() || c.spells || [];
        if (!s.val()) db.ref(`characters/${charKey}/spells`).set(c.spells || []);
        renderList(charKey, 'spellsList', spells, false);
      });

      db.ref(`characters/${charKey}/equipment`).once('value').then(s => {
        const equip = s.val() || c.equipment || [];
        if (!s.val()) db.ref(`characters/${charKey}/equipment`).set(c.equipment || []);
        renderList(charKey, 'equipList', equip, true);
      });

      db.ref(`characters/${charKey}/customFeatures`).once('value').then(s => {
        const feats = s.val();
        if (feats && Array.isArray(feats)) renderCustomFeats(charKey, feats);
      });
    }

    function renderList(charKey, containerId, items, isEquip) {
      const container = document.getElementById(`${containerId}-${charKey}`);
      if (!container) return;
      const addForm = container.querySelector('.add-form');
      container.innerHTML = '';
      items.forEach(item => {
        const el = document.createElement(isEquip ? 'li' : 'div');
        el.style.cssText = 'display:flex;align-items:center;gap:0.4rem;padding:0.25rem 0;border-bottom:1px solid rgba(100,80,160,0.2);';
        el.innerHTML = `${isEquip ? '✦ ' : ''}<span class="editable-text" contenteditable="true" onblur="editItemInline(this,'${charKey}','${isEquip ? 'equipment' : 'spells'}')">${escapeHtml(item)}</span><button class="btn-remove" onclick="removeItem(this,'${charKey}','${isEquip ? 'equipment' : 'spells'}','${escapeHtml(item)}')">✕</button>`;
        container.appendChild(el);
      });
      if (addForm) container.appendChild(addForm);
    }

    function renderCustomFeats(charKey, feats) {
      const container = document.getElementById(`featList-${charKey}`);
      if (!container) return;
      container.querySelectorAll('.custom-feature').forEach(el => el.remove());
      feats.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'ability-card custom-feature';
        div.innerHTML = `<div class="ability-name"><span class="editable-text" contenteditable="true">${escapeHtml(f.name)}</span>${f.cost ? `<span class="ability-cost">${escapeHtml(f.cost)}</span>` : ''}<button class="btn-remove" onclick="removeItem(this,'${charKey}','customFeatures','${escapeHtml(f.name)}')">✕</button></div><div class="ability-desc"><span class="editable-text" contenteditable="true">${escapeHtml(f.desc)}</span></div>${renderUsageBoxes(charKey, `custom-${i}`, f.uses, f.resetOn)}`;
        container.appendChild(div);
      });
    }

    // ─── RENDER CHARACTER SHEET ──────────────────────────
    function renderCharacterSheet(charKey) {
      const c = characterData[charKey];
      if (!c) return '<p>Not found</p>';

      const statsHtml = Object.entries(c.stats).map(([name, data]) => {
        const modStr = data.mod >= 0 ? `+${data.mod}` : `${data.mod}`;
        return `<div class="stat-box"><div class="stat-label">${name}</div><div class="stat-value">${makeEditable(data.score, `stat-${name}-score`, charKey)}</div><span class="stat-mod">${modStr}</span><div style="font-size:0.6rem;color:#9088c0;">Save ${data.save >= 0 ? '+' + data.save : data.save}</div></div>`;
      }).join('');

      const attacksHtml = c.attacks.map((a, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem;border-bottom:1px solid rgba(100,80,160,0.2);flex-wrap:wrap;gap:0.3rem;">
          <span style="font-weight:bold;color:#d4c8ff;min-width:130px;">⚔️ ${makeEditable(a.name, `atk-name-${i}`, charKey)}</span>
          <span style="color:#c8b8f0;background:rgba(60,40,120,0.4);padding:0.15rem 0.4rem;border-radius:0.4rem;">${makeEditable(a.bonus, `atk-bonus-${i}`, charKey)}</span>
          <span style="color:#e8d8ff;">${makeEditable(a.damage, `atk-dmg-${i}`, charKey)}</span>
          <span style="color:#a098d0;font-size:0.75rem;">${makeEditable(a.notes, `atk-notes-${i}`, charKey)}</span>
        </div>`).join('');

      const featuresHtml = c.features.map((f, i) => `
        <div class="ability-card">
          <div class="ability-name">${makeEditable(f.name, `feat-name-${i}`, charKey)}${f.cost ? `<span class="ability-cost">${makeEditable(f.cost, `feat-cost-${i}`, charKey)}</span>` : ''}</div>
          <div class="ability-desc">${makeEditable(f.desc, `feat-desc-${i}`, charKey)}</div>
          ${renderUsageBoxes(charKey, i, f.uses, f.resetOn)}
        </div>`).join('');

      const skillsHtml = c.skills ? Object.entries(c.skills).map(([name, bonus]) => `
        <div class="info-item"><span class="info-label">${name}</span><span class="info-value" style="float:right;">${bonus >= 0 ? '+' + bonus : bonus}</span></div>`).join('') : '';

      const spellSlotsHtml = c.spellSlots ? Object.entries(c.spellSlots).map(([level, count]) => {
        const slotUses = count !== "∞" ? parseInt(count) || 0 : 0;
        const slotKey = `uses-${charKey}-slot-${level}`;
        let boxes = '';
        if (slotUses > 0 && slotUses <= 20) {
          let used = parseInt(localStorage.getItem(slotKey) || '0');
          for (let i = 0; i < slotUses; i++) {
            boxes += `<span class="usage-checkbox${i < used ? ' used' : ''}" onclick="toggleUsage(this,'${slotKey}',${slotUses})"></span>`;
          }
        }
        return `<div class="spell-slot"><div class="slot-level">${level}</div><div class="slot-count">${count}</div>${boxes ? `<div style="display:flex;gap:2px;justify-content:center;margin-top:2px;">${boxes}</div>` : ''}</div>`;
      }).join('') : '';

      return `<div class="char-sheet">
        <div class="sheet-section">
          <div class="section-header">
            <span>📜 ${makeEditable(c.name, 'name', charKey)}</span>
            <div>
              <button class="btn-rest" onclick="resetAllByType('${charKey}','short')" title="Reset short rest abilities">🌅 Short Rest</button>
              <button class="btn-rest" onclick="resetAllByType('${charKey}','long')" title="Reset long rest abilities">🌙 Long Rest</button>
            </div>
          </div>
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Class</span><span class="info-value">${makeEditable(c.classLevel, 'classLevel', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Race</span><span class="info-value">${makeEditable(c.race, 'race', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Player</span><span class="info-value">${makeEditable(c.playerName, 'playerName', charKey)}</span></div>
          </div>
        </div>

        <div class="sheet-section">
          <div class="section-header">📊 ABILITY SCORES</div>
          <div class="stat-row">${statsHtml}</div>
          <div class="info-grid" style="margin-top:0.6rem;">
            <div class="info-item"><span class="info-label">AC</span><span class="info-value">${makeEditable(c.combat.ac, 'ac', charKey)}</span></div>
            <div class="info-item"><span class="info-label">HP</span><span class="info-value">${makeEditable(c.combat.hp, 'hp', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Speed</span><span class="info-value">${makeEditable(c.combat.speed, 'speed', charKey)} ft.</span></div>
            <div class="info-item"><span class="info-label">Initiative</span><span class="info-value">+${c.combat.initiative}</span></div>
          </div>
        </div>

        ${skillsHtml ? `<div class="sheet-section"><div class="section-header">🎯 SKILLS</div><div class="info-grid">${skillsHtml}</div></div>` : ''}

        <div class="sheet-section"><div class="section-header">⚔️ ATTACKS</div>${attacksHtml}</div>

        ${spellSlotsHtml ? `<div class="sheet-section"><div class="section-header">🔮 SPELL SLOTS</div><div class="spell-slot-grid">${spellSlotsHtml}</div></div>` : ''}

        <div class="sheet-section">
          <div class="section-header">📜 SPELLS</div>
          <div id="spellsList-${charKey}"></div>
          <div class="add-form"><input type="text" id="newSpell-${charKey}" placeholder="Spell name"><button class="btn-add" onclick="addSpell('${charKey}')">+ Add</button></div>
        </div>

        <div class="sheet-section">
          <div class="section-header">✨ FEATURES</div>
          <div id="featList-${charKey}">${featuresHtml}</div>
          <div class="add-form">
            <input type="text" id="newFeatName-${charKey}" placeholder="Name" style="flex:1;">
            <input type="text" id="newFeatDesc-${charKey}" placeholder="Description" style="flex:2;">
            <input type="text" id="newFeatUses-${charKey}" placeholder="Uses" style="width:60px;">
            <button class="btn-add" onclick="addFeature('${charKey}')">+ Add</button>
          </div>
        </div>

        <div class="sheet-section">
          <div class="section-header">🎒 EQUIPMENT</div>
          <ul class="equipment-list" id="equipList-${charKey}"></ul>
          <div class="add-form"><input type="text" id="newEquip-${charKey}" placeholder="Item name"><button class="btn-add" onclick="addEquipment('${charKey}')">+ Add</button></div>
        </div>

        <div class="sheet-section">
          <div class="section-header">📖 BACKSTORY</div>
          <div style="color:#c0b8e8;">${makeEditable(c.backstory, 'backstory', charKey)}</div>
        </div>

        <div style="text-align:center;">
          <span class="save-indicator" id="save-indicator-${charKey}"></span>
        </div>
      </div>`;
    }

    // ─── DM PAGE ──────────────────────────────────────────
    function renderDMPage() {
      return `<div style="text-align:center;padding:1rem;">
        <h2 style="color:#d4c8ff;">🔐 DM Stargate</h2>

    // ─── TAB SWITCHING ───────────────────────────────────
    function setActiveTab(tabId) {
      ['drunken','chronurgy','grave','psi','dm'].forEach(id => {
        const btn = document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1));
        if (btn) btn.classList.remove('active');
      });
      const btn = document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1));
      if (btn) btn.classList.add('active');
    }

    function switchTab(tabId) {
      // Clear pending auto-saves
      Object.values(autoSaveTimers).forEach(t => clearTimeout(t));
      
      currentTab = tabId;
      setActiveTab(tabId);
      
      if (tabId === 'dm') {
        dmAuthenticated = false;
        contentPanel.innerHTML = renderDMPage();
        document.getElementById('pinSubmit').addEventListener('click', () => {
          if (document.getElementById('pinInput').value === DM_PIN) {
            dmAuthenticated = true;
            document.getElementById('dmSecretsContainer').style.display = 'block';
            document.getElementById('pinError').innerText = '';
            // Load change log
            db.ref('changeLog').once('value').then(s => {
              const log = s.val() || [];
              changeLog = log;
              renderChangeLog();
            });
          } else {
            document.getElementById('pinError').innerText = 'Incorrect PIN';
          }
        });
      } else {
        contentPanel.innerHTML = renderCharacterSheet(tabId);
        setTimeout(() => loadDynamicLists(tabId), 100);
        dmAuthenticated = false;
      }
    }

    function renderChangeLog() {
      const container = document.getElementById('changeLogContainer');
      if (!container) return;
      if (changeLog.length === 0) {
        container.innerHTML = '<p style="color:#9088c0;">No changes yet.</p>';
        return;
      }
      container.innerHTML = changeLog.map(entry => 
        `<div class="log-entry">[${entry.time}] <strong>${entry.char}</strong> · ${entry.field}: ${entry.value}</div>`
      ).join('');
    }

    document.getElementById('tabDrunken').addEventListener('click', () => switchTab('drunken'));
    document.getElementById('tabChronurgy').addEventListener('click', () => switchTab('chronurgy'));
    document.getElementById('tabGrave').addEventListener('click', () => switchTab('grave'));
    document.getElementById('tabPsi').addEventListener('click', () => switchTab('psi'));
    document.getElementById('tabDM').addEventListener('click', () => switchTab('dm'));

    // Load change log on init
    db.ref('changeLog').once('value').then(s => { changeLog = s.val() || []; });

    switchTab('drunken');
  })();
</script>
</body>
</html>
