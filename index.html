      appearance: "You have an unnerving stillness. Your eyes are a pale silver that sometimes flicker when you concentrate. You move with precision that seems almost rehearsed, as if your body knows where to be before you decide. When the Wind Duke ghost stirs, your pupils become faceted — like cut gemstones.",

  const dmSecrets = { /* same secrets */ };
  const sessionZero = { id: "session0", date: "Session 0", title: "✦ The Gathering at the Crossroads Inn ✦", notes: "The party converges at the Crossroads Inn..." };

  // ─── HELPERS ──────────────────────────────────────────
  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function sanitizeId(str) { return str.replace(/[^a-zA-Z0-9]/g,'_'); }
  function makeEditable(value, fieldKey, charKey) { return `<span class="editable-text" contenteditable="true" data-field="${fieldKey}" data-char="${charKey}" oninput="scheduleAutoSave('${charKey}')">${escapeHtml(String(value))}</span>`; }

  // ─── USAGE TRACKER (NOW ALSO FOR SPELL SLOTS) ─────────
  function renderUsageBoxes(charKey, id, uses, resetOn) {
    if (uses === "∞" || uses === "Passive" || !uses || uses === 0) return '';
    const num = parseInt(uses);
    if (isNaN(num) || num > 99) return '';
    const key = `uses-${charKey}-${id}`;
    let used = parseInt(localStorage.getItem(key) || '0');
    if (used > num) used = num;
    let boxes = '';
    for (let i = 0; i < num; i++) boxes += `<span class="usage-checkbox${i < used ? ' used' : ''}" onclick="toggleUsage(this,'${key}',${num})"></span>`;
    return `<div style="margin-top:0.15rem;display:flex;align-items:center;gap:0.2rem;"><span style="font-size:0.55rem;color:#9088c0;">Used:</span>${boxes}<button class="btn-sm" onclick="resetOneUsage('${key}',this)">↺</button></div>`;
  }

  window.toggleUsage = function(el, key, num) {
    const all = el.parentElement.querySelectorAll('.usage-checkbox'), idx = Array.from(all).indexOf(el);
    if (el.classList.contains('used')) { for (let i = all.length-1; i >= idx; i--) all[i].classList.remove('used'); }
    else { for (let i = 0; i <= idx; i++) all[i].classList.add('used'); }
    let count = 0; all.forEach(b => { if (b.classList.contains('used')) count++; });
    localStorage.setItem(key, count);
  };
  window.resetOneUsage = function(key, btn) { localStorage.setItem(key, '0'); btn.parentElement.querySelectorAll('.usage-checkbox').forEach(b => b.classList.remove('used')); };

  // ─── RESET FUNCTION (INCLUDES SPELL SLOTS) ────────────
  window.resetAllByType = function(charKey, type) {
    const c = characterData[charKey];
    if (!c) return;
    // Reset feature uses
    c.features.forEach((f, i) => {
      if (f.resetOn === type || (type === 'long' && f.resetOn === 'short') || type === 'long') {
        localStorage.setItem(`uses-${charKey}-feat-${i}`, '0');
      }
    });
    // Reset spell slot uses
    if (c.spellSlots) {
      Object.keys(c.spellSlots).forEach(level => {
        if (level !== 'cantrips') {
          localStorage.setItem(`uses-${charKey}-slot-${level}`, '0');
        }
      });
    }
    switchTab(charKey);
  };

  function scheduleAutoSave(charKey) { if (autoSaveTimers[charKey]) clearTimeout(autoSaveTimers[charKey]); autoSaveTimers[charKey] = setTimeout(() => saveAllEdits(charKey), 3000); }
  function saveAllEdits(charKey) { const edits = {}; document.querySelectorAll(`[data-char="${charKey}"]`).forEach(el => edits[el.getAttribute('data-field')] = el.textContent.trim()); Object.entries(edits).forEach(([f, v]) => { db.ref(`characters/${charKey}/${f}`).set(v); }); }
  function addToChangeLog(charKey, field, value) { changeLog.unshift({ time: new Date().toLocaleTimeString(), char: characterData[charKey]?.name || charKey, field, value: value.substring(0, 50) }); if (changeLog.length > 10) changeLog = changeLog.slice(0, 10); db.ref('changeLog').set(changeLog); }

  // ─── SPELL DETAIL TOGGLE ──────────────────────────────
  window.toggleSpellDetail = function(safeId, charKey, element) {
    const detailPanel = document.getElementById(`spell-detail-${charKey}-${safeId}`);
    if (!detailPanel) return;
    const wasOpen = detailPanel.classList.contains('open');
    document.querySelectorAll(`.spell-detail-panel[data-char="${charKey}"]`).forEach(p => p.classList.remove('open'));
    document.querySelectorAll(`.spell-item-bar[data-char="${charKey}"]`).forEach(b => b.classList.remove('active'));
    if (!wasOpen) {
      detailPanel.classList.add('open');
      element.classList.add('active');
      const spellName = element.getAttribute('data-spell-name');
      const spell = spellDatabase[spellName];
      if (spell) {
        detailPanel.innerHTML = `<strong style="color:#d4c8ff;">${escapeHtml(spellName)}</strong><span class="spell-level-badge">Lvl ${spell.level}</span> · ${spell.school || ''}${spell.castingTime ? `<div><span style="color:#9088c0;">Cast:</span> ${spell.castingTime} | <span style="color:#9088c0;">Range:</span> ${spell.range} | <span style="color:#9088c0;">Dur:</span> ${spell.duration}</div>` : ''}<div style="margin-top:0.3rem;color:#c0b8e8;">${spell.desc}</div>`;
      }
    }
  };

  function getFilteredSpellOptions(charKey) { /* same */ }

  // ─── NOTES (FIXED) ────────────────────────────────────
  window.addCharNote = function(charKey) {
    const input = document.getElementById(`charNoteInput-${charKey}`);
    if (!input || !input.value.trim()) return;
    const noteText = input.value.trim();
    const noteRef = db.ref(`characterNotes/${charKey}`);
    noteRef.once('value').then(snapshot => {
      const notes = snapshot.val() || [];
      notes.unshift({ id: Date.now(), text: noteText, time: new Date().toLocaleString() });
      return noteRef.set(notes);
    }).then(() => {
      input.value = '';
      loadCharNotes(charKey);
    });
  };
  window.removeCharNote = function(charKey, noteId) {
    if (!confirm('Delete this note?')) return;
    db.ref(`characterNotes/${charKey}`).once('value').then(s => {
      const notes = s.val() || [];
      return db.ref(`characterNotes/${charKey}`).set(notes.filter(n => n.id !== noteId));
    }).then(() => loadCharNotes(charKey));
  };
  function loadCharNotes(charKey) {
    const container = document.getElementById(`charNotes-${charKey}`);
    if (!container) return;
    db.ref(`characterNotes/${charKey}`).once('value').then(s => {
      const notes = s.val() || [];
      container.innerHTML = notes.length === 0 ? '<p style="color:#9088c0;font-size:0.75rem;">No notes yet.</p>' : notes.map(n => `<div class="char-note-card"><div><div class="char-note-text">${escapeHtml(n.text)}</div><div class="char-note-time">${n.time}</div></div><button class="btn-remove" onclick="removeCharNote('${charKey}',${n.id})">✕</button></div>`).join('');
    });
  }

  // ─── RENDER SPELL SLOTS WITH CHECKBOXES ───────────────
  function renderSpellSlots(charKey, slots) {
    if (!slots) return '';
    return Object.entries(slots).map(([level, count]) => {
      const slotUses = (count !== "∞" && !isNaN(parseInt(count))) ? parseInt(count) : 0;
      const checkboxes = slotUses > 0 ? renderUsageBoxes(charKey, `slot-${level}`, slotUses, 'long') : '';
      return `<div class="spell-slot"><div class="slot-level">${level}</div><div class="slot-count">${count}</div>${checkboxes}</div>`;
    }).join('');
  }

  // … (rest of rendering functions unchanged, but integrated with the new usage boxes)
