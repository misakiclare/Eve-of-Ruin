  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function sid(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
  function med(val,fk,ck){return`<span class="editable-text" contenteditable="true" data-field="${fk}" data-char="${ck}" oninput="scheduleAutoSave('${ck}')">${esc(String(val))}</span>`;}
  function rub(ck,id,uses){if(uses==="∞"||!uses||uses===0)return'';const n=parseInt(uses);if(isNaN(n)||n>99)return'';const k=`uses-${ck}-${id}`;let u=parseInt(localStorage.getItem(k)||'0');let b='';for(let i=0;i<n;i++)b+=`<span class="usage-checkbox${i<u?' used':''}" onclick="toggleUsage(this,'${k}',${n})"></span>`;return`<div style="margin-top:0.15rem;display:flex;align-items:center;gap:0.2rem;"><span style="font-size:0.55rem;color:#9088c0;">Used:</span>${b}<button class="btn-sm" onclick="resetOneUsage('${k}',this)">↺</button></div>`;}
  window.toggleUsage=function(e,k,n){const a=e.parentElement.querySelectorAll('.usage-checkbox'),i=Array.from(a).indexOf(e);if(e.classList.contains('used')){for(let j=a.length-1;j>=i;j--)a[j].classList.remove('used');}else{for(let j=0;j<=i;j++)a[j].classList.add('used');}let c=0;a.forEach(x=>{if(x.classList.contains('used'))c++;});localStorage.setItem(k,c);};
  window.resetOneUsage=function(k,b){localStorage.setItem(k,'0');b.parentElement.querySelectorAll('.usage-checkbox').forEach(x=>x.classList.remove('used'));};
  window.resetAllByType=function(ck,t){const c=charData[ck];if(!c)return;c.features.forEach((f,i)=>{if(f.resetOn===t||t==='long')localStorage.setItem(`uses-${ck}-feat-${i}`,'0');});if(c.spellSlots){Object.keys(c.spellSlots).forEach(l=>{if(l!=='cantrips')localStorage.setItem(`uses-${ck}-slot-${l}`,'0');});}switchTab(ck);};
  function scheduleAutoSave(ck){if(autoSaveTimers[ck])clearTimeout(autoSaveTimers[ck]);autoSaveTimers[ck]=setTimeout(()=>saveAllEdits(ck),3000);}
  function saveAllEdits(ck){const e={};document.querySelectorAll(`[data-char="${ck}"]`).forEach(el=>e[el.getAttribute('data-field')]=el.textContent.trim());Object.entries(e).forEach(([f,v])=>{db.ref(`characters/${ck}/${f}`).set(v);});}

  // ─── SPELL DETAIL TOGGLE ──────────────────────────────
  window.toggleSpellDetail = function(safeId, charKey, element) {
    const panel = document.getElementById(`spell-detail-${charKey}-${safeId}`);
    if (!panel) return;
    const wasOpen = panel.classList.contains('open');
    document.querySelectorAll(`.spell-detail-panel[data-char="${charKey}"]`).forEach(p => p.classList.remove('open'));
    document.querySelectorAll(`.spell-item-bar[data-char="${charKey}"]`).forEach(b => b.classList.remove('active'));
    if (!wasOpen) {
      panel.classList.add('open');
      element.classList.add('active');
      const spellName = element.getAttribute('data-spell-name');
      const sp = spellDB[spellName];
      if (sp) {
        panel.innerHTML = `<strong style="color:#d4c8ff;">${esc(spellName)}</strong><span class="spell-level-badge">${typeof sp.lvl==='number'?'Level '+sp.lvl:sp.lvl}</span> · ${sp.sch||''}<div style="margin-top:0.2rem;"><span style="color:#9088c0;">Cast:</span> ${sp.cast||'—'} | <span style="color:#9088c0;">Range:</span> ${sp.rng||'—'} | <span style="color:#9088c0;">Dur:</span> ${sp.dur||'—'}</div><div style="margin-top:0.3rem;color:#c0b8e8;line-height:1.4;">${sp.dsc||'No description.'}</div>`;
      } else {
        panel.innerHTML = `<p style="color:#a098d0;">No detailed info for "${esc(spellName)}". Custom spell.</p>`;
      }
    }
  };

  function getFilteredOptions(ck){const a=classMap[ck]||[];const e=Object.entries(spellDB).filter(([_,d])=>d.cls&&d.cls.some(c=>a.includes(c)));e.sort((a,b)=>{const la=typeof a[1].lvl==='number'?a[1].lvl:99;const lb=typeof b[1].lvl==='number'?b[1].lvl:99;return la-lb||a[0].localeCompare(b[0]);});return e.map(([n,d])=>`<option value="${esc(n)}">${typeof d.lvl==='number'?'Lvl '+d.lvl:d.lvl} — ${esc(n)}</option>`).join('');}
  window.showSpellInfo=function(ck){const s=document.getElementById(`spellSelect-${ck}`),i=document.getElementById(`spellInfo-${ck}`);if(!s||!i)return;const n=s.value;if(!n){i.style.display='none';return;}const sp=spellDB[n];i.style.display='block';i.innerHTML=sp?`<strong style="color:#d4c8ff;">${esc(n)}</strong><span class="spell-level-badge">${typeof sp.lvl==='number'?'Lvl '+sp.lvl:sp.lvl}</span><div style="color:#c0b8e8;margin-top:0.2rem;">${sp.dsc}</div>`:'<p>No description.</p>';};
  window.addSpellFromDropdown=function(ck){const s=document.getElementById(`spellSelect-${ck}`);if(!s?.value)return;const n=s.value;db.ref(`characters/${ck}/spells`).once('value').then(sn=>{const c=sn.val()||[];if(!c.includes(n)){c.push(n);return db.ref(`characters/${ck}/spells`).set(c);}}).then(()=>{loadDynamicLists(ck);s.value='';document.getElementById(`spellInfo-${ck}`).style.display='none';});};

  window.removeItem=function(btn,ck,cat,name){if(!confirm('Remove?'))return;db.ref(`characters/${ck}/${cat}`).once('value').then(s=>{const i=s.val()||[];return db.ref(`characters/${ck}/${cat}`).set(i.filter(x=>(typeof x==='string'?x!==name:x.name!==name)));}).then(()=>{btn.closest('.spell-item-bar, li').remove();});};
  window.addCharNote=function(ck){const i=document.getElementById(`charNoteInput-${ck}`);if(!i?.value.trim())return;const t=i.value.trim();db.ref(`characterNotes/${ck}`).once('value').then(s=>{const n=s.val()||[];n.unshift({id:Date.now(),text:t,time:new Date().toLocaleString()});return db.ref(`characterNotes/${ck}`).set(n);}).then(()=>{i.value='';loadCharNotes(ck);});};

  function loadCharNotes(ck){const c=document.getElementById(`charNotes-${ck}`);if(!c)return;db.ref(`characterNotes/${ck}`).once('value').then(s=>{const n=s.val()||[];c.innerHTML=n.length===0?'<p style="color:#9088c0;font-size:0.75rem;">No notes yet.</p>':n.map(x=>`<div class="char-note-card"><div><div class="char-note-text">${esc(x.text)}</div><div class="char-note-time">${x.time}</div></div><button class="btn-remove" onclick="removeCharNote('${ck}',${x.id})">✕</button></div>`).join('');});}
  window.addSessionNote=function(){const d=document.getElementById('sessionDate'),t=document.getElementById('sessionTitle'),n=document.getElementById('sessionNotes');if(!t?.value.trim())return;const note={id:Date.now(),date:d?.value||new Date().toISOString().split('T')[0],title:t.value.trim(),notes:n?.value.trim()||''};db.ref('sessionNotes').once('value').then(s=>{const ns=s.val()||[];ns.push(note);return db.ref('sessionNotes').set(ns);}).then(()=>{sessionNotes.push(note);renderSessionNotes();d.value='';t.value='';n.value='';});};
  window.addBulletToForm=function(){const n=document.getElementById('sessionNotes');if(!n)return;const p=n.selectionStart;n.value=n.value.substring(0,p)+'\n• '+n.value.substring(p);n.focus();n.selectionStart=n.selectionEnd=p+3;};

  function renderSessionNotes(){const c=document.getElementById('sessionNotesContainer');if(!c)return;let a=[...sessionNotes];if(!a.find(x=>x.id==='session0'))a.unshift(sessionZero);c.innerHTML=a.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(n=>{const b=n.notes?n.notes.split('\n').filter(l=>l.trim()):[];return`<div class="session-note-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.4rem;border-bottom:1px solid rgba(140,160,200,0.3);padding-bottom:0.3rem;margin-bottom:0.4rem;"><span style="color:#b8c8e0;font-size:0.7rem;background:rgba(60,80,140,0.4);padding:0.15rem 0.4rem;border-radius:0.4rem;">📅 ${n.date}</span><span style="color:#d4d8ff;font-weight:bold;">${esc(n.title)}</span>${n.id!=='session0'?`<button class="btn-remove" onclick="removeSessionNote(${n.id})">✕</button>`:''}</div>${b.length?'<ul style="list-style:none;padding:0;">'+b.map(l=>`<li style="padding:0.15rem 0;color:#c0c8e8;font-size:0.8rem;">• ${esc(l.replace(/^•\s*/,''))}</li>`).join('')+'</ul>':'<p style="color:#9088c0;font-size:0.75rem;">No details.</p>'}</div>`;}).join('');}

  function renderSpells(ck,spells){const c=document.getElementById(`spellsList-${ck}`);if(!c)return;const af=c.querySelector('.add-form'),dd=c.querySelector('.spell-dropdown-section');c.innerHTML='';spells.forEach(sn=>{const sp=spellDB[sn];const si=sid(sn);const d=document.createElement('div');d.className='spell-item-bar';d.setAttribute('data-char',ck);d.setAttribute('data-spell-name',sn);d.innerHTML=`<div class="spell-content" onclick="toggleSpellDetail('${si}','${ck}',this.parentElement)"><span class="editable-text" contenteditable="true">${esc(sn)}</span>${sp?`<span class="spell-level-badge">${typeof sp.lvl==='number'?'Lvl '+sp.lvl:sp.lvl}</span>`:''}</div><div class="spell-actions"><button class="btn-remove" onclick="event.stopPropagation();removeItem(this,'${ck}','spells','${esc(sn)}')">✕</button></div>`;c.appendChild(d);const p=document.createElement('div');p.className='spell-detail-panel';p.id=`spell-detail-${ck}-${si}`;p.setAttribute('data-char',ck);c.appendChild(p);});if(dd)c.appendChild(dd);if(af)c.appendChild(af);}

  function loadDynamicLists(ck){const c=charData[ck];if(!c)return;db.ref(`characters/${ck}/spells`).once('value').then(s=>{const sp=s.val()||c.spells||[];if(!s.val())db.ref(`characters/${ck}/spells`).set(c.spells||[]);renderSpells(ck,sp);});db.ref(`characters/${ck}/equipment`).once('value').then(s=>{const eq=s.val()||c.equipment||[];if(!s.val())db.ref(`characters/${ck}/equipment`).set(c.equipment||[]);renderEquipment(ck,eq);});db.ref(`characters/${ck}/customFeatures`).once('value').then(s=>{const fe=s.val();if(fe&&Array.isArray(fe))renderCustomFeats(ck,fe);});loadCharNotes(ck);}

  function renderCharSheet(ck){const c=charData[ck];if(!c)return'<p>Not found</p>';const sh=Object.entries(c.stats).map(([n,d])=>`<div class="stat-box"><div class="stat-label">${n}</div><div class="stat-value">${med(d.score,`stat-${n}-score`,ck)}</div><span class="stat-mod">${d.mod>=0?'+'+d.mod:d.mod}</span></div>`).join('');const ah=c.attacks.map((a,i)=>`<div style="display:flex;justify-content:space-between;padding:0.3rem;border-bottom:1px solid rgba(100,80,160,0.2);flex-wrap:wrap;gap:0.2rem;font-size:0.8rem;"><span style="font-weight:bold;color:#d4c8ff;">⚔️ ${med(a.name,`atk-name-${i}`,ck)}</span><span style="color:#c8b8f0;">${med(a.bonus,`atk-bonus-${i}`,ck)}</span><span style="color:#e8d8ff;">${med(a.damage,`atk-dmg-${i}`,ck)}</span></div>`).join('');const fh=c.features.map((f,i)=>`<div class="ability-card"><div class="ability-name">${med(f.name,`feat-name-${i}`,ck)}${f.cost?`<span class="ability-cost">${esc(f.cost)}</span>`:''}</div><div class="ability-desc">${med(f.desc,`feat-desc-${i}`,ck)}</div>${rub(ck,`feat-${i}`,f.uses)}</div>`).join('');const skh=c.skills?Object.entries(c.skills).map(([n,b])=>`<div class="info-item"><span class="info-label">${n}</span><span class="info-value" style="float:right;">${b>=0?'+'+b:b}</span></div>`).join(''):'';const slh=c.spellSlots?`<div class="spell-slot-grid">${Object.entries(c.spellSlots).map(([l,ct])=>{const su=(ct!=="∞"&&!isNaN(parseInt(ct)))?parseInt(ct):0;return`<div class="spell-slot"><div class="slot-level">${l}</div><div class="slot-count">${ct}</div>${su>0?rub(ck,`slot-${l}`,su):''}</div>`;}).join('')}</div>`:'';const ph=c.combat?`<div class="info-grid" style="margin-top:0.3rem;">${c.combat.passivePerception?`<div class="info-item"><span class="info-label">Pass. Perc.</span><span class="info-value">${c.combat.passivePerception}</span></div>`:''}${c.combat.passiveInvestigation?`<div class="info-item"><span class="info-label">Pass. Inv.</span><span class="info-value">${c.combat.passiveInvestigation}</span></div>`:''}${c.combat.passiveInsight?`<div class="info-item"><span class="info-label">Pass. Ins.</span><span class="info-value">${c.combat.passiveInsight}</span></div>`:''}</div>`:'';return`<div class="char-sheet"><div class="sheet-section"><div class="section-header"><span>📜 ${med(c.name,'name',ck)}</span><div><button class="btn-rest" onclick="resetAllByType('${ck}','short')">🌅 Short</button><button class="btn-rest" onclick="resetAllByType('${ck}','long')">🌙 Long</button></div></div><div class="info-grid"><div class="info-item"><span class="info-label">Class</span><span class="info-value">${med(c.classLevel,'classLevel',ck)}</span></div><div class="info-item"><span class="info-label">Race</span><span class="info-value">${med(c.race,'race',ck)}</span></div><div class="info-item"><span class="info-label">Bg</span><span class="info-value">${med(c.background,'background',ck)}</span></div><div class="info-item"><span class="info-label">Player</span><span class="info-value">${med(c.playerName,'playerName',ck)}</span></div></div></div><div class="sheet-section"><div class="section-header">📊 ABILITY SCORES</div><div class="stat-row">${sh}</div><div class="info-grid" style="margin-top:0.4rem;"><div class="info-item"><span class="info-label">AC</span><span class="info-value">${med(c.combat.ac,'ac',ck)}</span></div><div class="info-item"><span class="info-label">HP</span><span class="info-value">${med(c.combat.hp,'hp',ck)}</span></div><div class="info-item"><span class="info-label">Speed</span><span class="info-value">${med(c.combat.speed,'speed',ck)} ft.</span></div><div class="info-item"><span class="info-label">Init</span><span class="info-value">+${c.combat.initiative}</span></div></div>${ph}</div>${skh?`<div class="sheet-section"><div class="section-header">🎯 SKILLS</div><div class="info-grid">${skh}</div></div>`:''}<div class="sheet-section"><div class="section-header">⚔️ ATTACKS</div>${ah}</div>${c.spellSlots?`<div class="sheet-section"><div class="section-header">🔮 SPELL SLOTS</div>${slh}</div>`:''}<div class="sheet-section"><div class="section-header">📜 SPELLS <span style="font-size:0.6rem;color:#9088c0;">Click name for details</span></div><div id="spellsList-${ck}"></div><div class="spell-dropdown-section"><select id="spellSelect-${ck}" onchange="showSpellInfo('${ck}')"><option value="">— Browse spells —</option>${getFilteredOptions(ck)}</select><div id="spellInfo-${ck}" class="spell-info-popup"></div><button class="btn-add" onclick="addSpellFromDropdown('${ck}')" style="margin-top:0.3rem;">+ Add to List</button></div><div class="add-form"><input type="text" id="newSpell-${ck}" placeholder="Custom spell..."><button class="btn-add" onclick="addSpell('${ck}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">✨ FEATURES</div><div id="featList-${ck}">${fh}</div><div class="add-form"><input type="text" id="newFeatName-${ck}" placeholder="Name" style="flex:1;"><input type="text" id="newFeatDesc-${ck}" placeholder="Desc" style="flex:2;"><input type="text" id="newFeatUses-${ck}" placeholder="Uses" style="width:50px;"><button class="btn-add" onclick="addFeature('${ck}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">🎒 EQUIPMENT</div><ul class="equipment-list" id="equipList-${ck}"></ul><div class="add-form"><input type="text" id="newEquip-${ck}" placeholder="Item"><button class="btn-add" onclick="addEquipment('${ck}')">+ Add</button></div></div><div class="sheet-section"><div class="section-header">📖 BACKSTORY</div><div style="color:#c0b8e8;line-height:1.6;font-style:italic;font-size:0.8rem;">${med(c.backstory,'backstory',ck)}</div></div><div class="sheet-section"><div class="section-header">📝 PLAYER NOTES</div><div id="charNotes-${ck}"><p style="color:#9088c0;font-size:0.75rem;">Loading notes...</p></div><div class="add-form" style="flex-wrap:nowrap;"><input type="text" id="charNoteInput-${ck}" placeholder="Add a note..." style="flex:1;"><button class="btn-save-note" onclick="addCharNote('${ck}')">Save Note</button></div></div></div>`;}

  function renderDMPage(){return`<div style="text-align:center;padding:0.5rem;"><h2 style="color:#d4c8ff;">🔐 DM Stargate</h2><p style="color:#a098d0;">Enter PIN:</p><input type="password" id="pinInput" style="background:rgba(20,15,40,0.7);border:2px solid rgba(140,120,220,0.5);color:#e8e0ff;padding:0.4rem 0.8rem;border-radius:0.3rem;font-size:1.1rem;text-align:center;letter-spacing:4px;margin:0.6rem 0;" maxlength="8"><br><button class="btn-rest" id="pinSubmit">Unlock</button><p id="pinError" style="color:#e0a0c0;"></p><div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:1rem;"><div class="section-header" style="color:#d4c8ff;">🗝️ SECRETS</div>${Object.entries(dmSecrets).map(([k,s])=>`<div style="border:2px dashed rgba(140,120,220,0.5);background:rgba(20,15,35,0.6);padding:0.6rem;border-radius:0.5rem;margin:0.5rem 0;"><div style="color:#d4c8ff;font-weight:bold;">${charData[k]?.name||k}</div><div style="color:#c8b8f0;font-size:0.8rem;">${s}</div></div>`).join('')}<div class="section-header" style="color:#d4c8ff;">📋 CHANGE LOG</div><div class="change-log" id="changeLogContainer"></div><div class="section-header" style="color:#d4c8ff;">📝 SESSION NOTES</div><div style="border:2px dashed rgba(140,160,200,0.4);padding:0.8rem;margin:0.5rem 0;background:rgba(18,20,35,0.5);"><div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.4rem;"><div style="flex:1;"><input type="date" id="sessionDate" style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div><div style="flex:2;"><input type="text" id="sessionTitle" placeholder="Title..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div></div><div><button class="btn-sm" onclick="addBulletToForm()">• +</button><textarea id="sessionNotes" rows="4" placeholder="• Notes..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.4rem;resize:vertical;margin-top:0.2rem;"></textarea></div><button class="btn-add" onclick="addSessionNote()" style="width:100%;margin-top:0.3rem;">+ Save Note</button></div><div id="sessionNotesContainer"></div></div></div>`;}
  function renderChangeLog(){const c=document.getElementById('changeLogContainer');if(!c)return;c.innerHTML=changeLog.length===0?'<p style="color:#9088c0;">No changes.</p>':changeLog.map(e=>`<div class="log-entry">[${e.time}] <strong>${e.char}</strong> · ${e.field}: ${e.value}</div>`).join('');}

  function setActiveTab(id){['dmpc','drunken','chronurgy','grave','psi','dm'].forEach(x=>{const b=document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1));if(b)b.classList.remove('active');});const b=document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1));if(b)b.classList.add('active');}
  function switchTab(id){Object.values(autoSaveTimers).forEach(t=>clearTimeout(t));currentTab=id;setActiveTab(id);if(id==='dm'){dmAuthenticated=false;contentPanel.innerHTML=renderDMPage();document.getElementById('pinSubmit').addEventListener('click',()=>{if(document.getElementById('pinInput').value===DM_PIN){dmAuthenticated=true;document.getElementById('dmSecretsContainer').style.display='block';db.ref('changeLog').once('value').then(s=>{changeLog=s.val()||[];renderChangeLog();});db.ref('sessionNotes').once('value').then(s=>{sessionNotes=s.val()||[];renderSessionNotes();});}});}else{contentPanel.innerHTML=renderCharSheet(id);setTimeout(()=>loadDynamicLists(id),150);dmAuthenticated=false;}}

  document.getElementById('tabDmpc').addEventListener('click',()=>switchTab('dmpc'));
  document.getElementById('tabDrunken').addEventListener('click',()=>switchTab('drunken'));
  document.getElementById('tabChronurgy').addEventListener('click',()=>switchTab('chronurgy'));
  document.getElementById('tabGrave').addEventListener('click',()=>switchTab('grave'));
  document.getElementById('tabPsi').addEventListener('click',()=>switchTab('psi'));
  document.getElementById('tabDM').addEventListener('click',()=>switchTab('dm'));
  db.ref('changeLog').once('value').then(s=>{changeLog=s.val()||[];});
  switchTab('dmpc');
})();
</script>
</body>
</html>
