  const dmSecrets = { dmpc:"Memories taken by Raven Queen.", drunken:"Monastery erased.", chronurgy:"Future self assembling Rod.", grave:"Wind Duke scholar.", psi:"Sleeper agent." };
  const sessionZero = { id:"session0", date:"Session 0", title:"✦ The Gathering at the Crossroads Inn ✦", notes:"Party meets at the Crossroads Inn." };

  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const sid = s => s.replace(/[^a-zA-Z0-9]/g,'_');
  function med(v,fk,ck){ return `<span class="editable-text" contenteditable="true" data-field="${fk}" data-char="${ck}" oninput="scheduleAutoSave('${ck}')">${esc(String(v))}</span>`; }
  function rbox(ck,id,uses){ if(uses==="∞"||!uses||uses===0)return'';const n=parseInt(uses);if(isNaN(n)||n>99)return'';const k=`uses-${ck}-${id}`;let u=parseInt(localStorage.getItem(k)||'0');let b='';for(let i=0;i<n;i++)b+=`<span class="usage-checkbox${i<u?' used':''}" onclick="toggleUsage(this,'${k}',${n})"></span>`;return`<div style="margin-top:0.15rem;display:flex;align-items:center;gap:0.2rem;"><span style="font-size:0.55rem;color:#9088c0;">Used:</span>${b}<button class="btn-sm" onclick="resetOneUsage('${k}',this)">↺</button></div>`; }
  window.toggleUsage=function(e,k,n){const a=e.parentElement.querySelectorAll('.usage-checkbox'),i=Array.from(a).indexOf(e);if(e.classList.contains('used')){for(let j=a.length-1;j>=i;j--)a[j].classList.remove('used');}else{for(let j=0;j<=i;j++)a[j].classList.add('used');}let c=0;a.forEach(x=>{if(x.classList.contains('used'))c++;});localStorage.setItem(k,c);};
  window.resetOneUsage=function(k,b){localStorage.setItem(k,'0');b.parentElement.querySelectorAll('.usage-checkbox').forEach(x=>x.classList.remove('used'));};
  window.resetAllByType=function(ck,t){const c=charData[ck];if(!c)return;c.features.forEach((f,i)=>{if(f.resetOn===t||t==='long')localStorage.setItem(`uses-${ck}-feat-${i}`,'0');});if(c.spellSlots){Object.keys(c.spellSlots).forEach(l=>{if(l!=='cantrips')localStorage.setItem(`uses-${ck}-slot-${l}`,'0');});}switchTab(ck);};
  function scheduleAutoSave(ck){if(autoSaveTimers[ck])clearTimeout(autoSaveTimers[ck]);autoSaveTimers[ck]=setTimeout(()=>saveAllEdits(ck),3000);}
  function saveAllEdits(ck){const e={};document.querySelectorAll(`[data-char="${ck}"]`).forEach(el=>e[el.getAttribute('data-field')]=el.textContent.trim());Object.entries(e).forEach(([f,v])=>{db.ref(`characters/${ck}/${f}`).set(v);});}

  window.toggleSpellDetail = function(spellName, charKey, element) {
    const safeId = sid(spellName);
    const panel = document.getElementById(`spell-detail-${charKey}-${safeId}`);
    if (!panel) return;
    const wasOpen = panel.classList.contains('open');
    document.querySelectorAll(`.spell-detail-panel[data-char="${charKey}"]`).forEach(p => p.classList.remove('open'));
    document.querySelectorAll(`.spell-item-bar[data-char="${charKey}"]`).forEach(b => b.classList.remove('active'));
    if (!wasOpen) {
      panel.classList.add('open');
      element.classList.add('active');
      const spell = spellDB[spellName];
      if (spell) {
        panel.innerHTML = `<strong style="color:#d4c8ff;">${esc(spellName)}</strong><span class="spell-level-badge">${typeof spell.l==='number'?'Lvl '+spell.l:spell.l}</span> · ${spell.s||''}<div style="margin-top:0.2rem;"><span style="color:#9088c0;">Cast:</span> ${spell.cast||'—'} | <span style="color:#9088c0;">Range:</span> ${spell.rng||'—'} | <span style="color:#9088c0;">Dur:</span> ${spell.dur||'—'}</div><div style="margin-top:0.3rem;color:#c0b8e8;line-height:1.4;">${spell.desc||'No description.'}</div>`;
      } else {
        panel.innerHTML = `<p style="color:#a098d0;">Custom spell — no description available.</p>`;
      }
    }
  };

  window.addAttack = function(ck) {
    const name = document.getElementById(`newAtkName-${ck}`)?.value.trim();
    const bonus = document.getElementById(`newAtkBonus-${ck}`)?.value.trim();
    const damage = document.getElementById(`newAtkDmg-${ck}`)?.value.trim();
    const notes = document.getElementById(`newAtkNotes-${ck}`)?.value.trim();
    if (!name) return;
    const atk = { name, bonus: bonus || '+0', damage: damage || '1d4', notes: notes || '' };
    db.ref(`characters/${ck}/attacks`).once('value').then(s => {
      const arr = s.val() || [];
      arr.push(atk);
      return db.ref(`characters/${ck}/attacks`).set(arr);
    }).then(() => {
      loadDynamicLists(ck);
      document.getElementById(`newAtkName-${ck}`).value = '';
      document.getElementById(`newAtkBonus-${ck}`).value = '';
      document.getElementById(`newAtkDmg-${ck}`).value = '';
      document.getElementById(`newAtkNotes-${ck}`).value = '';
    });
  };

  window.removeAttack = function(btn, ck, index) {
    if (!confirm('Delete attack?')) return;
    db.ref(`characters/${ck}/attacks`).once('value').then(s => {
      const arr = s.val() || [];
      arr.splice(index, 1);
      return db.ref(`characters/${ck}/attacks`).set(arr);
    }).then(() => btn.closest('.attack-row').remove());
  };

  function renderAttacks(ck, attacks) {
    const container = document.getElementById(`attacksList-${ck}`);

  function renderSpells(ck,spells){
    const container = document.getElementById(`spellsList-${ck}`);

      container.appendChild(div);

  window.addCharNote=function(ck){const i=document.getElementById(`charNoteInput-${ck}`);if(!i?.value.trim())return;const t=i.value.trim();db.ref(`characterNotes/${ck}`).once('value').then(s=>{const n=s.val()||[];n.unshift({id:Date.now(),text:t,time:new Date().toLocaleString()});return db.ref(`characterNotes/${ck}`).set(n);}).then(()=>{i.value='';loadCharNotes(ck);});};
  window.removeCharNote=function(ck,id){if(!confirm('Delete?'))return;db.ref(`characterNotes/${ck}`).once('value').then(s=>{const n=s.val()||[];return db.ref(`characterNotes/${ck}`).set(n.filter(x=>x.id!==id));}).then(()=>loadCharNotes(ck));};
  function loadCharNotes(ck){const c=document.getElementById(`charNotes-${ck}`);if(!c)return;db.ref(`characterNotes/${ck}`).once('value').then(s=>{const n=s.val()||[];c.innerHTML=n.length===0?'<p style="color:#9088c0;font-size:0.75rem;">No notes yet.</p>':n.map(x=>`<div class="char-note-card"><div><div style="color:#c0c8e8;font-size:0.8rem;">${esc(x.text)}</div><div style="color:#9088c0;font-size:0.65rem;">${x.time}</div></div><button class="btn-remove" onclick="removeCharNote('${ck}',${x.id})">✕</button></div>`).join('');});}
  window.addSessionNote=function(){const d=document.getElementById('sessionDate'),t=document.getElementById('sessionTitle'),n=document.getElementById('sessionNotes');if(!t?.value.trim())return;const note={id:Date.now(),date:d?.value||new Date().toISOString().split('T')[0],title:t.value.trim(),notes:n?.value.trim()||''};db.ref('sessionNotes').once('value').then(s=>{const ns=s.val()||[];ns.push(note);return db.ref('sessionNotes').set(ns);}).then(()=>{sessionNotes.push(note);renderSessionNotes();d.value='';t.value='';n.value='';});};
  window.addBulletToForm=function(){const n=document.getElementById('sessionNotes');if(!n)return;const p=n.selectionStart;n.value=n.value.substring(0,p)+'\n• '+n.value.substring(p);n.focus();n.selectionStart=n.selectionEnd=p+3;};

  function renderSessionNotes(){const c=document.getElementById('sessionNotesContainer');if(!c)return;let a=[...sessionNotes];if(!a.find(x=>x.id==='session0'))a.unshift(sessionZero);c.innerHTML=a.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(n=>{const b=n.notes?n.notes.split('\n').filter(l=>l.trim()):[];return`<div class="session-note-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.4rem;border-bottom:1px solid rgba(140,160,200,0.3);padding-bottom:0.3rem;margin-bottom:0.4rem;"><span style="color:#b8c8e0;font-size:0.7rem;background:rgba(60,80,140,0.4);padding:0.15rem 0.4rem;border-radius:0.4rem;">📅 ${n.date}</span><span style="color:#d4d8ff;font-weight:bold;">${esc(n.title)}</span>${n.id!=='session0'?`<button class="btn-remove" onclick="removeSessionNote(${n.id})">✕</button>`:''}</div>${b.length?'<ul style="list-style:none;padding:0;">'+b.map(l=>`<li style="padding:0.15rem 0;color:#c0c8e8;font-size:0.8rem;">• ${esc(l.replace(/^•\s*/,''))}</li>`).join('')+'</ul>':'<p style="color:#9088c0;">No details.</p>'}</div>`;}).join('');}

  function loadDynamicLists(ck){

  function filteredOptions(ck){

      ${c.spellSlots?`<div class="sheet-section"><div class="section-header">🔮 SPELL SLOTS</div>${spellSlotsHtml}</div>`:''}
      <div class="sheet-section"><div class="section-header">📜 SPELLS <span style="font-size:0.6rem;color:#9088c0;">Click name for details</span></div><div id="spellsList-${ck}"></div>
        <div class="spell-dropdown-section"><select id="spellSelect-${ck}" onchange="showSpellInfo('${ck}')"><option value="">— Browse spells —</option>${filteredOptions(ck)}</select><div id="spellInfo-${ck}" class="spell-info-popup"></div><button class="btn-add" onclick="addSpellFromDropdown('${ck}')" style="margin-top:0.3rem;">+ Add to List</button></div>
        <div class="add-form"><input type="text" id="newSpell-${ck}" placeholder="Custom spell..."><button class="btn-add" onclick="addSpell('${ck}')">+ Add</button></div>
      </div>
      <div class="sheet-section"><div class="section-header">✨ FEATURES</div><div id="featList-${ck}">${featuresHtml}</div><div class="add-form"><input type="text" id="newFeatName-${ck}" placeholder="Name" style="flex:1;"><input type="text" id="newFeatDesc-${ck}" placeholder="Desc" style="flex:2;"><input type="text" id="newFeatUses-${ck}" placeholder="Uses" style="width:50px;"><button class="btn-add" onclick="addFeature('${ck}')">+ Add</button></div></div>
      ${actionsHtml ? `<div class="sheet-section"><div class="section-header">🎬 ACTIONS</div>${actionsHtml}</div>` : ''}
      ${bonusHtml ? `<div class="sheet-section"><div class="section-header">⚡ BONUS ACTIONS</div>${bonusHtml}</div>` : ''}
      <div class="sheet-section"><div class="section-header">🎒 EQUIPMENT</div><ul class="equipment-list" id="equipList-${ck}"></ul><div class="add-form"><input type="text" id="newEquip-${ck}" placeholder="Item"><button class="btn-add" onclick="addEquipment('${ck}')">+ Add</button></div></div>
      <div class="sheet-section"><div class="section-header">📖 BACKSTORY</div><div style="color:#c0b8e8;line-height:1.6;font-style:italic;font-size:0.8rem;">${med(c.backstory,'backstory',ck)}</div></div>
      <div class="sheet-section"><div class="section-header">📝 PLAYER NOTES</div><div id="charNotes-${ck}"><p style="color:#9088c0;">Loading...</p></div><div class="add-form" style="flex-wrap:nowrap;"><input type="text" id="charNoteInput-${ck}" placeholder="Add a note..." style="flex:1;"><button class="btn-save-note" onclick="addCharNote('${ck}')">Save Note</button></div></div>
    </div>`;
  }

  function renderDMPage(){return`<div style="text-align:center;padding:0.5rem;"><h2 style="color:#d4c8ff;">🔐 DM Stargate</h2><p>PIN:</p><input type="password" id="pinInput" style="background:rgba(20,15,40,0.7);border:2px solid rgba(140,120,220,0.5);color:#e8e0ff;padding:0.4rem 0.8rem;border-radius:0.3rem;font-size:1.1rem;text-align:center;letter-spacing:4px;margin:0.6rem 0;" maxlength="8"><br><button class="btn-rest" id="pinSubmit">Unlock</button><p id="pinError" style="color:#e0a0c0;"></p><div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:1rem;"><div class="section-header" style="color:#d4c8ff;">🗝️ SECRETS</div>${Object.entries(dmSecrets).map(([k,s])=>`<div style="border:2px dashed rgba(140,120,220,0.5);background:rgba(20,15,35,0.6);padding:0.6rem;border-radius:0.5rem;margin:0.5rem 0;"><div style="color:#d4c8ff;font-weight:bold;">${charData[k]?.name||k}</div><div style="color:#c8b8f0;">${s}</div></div>`).join('')}<div class="section-header" style="color:#d4c8ff;">📋 CHANGE LOG</div><div class="change-log" id="changeLogContainer"></div><div class="section-header" style="color:#d4c8ff;">📝 SESSION NOTES</div><div style="border:2px dashed rgba(140,160,200,0.4);padding:0.8rem;margin:0.5rem 0;background:rgba(18,20,35,0.5);"><div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.4rem;"><div style="flex:1;"><input type="date" id="sessionDate" style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div><div style="flex:2;"><input type="text" id="sessionTitle" placeholder="Title..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;"></div></div><div><button class="btn-sm" onclick="addBulletToForm()">• +</button><textarea id="sessionNotes" rows="4" placeholder="• Notes..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.4rem;resize:vertical;margin-top:0.2rem;"></textarea></div><button class="btn-add" onclick="addSessionNote()" style="width:100%;margin-top:0.3rem;">+ Save Note</button></div><div id="sessionNotesContainer"></div></div></div>`;}
  function renderChangeLog(){const c=document.getElementById('changeLogContainer');if(!c)return;c.innerHTML=changeLog.length===0?'<p style="color:#9088c0;">No changes.</p>':changeLog.map(e=>`<div class="log-entry">[${e.time}] <strong>${e.char}</strong> · ${e.field}: ${e.value}</div>`).join('');}

  function setActiveTab(id){['dmpc','drunken','chronurgy','grave','psi','dm'].forEach(x=>{const b=document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1));if(b)b.classList.remove('active');});const b=document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1));if(b)b.classList.add('active');}
  function switchTab(id){Object.values(autoSaveTimers).forEach(t=>clearTimeout(t));currentTab=id;setActiveTab(id);if(id==='dm'){panel.innerHTML=renderDMPage();document.getElementById('pinSubmit').addEventListener('click',()=>{if(document.getElementById('pinInput').value===PIN){document.getElementById('dmSecretsContainer').style.display='block';db.ref('changeLog').once('value').then(s=>{changeLog=s.val()||[];renderChangeLog();});db.ref('sessionNotes').once('value').then(s=>{sessionNotes=s.val()||[];renderSessionNotes();});}});}else{panel.innerHTML=renderCharSheet(id);setTimeout(()=>loadDynamicLists(id),150);}}

  document.getElementById('tabDmpc').addEventListener('click',()=>switchTab('dmpc'));
  document.getElementById('tabDrunken').addEventListener('click',()=>switchTab('drunken'));
  document.getElementById('tabChronurgy').addEventListener('click',()=>switchTab('chronurgy'));
  document.getElementById('tabGrave').addEventListener('click',()=>switchTab('grave'));
  document.getElementById('tabPsi').addEventListener('click',()=>switchTab('psi'));
  document.getElementById('tabDM').addEventListener('click',()=>switchTab('dm'));
  db.ref('changeLog').once('value').then(s=>{changeLog=s.val()||[];});
  switchTab('dmpc');
})();
</script>
</body>
</html>
