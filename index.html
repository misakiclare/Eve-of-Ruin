    // ─── HELPERS ──────────────────────────────────────────
    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function makeEditable(value, fieldKey, charKey) {
      const id = `ed-${charKey}-${fieldKey}-${Math.random().toString(36).substr(2,5)}`;
      return `<span class="editable-text" id="${id}" contenteditable="true" data-field="${fieldKey}" data-char="${charKey}" oninput="scheduleAutoSave('${charKey}')" onblur="saveFieldImmediate('${charKey}','${fieldKey}',this)">${escapeHtml(String(value))}</span>`;
    }

    function renderUsageBoxes(charKey, featIdx, uses, resetOn) {
      if (uses === "∞" || uses === "Passive" || !uses || uses === 0) return '';
      const num = parseInt(uses);
      if (isNaN(num) || num <= 0 || num > 20) return '';
      const key = `uses-${charKey}-feat-${featIdx}`;
      let used = parseInt(localStorage.getItem(key) || '0');
      if (used > num) used = num;
      let boxes = '';
      for (let i = 0; i < num; i++) boxes += `<span class="usage-checkbox${i < used ? ' used' : ''}" onclick="toggleUsage(this,'${key}',${num})"></span>`;
      return `<div style="margin-top:0.15rem;display:flex;align-items:center;gap:0.2rem;"><span style="font-size:0.55rem;color:#9088c0;">Used:</span>${boxes}<button class="btn-sm" onclick="resetOneUsage('${key}',this)">↺</button></div>`;
    }

    window.toggleUsage = function(el, key, num) {
      const all = el.parentElement.querySelectorAll('.usage-checkbox');
      const idx = Array.from(all).indexOf(el);
      if (el.classList.contains('used')) { for (let i = all.length-1; i >= idx; i--) all[i].classList.remove('used'); }
      else { for (let i = 0; i <= idx; i++) all[i].classList.add('used'); }
      let count = 0; all.forEach(b => { if (b.classList.contains('used')) count++; });
      localStorage.setItem(key, count);
    };
    window.resetOneUsage = function(key, btn) { localStorage.setItem(key, '0'); btn.parentElement.querySelectorAll('.usage-checkbox').forEach(b => b.classList.remove('used')); };
    window.resetAllByType = function(charKey, type) {
      const features = characterData[charKey]?.features || [];
      features.forEach((f, i) => { if (f.resetOn === type || type === 'long') localStorage.setItem(`uses-${charKey}-feat-${i}`, '0'); });
      switchTab(charKey);
    };

    function scheduleAutoSave(charKey) {
      if (autoSaveTimers[charKey]) clearTimeout(autoSaveTimers[charKey]);
      autoSaveTimers[charKey] = setTimeout(() => saveAllEdits(charKey, true), 3000);
    }
    window.saveFieldImmediate = function(charKey, field, el) {
      db.ref(`characters/${charKey}/${field}`).set(el.textContent.trim());
      addToChangeLog(charKey, field, el.textContent.trim());
    };
    function saveAllEdits(charKey) {
      const edits = {};
      document.querySelectorAll(`[data-char="${charKey}"]`).forEach(el => edits[el.getAttribute('data-field')] = el.textContent.trim());
      Object.entries(edits).forEach(([f, v]) => { db.ref(`characters/${charKey}/${f}`).set(v); addToChangeLog(charKey, f, v); });
    }
    function addToChangeLog(charKey, field, value) {
      changeLog.unshift({ time: new Date().toLocaleTimeString(), char: characterData[charKey]?.name || charKey, field, value: value.substring(0, 50) });
      if (changeLog.length > 10) changeLog = changeLog.slice(0, 10);
      db.ref('changeLog').set(changeLog);
    }

    // ─── DYNAMIC SPELL DROPDOWN ──────────────────────────
    window.showSpellInfo = function(charKey) {
      const select = document.getElementById(`spellSelect-${charKey}`);
      const infoDiv = document.getElementById(`spellInfo-${charKey}`);
      if (!select || !infoDiv) return;
      const spellName = select.value;
      if (!spellName) { infoDiv.style.display = 'none'; return; }
      const spell = spellDatabase[spellName];
      if (!spell) { infoDiv.style.display = 'block'; infoDiv.innerHTML = '<p style="color:#a098d0;">No description available.</p>'; return; }
      infoDiv.style.display = 'block';
      infoDiv.innerHTML = `
        <strong style="color:#d4c8ff;">${spellName}</strong>
        ${spell.level !== undefined ? `<span style="color:#c8b8f0;font-size:0.7rem;margin-left:0.5rem;">Level ${spell.level} · ${spell.school || ''}</span>` : ''}
        ${spell.castingTime ? `<div><span style="color:#9088c0;">Casting:</span> ${spell.castingTime}</div>` : ''}
        ${spell.range ? `<div><span style="color:#9088c0;">Range:</span> ${spell.range}</div>` : ''}
        ${spell.duration ? `<div><span style="color:#9088c0;">Duration:</span> ${spell.duration}</div>` : ''}
        <div style="margin-top:0.3rem;color:#c0b8e8;">${spell.desc}</div>`;
    };

    window.addSpellFromDropdown = function(charKey) {
      const select = document.getElementById(`spellSelect-${charKey}`);
      if (!select || !select.value) return;
      const spellName = select.value;
      db.ref(`characters/${charKey}/spells`).once('value').then(s => {
        const cur = s.val() || [];
        if (!cur.includes(spellName)) {
          cur.push(spellName);
          return db.ref(`characters/${charKey}/spells`).set(cur);
        }
      }).then(() => {
        addToChangeLog(charKey, 'spells', `Added: ${spellName}`);
        loadDynamicLists(charKey);
        select.value = '';
        document.getElementById(`spellInfo-${charKey}`).style.display = 'none';
      });
    };

    window.addFeature = function(charKey) {
      const n = document.getElementById(`newFeatName-${charKey}`), d = document.getElementById(`newFeatDesc-${charKey}`), u = document.getElementById(`newFeatUses-${charKey}`);

    window.removeItem = function(btn, charKey, category, name) {
      if (!confirm('Remove?')) return;
      db.ref(`characters/${charKey}/${category}`).once('value').then(s => {
        const items = s.val() || [];
        return db.ref(`characters/${charKey}/${category}`).set(items.filter(i => (typeof i === 'string' ? i !== name : i.name !== name)));
      }).then(() => { addToChangeLog(charKey, category, `Removed: ${name}`); btn.closest('div, li').remove(); });
    };
    window.editItemInline = function(el, charKey, category) {
      const oldVal = el.textContent;
      el.addEventListener('blur', function h() { el.removeEventListener('blur', h);
        const newVal = el.textContent.trim() || oldVal;
        db.ref(`characters/${charKey}/${category}`).once('value').then(s => {
          const items = s.val() || [];
          return db.ref(`characters/${charKey}/${category}`).set(items.map(i => (typeof i === 'string' && i === oldVal) ? newVal : (i.name === oldVal ? {...i, name: newVal} : i)));
        });
      }, { once: true });
    };

    // ─── LOAD DYNAMIC LISTS ──────────────────────────────
    function loadDynamicLists(charKey) {
      const c = characterData[charKey];
      if (!c) return;
      db.ref(`characters/${charKey}/spells`).once('value').then(s => {
        const spells = s.val() || c.spells || [];
        if (!s.val()) db.ref(`characters/${charKey}/spells`).set(c.spells || []);
        renderList(charKey, 'spellsList', spells, false);
      });
      db.ref(`characters/${charKey}/equipment`).once('value').then(s => {
        const equip = s.val() || c.equipment || [];
        if (!s.val()) db.ref(`characters/${charKey}/equipment`).set(c.equipment || []);
        renderList(charKey, 'equipList', equip, true);
      });
      db.ref(`characters/${charKey}/customFeatures`).once('value').then(s => {
        const feats = s.val();
        if (feats && Array.isArray(feats)) renderCustomFeats(charKey, feats);
      });
    }
    function renderList(charKey, containerId, items, isEquip) {
      const container = document.getElementById(`${containerId}-${charKey}`);
      if (!container) return;
      const addForm = container.querySelector('.add-form'), dropdown = container.querySelector('.spell-dropdown-section');
      container.innerHTML = '';
      items.forEach(item => {
        const el = document.createElement(isEquip ? 'li' : 'div');
        el.style.cssText = 'display:flex;align-items:center;gap:0.3rem;padding:0.2rem 0;border-bottom:1px solid rgba(100,80,160,0.2);font-size:0.8rem;';
        el.innerHTML = `${isEquip ? '✦ ' : ''}<span class="editable-text" contenteditable="true" onblur="editItemInline(this,'${charKey}','${isEquip ? 'equipment' : 'spells'}')">${escapeHtml(item)}</span><button class="btn-remove" onclick="removeItem(this,'${charKey}','${isEquip ? 'equipment' : 'spells'}','${escapeHtml(item)}')">✕</button>`;
        container.appendChild(el);
      });
      if (dropdown) container.appendChild(dropdown);
      if (addForm) container.appendChild(addForm);
    }
    function renderCustomFeats(charKey, feats) {
      const container = document.getElementById(`featList-${charKey}`);
      if (!container) return;
      container.querySelectorAll('.custom-feature').forEach(el => el.remove());
      feats.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'ability-card custom-feature';
        div.innerHTML = `<div class="ability-name"><span class="editable-text" contenteditable="true">${escapeHtml(f.name)}</span>${f.cost ? `<span class="ability-cost">${escapeHtml(f.cost)}</span>` : ''}<button class="btn-remove" onclick="removeItem(this,'${charKey}','customFeatures','${escapeHtml(f.name)}')">✕</button></div><div class="ability-desc"><span class="editable-text" contenteditable="true">${escapeHtml(f.desc)}</span></div>${renderUsageBoxes(charKey, `custom-${i}`, f.uses, f.resetOn)}`;
        container.appendChild(div);
      });
    }

    // ─── SESSION NOTES ────────────────────────────────────
    window.addSessionNote = function() {
      const dt = document.getElementById('sessionDate'), ti = document.getElementById('sessionTitle'), nt = document.getElementById('sessionNotes');
      if (!ti?.value.trim()) return;
      const note = { id: Date.now(), date: dt?.value || new Date().toISOString().split('T')[0], title: ti.value.trim(), notes: nt?.value.trim() || '' };
      db.ref('sessionNotes').once('value').then(s => {
        const notes = s.val() || [];
        notes.push(note);
        return db.ref('sessionNotes').set(notes);
      }).then(() => { sessionNotes.push(note); renderSessionNotes(); dt.value = ''; ti.value = ''; nt.value = ''; });
    };
    window.addBulletToForm = function() {
      const nt = document.getElementById('sessionNotes');
      if (!nt) return;
      const pos = nt.selectionStart, before = nt.value.substring(0, pos), after = nt.value.substring(pos);
      nt.value = before + '\n• ' + after;
      nt.focus(); nt.selectionStart = nt.selectionEnd = pos + 3;
    };
    window.removeSessionNote = function(id) {
      if (!confirm('Delete?')) return;
      db.ref('sessionNotes').once('value').then(s => {
        const notes = s.val() || [];
        return db.ref('sessionNotes').set(notes.filter(n => n.id !== id));
      }).then(() => { sessionNotes = sessionNotes.filter(n => n.id !== id); renderSessionNotes(); });
    };
    function renderSessionNotes() {
      const container = document.getElementById('sessionNotesContainer');
      if (!container) return;
      if (sessionNotes.length === 0) { container.innerHTML = '<p style="color:#9088c0;text-align:center;">No session notes yet.</p>'; return; }
      container.innerHTML = sessionNotes.sort((a,b) => new Date(b.date) - new Date(a.date)).map(note => {
        const bullets = note.notes ? note.notes.split('\n').filter(l => l.trim()) : [];
        return `<div class="session-note-card"><div class="session-note-header"><span class="session-date">📅 ${note.date}</span><span style="color:#d4d8ff;font-weight:bold;">${escapeHtml(note.title)}</span><button class="btn-remove" onclick="removeSessionNote(${note.id})">✕</button></div>${bullets.length ? '<ul style="list-style:none;padding:0;">'+bullets.map(b => `<li style="padding:0.15rem 0;color:#c0c8e8;font-size:0.8rem;">• ${escapeHtml(b.replace(/^•\s*/,''))}</li>`).join('')+'</ul>' : '<p style="color:#9088c0;font-size:0.75rem;">No details.</p>'}</div>`;
      }).join('');
    }

    // ─── RENDER CHARACTER ────────────────────────────────

      const attacksHtml = c.attacks.map((a, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:0.3rem;border-bottom:1px solid rgba(100,80,160,0.2);flex-wrap:wrap;gap:0.2rem;font-size:0.8rem;">
          <span style="font-weight:bold;color:#d4c8ff;min-width:120px;">⚔️ ${makeEditable(a.name, `atk-name-${i}`, charKey)}</span>
          <span style="color:#c8b8f0;background:rgba(60,40,120,0.4);padding:0.1rem 0.3rem;border-radius:0.3rem;">${makeEditable(a.bonus, `atk-bonus-${i}`, charKey)}</span>
          <span style="color:#e8d8ff;">${makeEditable(a.damage, `atk-dmg-${i}`, charKey)}</span>
          <span style="color:#a098d0;font-size:0.7rem;">${makeEditable(a.notes, `atk-notes-${i}`, charKey)}</span>
        </div>`).join('');

      const featuresHtml = c.features.map((f, i) => `
        <div class="ability-card">
          <div class="ability-name">${makeEditable(f.name, `feat-name-${i}`, charKey)}${f.cost ? `<span class="ability-cost">${makeEditable(f.cost, `feat-cost-${i}`, charKey)}</span>` : ''}</div>
          <div class="ability-desc">${makeEditable(f.desc, `feat-desc-${i}`, charKey)}</div>
          ${renderUsageBoxes(charKey, i, f.uses, f.resetOn)}
        </div>`).join('');

      const skillsHtml = c.skills ? Object.entries(c.skills).map(([name, bonus]) => `
        <div class="info-item"><span class="info-label">${name}</span><span class="info-value" style="float:right;">${bonus >= 0 ? '+' + bonus : bonus}</span></div>`).join('') : '';

      const spellSlotsHtml = c.spellSlots ? Object.entries(c.spellSlots).map(([level, count]) => {
        const slotUses = count !== "∞" ? parseInt(count) || 0 : 0;
        const slotKey = `uses-${charKey}-slot-${level}`;
        let boxes = '';
        if (slotUses > 0 && slotUses <= 20) {
          let used = parseInt(localStorage.getItem(slotKey) || '0');
          for (let i = 0; i < slotUses; i++) boxes += `<span class="usage-checkbox${i < used ? ' used' : ''}" onclick="toggleUsage(this,'${slotKey}',${slotUses})"></span>`;
        }
        return `<div class="spell-slot"><div class="slot-level">${level}</div><div class="slot-count">${count}</div>${boxes ? `<div style="display:flex;gap:1px;justify-content:center;">${boxes}</div>` : ''}</div>`;
      }).join('') : '';

      // Build spell dropdown options
      const spellOptions = Object.keys(spellDatabase).map(name => `<option value="${name}">${name}</option>`).join('');

      return `<div class="char-sheet">
        <div class="sheet-section" style="${isDMPC ? 'border-color:rgba(180,160,140,0.4);' : ''}">
          <div class="section-header">
            <span>📜 ${makeEditable(c.name, 'name', charKey)} ${isDMPC ? '<span style="font-size:0.6rem;color:#d8c8a0;">[DMPC]</span>' : ''}</span>
            <div>
              <button class="btn-rest" onclick="resetAllByType('${charKey}','short')">🌅 Short</button>
              <button class="btn-rest" onclick="resetAllByType('${charKey}','long')">🌙 Long</button>
            </div>
          </div>
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Class</span><span class="info-value">${makeEditable(c.classLevel, 'classLevel', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Race</span><span class="info-value">${makeEditable(c.race, 'race', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Background</span><span class="info-value">${makeEditable(c.background, 'background', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Player</span><span class="info-value">${makeEditable(c.playerName, 'playerName', charKey)}</span></div>
          </div>
          <div style="margin-top:0.4rem;"><strong style="color:#c8b8f0;">Appearance:</strong> <span style="color:#c0b8e8;font-size:0.8rem;">${makeEditable(c.appearance, 'appearance', charKey)}</span></div>
          ${c.personality ? `<div style="margin-top:0.3rem;"><strong style="color:#c8b8f0;">Personality:</strong> <ul style="list-style:none;padding:0;color:#c0b8e8;font-size:0.8rem;">${c.personality.map(t => `<li>"${makeEditable(t, 'personality-'+Math.random(), charKey)}"</li>`).join('')}</ul></div>` : ''}
          ${c.ideal ? `<div style="margin-top:0.2rem;"><strong style="color:#c8b8f0;">Ideal:</strong> <span style="color:#c0b8e8;font-size:0.8rem;">${makeEditable(c.ideal, 'ideal', charKey)}</span></div>` : ''}
          ${c.bond ? `<div><strong style="color:#c8b8f0;">Bond:</strong> <span style="color:#c0b8e8;font-size:0.8rem;">${makeEditable(c.bond, 'bond', charKey)}</span></div>` : ''}
          ${c.flaw ? `<div><strong style="color:#c8b8f0;">Flaw:</strong> <span style="color:#c0b8e8;font-size:0.8rem;">${makeEditable(c.flaw, 'flaw', charKey)}</span></div>` : ''}
          ${isDMPC ? `<div style="margin-top:0.5rem;padding:0.5rem;background:rgba(180,160,140,0.1);border:1px solid rgba(180,160,140,0.3);border-radius:0.4rem;"><strong style="color:#d8c8a0;">DMPC Rules:</strong> <span style="color:#c0b8a0;font-size:0.75rem;">Never solves puzzles. Defers to party face. One tactical hint per combat. Never tie-breaking vote.</span></div>` : ''}
        </div>

        <div class="sheet-section"><div class="section-header">📊 ABILITY SCORES</div><div class="stat-row">${statsHtml}</div>
          <div class="info-grid" style="margin-top:0.4rem;">
            <div class="info-item"><span class="info-label">AC</span><span class="info-value">${makeEditable(c.combat.ac, 'ac', charKey)}</span></div>
            <div class="info-item"><span class="info-label">HP</span><span class="info-value">${makeEditable(c.combat.hp, 'hp', charKey)}</span></div>
            <div class="info-item"><span class="info-label">Speed</span><span class="info-value">${makeEditable(c.combat.speed, 'speed', charKey)} ft.</span></div>
            <div class="info-item"><span class="info-label">Init</span><span class="info-value">+${c.combat.initiative}</span></div>
          </div>
        </div>

        ${skillsHtml ? `<div class="sheet-section"><div class="section-header">🎯 SKILLS</div><div class="info-grid">${skillsHtml}</div></div>` : ''}

        <div class="sheet-section"><div class="section-header">⚔️ ATTACKS</div>${attacksHtml}</div>

        ${spellSlotsHtml ? `<div class="sheet-section"><div class="section-header">🔮 SPELL SLOTS</div><div class="spell-slot-grid">${spellSlotsHtml}</div></div>` : ''}

        <div class="sheet-section">
          <div class="section-header">📜 SPELLS & ABILITIES REFERENCE</div>
          <div class="spell-dropdown-section">
            <select id="spellSelect-${charKey}" onchange="showSpellInfo('${charKey}')">
              <option value="">— Select a spell/ability to view —</option>
              ${spellOptions}
            </select>
            <div id="spellInfo-${charKey}" class="spell-info-popup"></div>
            <button class="btn-add" onclick="addSpellFromDropdown('${charKey}')" style="margin-top:0.3rem;">+ Add Selected to My List</button>
          </div>
          <div id="spellsList-${charKey}" style="margin-top:0.5rem;"></div>
          <div class="add-form"><input type="text" id="newSpell-${charKey}" placeholder="Or type custom spell..."><button class="btn-add" onclick="addSpell('${charKey}')">+ Add</button></div>
        </div>

        <div class="sheet-section">
          <div class="section-header">✨ FEATURES</div>
          <div id="featList-${charKey}">${featuresHtml}</div>
          <div class="add-form">
            <input type="text" id="newFeatName-${charKey}" placeholder="Name" style="flex:1;">
            <input type="text" id="newFeatDesc-${charKey}" placeholder="Desc" style="flex:2;">
            <input type="text" id="newFeatUses-${charKey}" placeholder="Uses" style="width:50px;">
            <button class="btn-add" onclick="addFeature('${charKey}')">+ Add</button>
          </div>
        </div>

        <div class="sheet-section">
          <div class="section-header">🎒 EQUIPMENT</div>
          <ul class="equipment-list" id="equipList-${charKey}"></ul>
          <div class="add-form"><input type="text" id="newEquip-${charKey}" placeholder="Item"><button class="btn-add" onclick="addEquipment('${charKey}')">+ Add</button></div>
        </div>

        <div class="sheet-section">
          <div class="section-header">📖 BACKSTORY</div>
          <div style="color:#c0b8e8;line-height:1.5;font-style:italic;font-size:0.8rem;">${makeEditable(c.backstory, 'backstory', charKey)}</div>
        </div>
      </div>`;
    }

    function renderDMPage() {
      return `<div style="text-align:center;padding:0.5rem;">
        <h2 style="color:#d4c8ff;">🔐 DM Stargate</h2>
        <p style="color:#a098d0;">Enter PIN:</p>
        <input type="password" id="pinInput" style="background:rgba(20,15,40,0.7);border:2px solid rgba(140,120,220,0.5);color:#e8e0ff;padding:0.4rem 0.8rem;border-radius:0.3rem;font-size:1.1rem;text-align:center;letter-spacing:4px;margin:0.6rem 0;" maxlength="8">
        <br><button class="btn-rest" id="pinSubmit">Unlock</button>
        <p id="pinError" style="color:#e0a0c0;margin-top:0.4rem;"></p>
        <div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:1rem;">
          <div class="section-header" style="color:#d4c8ff;">🗝️ CHARACTER SECRETS</div>
          ${Object.entries(dmSecrets).map(([k, s]) => `<div style="border:2px dashed rgba(140,120,220,0.5);background:rgba(20,15,35,0.6);padding:0.6rem;border-radius:0.5rem;margin:0.5rem 0;"><div style="color:#d4c8ff;font-weight:bold;">${characterData[k]?.name || k}</div><div style="color:#c8b8f0;font-size:0.8rem;line-height:1.4;">${s}</div></div>`).join('')}
          <div class="section-header" style="color:#d4c8ff;margin-top:1rem;">📋 CHANGE LOG</div>
          <div class="change-log" id="changeLogContainer"><p style="color:#9088c0;">Loading...</p></div>
          <div class="section-header" style="color:#d4c8ff;margin-top:1rem;">📝 SESSION NOTES</div>
          <div style="border:2px dashed rgba(140,160,200,0.4);border-radius:0.6rem;padding:0.8rem;margin:0.5rem 0;background:rgba(18,20,35,0.5);">
            <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.4rem;">
              <div style="flex:1;"><label style="color:#a0b0d0;font-size:0.7rem;text-transform:uppercase;">Date</label><input type="date" id="sessionDate" style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;border-radius:0.25rem;font-family:inherit;margin-top:0.15rem;"></div>
              <div style="flex:2;"><label style="color:#a0b0d0;font-size:0.7rem;text-transform:uppercase;">Title</label><input type="text" id="sessionTitle" placeholder="Session title..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.3rem;border-radius:0.25rem;font-family:inherit;margin-top:0.15rem;"></div>
            </div>
            <div><button class="btn-sm" onclick="addBulletToForm()">• +</button> <span style="font-size:0.65rem;color:#9088c0;">Add bullets</span>
            <textarea id="sessionNotes" rows="4" placeholder="• Notes..." style="width:100%;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.4);color:#e8e0ff;padding:0.4rem;border-radius:0.25rem;font-family:inherit;font-size:0.8rem;resize:vertical;margin-top:0.2rem;"></textarea></div>
            <button class="btn-add" onclick="addSessionNote()" style="width:100%;margin-top:0.3rem;">+ Save Session Note</button>
          </div>
          <div id="sessionNotesContainer"><p style="color:#9088c0;text-align:center;">Loading...</p></div>
        </div>
      </div>`;
    }

    function renderChangeLog() {
      const c = document.getElementById('changeLogContainer');
      if (!c) return;
      c.innerHTML = changeLog.length === 0 ? '<p style="color:#9088c0;">No changes yet.</p>' : changeLog.map(e => `<div class="log-entry">[${e.time}] <strong>${e.char}</strong> · ${e.field}: ${e.value}</div>`).join('');
    }

    // ─── TAB SWITCHING ───────────────────────────────────
    function setActiveTab(tabId) {
      ['dmpc','drunken','chronurgy','grave','psi','dm'].forEach(id => {
        const btn = document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1));
        if (btn) btn.classList.remove('active');
      });
      const btn = document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1));
      if (btn) btn.classList.add('active');
    }

    function switchTab(tabId) {
      Object.values(autoSaveTimers).forEach(t => clearTimeout(t));
      currentTab = tabId; setActiveTab(tabId);
      if (tabId === 'dm') {
        dmAuthenticated = false; contentPanel.innerHTML = renderDMPage();
        document.getElementById('pinSubmit').addEventListener('click', () => {
          if (document.getElementById('pinInput').value === DM_PIN) {
            dmAuthenticated = true;
            document.getElementById('dmSecretsContainer').style.display = 'block';
            db.ref('changeLog').once('value').then(s => { changeLog = s.val() || []; renderChangeLog(); });
            db.ref('sessionNotes').once('value').then(s => { sessionNotes = s.val() || []; renderSessionNotes(); });
          }
        });
      } else {
        contentPanel.innerHTML = renderCharacterSheet(tabId);
        setTimeout(() => loadDynamicLists(tabId), 100);
        dmAuthenticated = false;
      }
    }

    document.getElementById('tabDmpc').addEventListener('click', () => switchTab('dmpc'));
    document.getElementById('tabDrunken').addEventListener('click', () => switchTab('drunken'));
    document.getElementById('tabChronurgy').addEventListener('click', () => switchTab('chronurgy'));
    document.getElementById('tabGrave').addEventListener('click', () => switchTab('grave'));
    document.getElementById('tabPsi').addEventListener('click', () => switchTab('psi'));
    document.getElementById('tabDM').addEventListener('click', () => switchTab('dm'));

    db.ref('changeLog').once('value').then(s => { changeLog = s.val() || []; });
    switchTab('dmpc');
  })();
</script>
</body>
</html>
