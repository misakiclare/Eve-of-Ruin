          CHA: { score: 8, mod: -1, save: 3 }
        },
        combat: { ac: 19, hp: 84, speed: 30, initiative: 0, hitDice: "10d10", proficiency: 4 },
        attacks: [
          { name: "Longsword", bonus: "+7", damage: "1d8+5 slashing", notes: "+2 Dueling" }
        ],
        skills: { Athletics: 7, Perception: 4, History: 6 },
        features: [
          { name: "Psionic Power (6 dice)", desc: "6 Psionic Energy dice (d8), recharge on long rest.", cost: "6 dice / long rest", uses: 6 },
          { name: "Action Surge", desc: "Take an additional action.", cost: "1 / short rest", uses: 1 }
        ],
        spellSlots: null,
        spells: [],
        equipment: ["Plate armor", "Longsword", "Heavy crossbow", "Silver cube"],
        backstory: "Seven words carved into your forearm: 'THE ROD IS NOT A WEAPON. IT IS A CAGE.'"
      }
    };

    const dmSecrets = {
      drunken: "The Monastery was erased by a Rod fragment. Kaelen is the only survivor.",
      chronurgy: "Vesper's future self is assembling the Rod.",
      grave: "You were a Wind Duke scholar who helped design the Rod.",
      psi: "You are a sleeper agent for General Zor-Ashkev."
    };

    // ─── HELPERS ──────────────────────────────────────────
    function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function makeEditable(value, fieldKey, charKey, tag = 'span', className = '') {
      const uniqueId = `editable-${charKey}-${fieldKey}-${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
      const escaped = escapeHtml(String(value));
      if (tag === 'input') {
        return `<span class="editable-field"><input type="text" id="${uniqueId}" class="editable-text ${className}" value="${escaped}" data-field="${fieldKey}" data-char="${charKey}"><button class="pencil-btn" onclick="toggleEditField('${uniqueId}')" title="Edit">✎</button></span>`;
      }
      return `<span class="editable-field"><span id="${uniqueId}" class="editable-text ${className}" contenteditable="false" data-field="${fieldKey}" data-char="${charKey}">${escaped}</span><button class="pencil-btn" onclick="toggleEditField('${uniqueId}')" title="Edit">✎</button></span>`;
    }

    window.toggleEditField = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.contentEditable === 'true' || (el.tagName === 'INPUT' && !el.readOnly)) {
        if (el.tagName === 'INPUT') { el.readOnly = true; el.style.border = '1px solid transparent'; }
        else { el.contentEditable = 'false'; el.style.border = '1px solid transparent'; el.style.background = 'transparent'; }
      } else {
        if (el.tagName === 'INPUT') { el.readOnly = false; el.style.border = '1px solid rgba(160,140,220,0.6)'; el.focus(); }
        else { el.contentEditable = 'true'; el.style.border = '1px solid rgba(160,140,220,0.6)'; el.style.background = 'rgba(120,100,180,0.15)'; el.focus(); }
      }
    };

    // ─── USAGE CHECKBOX LOGIC ────────────────────────────
    function renderUsageCheckboxes(charKey, featureIndex, maxUses) {
      if (maxUses === "∞" || maxUses === "Passive" || !maxUses || maxUses === 0) return '';
      const num = parseInt(maxUses);
      if (isNaN(num) || num <= 0 || num > 20) return '';
      
      const storageKey = `uses-${charKey}-feat-${featureIndex}`;
      let usedCount = parseInt(localStorage.getItem(storageKey) || '0');
      if (usedCount > num) usedCount = num;
      
      let checkboxes = '';
      for (let i = 0; i < num; i++) {
        const checked = i < usedCount ? ' used' : '';
        checkboxes += `<span class="usage-checkbox${checked}" onclick="toggleUsageCheckbox(this, '${storageKey}', ${i}, ${num})" title="Use ${i+1}"></span>`;
      }
      
      return `
        <div class="usage-tracker" style="margin-top:0.3rem;">
          <span class="usage-label">Used:</span>
          <div class="usage-checkboxes">${checkboxes}</div>
          <button class="btn-reset-uses" onclick="resetUsage('${storageKey}', ${num}, this)" title="Reset all uses">↺</button>
        </div>`;
    }

    window.toggleUsageCheckbox = function(el, storageKey, index, maxUses) {
      el.classList.toggle('used');
      const allBoxes = el.parentElement.querySelectorAll('.usage-checkbox');
      let usedCount = 0;
      allBoxes.forEach(b => { if (b.classList.contains('used')) usedCount++; });
      localStorage.setItem(storageKey, usedCount);
    };

    window.resetUsage = function(storageKey, maxUses, btn) {
      localStorage.setItem(storageKey, '0');
      const container = btn.parentElement;
      const boxes = container.querySelectorAll('.usage-checkbox');
      boxes.forEach(b => b.classList.remove('used'));
    };

    // ─── ADD FUNCTIONS (only save the new item, not everything) ──
    window.addSpell = function(charKey) {
      const input = document.getElementById(`newSpell-${charKey}`);
      if (!input || !input.value.trim()) return;
      const spellName = input.value.trim();
      
      // Save ONLY this new spell to Firebase
      db.ref(`characters/${charKey}/spells`).once('value').then(snapshot => {
        const currentSpells = snapshot.val() || [];
        currentSpells.push(spellName);
        return db.ref(`characters/${charKey}/spells`).set(currentSpells);
      }).then(() => {
        // Update the UI
        const spellsList = document.getElementById(`spellsList-${charKey}`);
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid rgba(100,80,160,0.2);';
        div.innerHTML = `
          <span class="editable-text" contenteditable="true" style="flex:1;">${escapeHtml(spellName)}</span>
          <button class="pencil-btn" onclick="editDynamicItem(this, '${charKey}', 'spells')">✎</button>
          <button class="btn-remove" onclick="removeDynamicItem(this, '${charKey}', 'spells', '${escapeHtml(spellName)}')">✕</button>`;
        spellsList.appendChild(div);
        input.value = '';
      });
    };

    window.addEquipment = function(charKey) {
      const input = document.getElementById(`newEquip-${charKey}`);
      if (!input || !input.value.trim()) return;
      const itemName = input.value.trim();
      
      db.ref(`characters/${charKey}/equipment`).once('value').then(snapshot => {
        const currentEquip = snapshot.val() || [];
        currentEquip.push(itemName);
        return db.ref(`characters/${charKey}/equipment`).set(currentEquip);
      }).then(() => {
        const equipList = document.getElementById(`equipList-${charKey}`);
        const li = document.createElement('li');
        li.style.cssText = 'display:flex;align-items:center;gap:0.5rem;';
        li.innerHTML = `
          <span class="editable-text" contenteditable="true" style="flex:1;">✦ ${escapeHtml(itemName)}</span>
          <button class="pencil-btn" onclick="editDynamicItem(this, '${charKey}', 'equipment')">✎</button>
          <button class="btn-remove" onclick="removeDynamicItem(this, '${charKey}', 'equipment', '${escapeHtml(itemName)}')">✕</button>`;
        equipList.appendChild(li);
        input.value = '';
      });
    };

    window.addFeature = function(charKey) {
      const nameInput = document.getElementById(`newFeatName-${charKey}`);
      const descInput = document.getElementById(`newFeatDesc-${charKey}`);
      const usesInput = document.getElementById(`newFeatUses-${charKey}`);
      if (!nameInput || !nameInput.value.trim()) return;
      
      const newFeature = {
        name: nameInput.value.trim(),
        desc: descInput.value.trim() || 'New ability',
        cost: usesInput.value.trim() || 'Passive',
        uses: usesInput.value.trim() || 0
      };
      
      db.ref(`characters/${charKey}/customFeatures`).once('value').then(snapshot => {
        const currentFeatures = snapshot.val() || [];
        currentFeatures.push(newFeature);
        return db.ref(`characters/${charKey}/customFeatures`).set(currentFeatures);
      }).then(() => {
        const featList = document.getElementById(`featList-${charKey}`);
        const div = document.createElement('div');
        div.className = 'ability-card';
        div.innerHTML = `
          <div class="ability-name">
            <span class="editable-text" contenteditable="true">${escapeHtml(newFeature.name)}</span>
            ${newFeature.cost ? `<span class="ability-cost">${escapeHtml(newFeature.cost)}</span>` : ''}
            <button class="btn-remove" onclick="removeDynamicItem(this, '${charKey}', 'customFeatures', '${escapeHtml(newFeature.name)}')">✕</button>
          </div>
          <div class="ability-desc">
            <span class="editable-text" contenteditable="true">${escapeHtml(newFeature.desc)}</span>
          </div>
          ${renderUsageCheckboxes(charKey, Date.now(), newFeature.uses)}`;
        featList.appendChild(div);
        nameInput.value = '';
        descInput.value = '';
        usesInput.value = '';
      });
    };

    // ─── REMOVE FUNCTIONS (only remove the one item) ─────
    window.removeDynamicItem = function(btn, charKey, category, itemName) {
      if (!confirm('Remove this item?')) return;
      
      db.ref(`characters/${charKey}/${category}`).once('value').then(snapshot => {
        const items = snapshot.val() || [];
        const filtered = items.filter(item => {
          if (typeof item === 'string') return item !== itemName;
          if (typeof item === 'object') return item.name !== itemName;
          return true;
        });
        return db.ref(`characters/${charKey}/${category}`).set(filtered);
      }).then(() => {
        btn.closest('div, li').remove();
      });
    };

    // ─── EDIT DYNAMIC ITEM ───────────────────────────────
    window.editDynamicItem = function(btn, charKey, category) {
      const textEl = btn.parentElement.querySelector('.editable-text');
      if (!textEl) return;
      
      const oldValue = textEl.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = oldValue;
      input.style.cssText = 'flex:1;background:rgba(20,15,40,0.7);border:1px solid rgba(140,120,220,0.6);color:#e8e0ff;padding:0.3rem;border-radius:0.3rem;font-family:inherit;';
      
      textEl.replaceWith(input);
      input.focus();
      
      input.addEventListener('blur', () => {
        const newValue = input.value.trim() || oldValue;
        const newSpan = document.createElement('span');
        newSpan.className = 'editable-text';
        newSpan.contentEditable = 'true';
        newSpan.textContent = newValue;
        newSpan.style.flex = '1';
        input.replaceWith(newSpan);
        
        // Update in Firebase
        updateDynamicItemInFirebase(charKey, category, oldValue, newValue);
      });
      
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') input.blur();
      });
    };

    function updateDynamicItemInFirebase(charKey, category, oldValue, newValue) {
      db.ref(`characters/${charKey}/${category}`).once('value').then(snapshot => {
        const items = snapshot.val() || [];
        const updated = items.map(item => {
          if (typeof item === 'string' && item === oldValue) return newValue;
          if (typeof item === 'object' && item.name === oldValue) {
            return { ...item, name: newValue };
          }
          return item;
        });
        return db.ref(`characters/${charKey}/${category}`).set(updated);
      });
    }

    // ─── SAVE EDITS (only editable fields, not lists) ────
    window.saveAllEdits = function(charKey) {
      const editables = document.querySelectorAll(`[data-char="${charKey}"][data-field]`);
      const updates = {};
      editables.forEach(el => {
        const field = el.getAttribute('data-field');
        if (field) {
          updates[field] = el.tagName === 'INPUT' ? el.value : el.textContent;
        }
      });
      
      // Update only the specific fields that changed
      Object.entries(updates).forEach(([field, value]) => {
        db.ref(`characters/${charKey}/${field}`).set(value);
      });
      
      alert('Edits saved! ✦');
    };

    // ─── LOAD DYNAMIC LISTS ──────────────────────────────
    function loadDynamicLists(charKey) {
      // Load spells
      db.ref(`characters/${charKey}/spells`).once('value').then(snapshot => {
        const spells = snapshot.val();
        const container = document.getElementById(`spellsList-${charKey}`);
        if (!container) return;
        
        // Keep only the add-form at the bottom
        const addForm = container.querySelector('.add-form');
        container.innerHTML = '';
        
        if (spells && Array.isArray(spells)) {
          spells.forEach(spell => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;border-bottom:1px solid rgba(100,80,160,0.2);';
            div.innerHTML = `
              <span class="editable-text" contenteditable="true" style="flex:1;">${escapeHtml(spell)}</span>
              <button class="pencil-btn" onclick="editDynamicItem(this, '${charKey}', 'spells')">✎</button>
              <button class="btn-remove" onclick="removeDynamicItem(this, '${charKey}', 'spells', '${escapeHtml(spell)}')">✕</button>`;
            container.appendChild(div);
          });
        }
        if (addForm) container.appendChild(addForm);
      });
      
      // Load equipment
      db.ref(`characters/${charKey}/equipment`).once('value').then(snapshot => {
        const equip = snapshot.val();
        const container = document.getElementById(`equipList-${charKey}`);
        if (!container) return;
        
        const addForm = container.querySelector('.add-form');
        container.innerHTML = '';
        
        if (equip && Array.isArray(equip)) {
          equip.forEach(item => {
            const li = document.createElement('li');
            li.style.cssText = 'display:flex;align-items:center;gap:0.5rem;';
            li.innerHTML = `
              <span class="editable-text" contenteditable="true" style="flex:1;">✦ ${escapeHtml(item)}</span>
              <button class="pencil-btn" onclick="editDynamicItem(this, '${charKey}', 'equipment')">✎</button>
              <button class="btn-remove" onclick="removeDynamicItem(this, '${charKey}', 'equipment', '${escapeHtml(item)}')">✕</button>`;
            container.appendChild(li);
          });
        }
        if (addForm) container.appendChild(addForm);
      });
      
      // Load custom features
      db.ref(`characters/${charKey}/customFeatures`).once('value').then(snapshot => {
        const features = snapshot.val();
        const container = document.getElementById(`featList-${charKey}`);
        if (!container) return;
        
        // Remove only custom features, keep originals
        container.querySelectorAll('.custom-feature').forEach(el => el.remove());
        
        if (features && Array.isArray(features)) {
          features.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'ability-card custom-feature';
            div.innerHTML = `
              <div class="ability-name">
                <span class="editable-text" contenteditable="true">${escapeHtml(f.name)}</span>
                ${f.cost ? `<span class="ability-cost">${escapeHtml(f.cost)}</span>` : ''}
                <button class="btn-remove" onclick="removeDynamicItem(this, '${charKey}', 'customFeatures', '${escapeHtml(f.name)}')">✕</button>
              </div>
              <div class="ability-desc">
                <span class="editable-text" contenteditable="true">${escapeHtml(f.desc)}</span>
              </div>
              ${renderUsageCheckboxes(charKey, `custom-${i}`, f.uses)}`;
            container.appendChild(div);
          });
        }
      });
    }

    // ─── RENDER CHARACTER SHEET ──────────────────────────
    function renderCharacterSheet(charKey) {
      const c = characterData[charKey];
      if (!c) return '<p style="color:#c8b8f0;">Character not found.</p>';

      const statsHtml = Object.entries(c.stats).map(([name, data]) => {
        const modStr = data.mod >= 0 ? `+${data.mod}` : `${data.mod}`;
        const saveStr = data.save >= 0 ? `+${data.save}` : `${data.save}`;
        return `<div class="stat-box">
          <div class="stat-label">${name}</div>
          <div class="stat-value">${makeEditable(data.score, `stat-${name}-score`, charKey)}</div>
          <span class="stat-mod">${modStr}</span>
          <div style="font-size:0.7rem;color:#9088c0;margin-top:0.2rem;">Save ${saveStr}</div>
        </div>`;
      }).join('');

      const attacksHtml = c.attacks.map((a, i) => `
        <div class="attack-row">
          <span class="attack-name">⚔️ ${makeEditable(a.name, `atk-name-${i}`, charKey)}</span>
          <span class="attack-bonus">${makeEditable(a.bonus, `atk-bonus-${i}`, charKey)}</span>
          <span class="attack-damage">${makeEditable(a.damage, `atk-dmg-${i}`, charKey)}</span>
          <span style="color:#a098d0;font-size:0.8rem;">${makeEditable(a.notes, `atk-notes-${i}`, charKey)}</span>
        </div>`).join('');

      const featuresHtml = c.features.map((f, i) => `
        <div class="ability-card">
          <div class="ability-name">
            ${makeEditable(f.name, `feat-name-${i}`, charKey)}
            ${f.cost ? `<span class="ability-cost">${makeEditable(f.cost, `feat-cost-${i}`, charKey)}</span>` : ''}
          </div>
          <div class="ability-desc">${makeEditable(f.desc, `feat-desc-${i}`, charKey)}</div>
          ${renderUsageCheckboxes(charKey, i, f.uses)}
        </div>`).join('');

      const skillsHtml = c.skills ? Object.entries(c.skills).map(([name, bonus]) => {
        const bonusStr = bonus >= 0 ? `+${bonus}` : `${bonus}`;
        return `<div class="info-item"><span class="info-label">${name}</span><span class="info-value" style="float:right;">${bonusStr}</span></div>`;
      }).join('') : '';

      return `
        <div class="char-sheet">
          <div class="sheet-section">
            <div class="section-header"><span>📜 CHARACTER SHEET</span></div>
            <div class="field-group"><span class="field-label">Name:</span>${makeEditable(c.name, 'name', charKey)}</div>
            <div class="info-grid" style="margin-top:0.5rem;">
              <div class="info-item"><span class="info-label">Class</span><span class="info-value">${makeEditable(c.classLevel, 'classLevel', charKey)}</span></div>
              <div class="info-item"><span class="info-label">Race</span><span class="info-value">${makeEditable(c.race, 'race', charKey)}</span></div>
              <div class="info-item"><span class="info-label">Player</span><span class="info-value">${makeEditable(c.playerName, 'playerName', charKey, 'input', '')}</span></div>
            </div>
          </div>

          <div class="sheet-section">
            <div class="section-header">📊 ABILITY SCORES</div>
            <div class="stat-row">${statsHtml}</div>
            <div class="info-grid" style="margin-top:0.8rem;">
              <div class="info-item"><span class="info-label">AC</span><span class="info-value">${makeEditable(c.combat.ac, 'ac', charKey)}</span></div>
              <div class="info-item"><span class="info-label">HP</span><span class="info-value">${makeEditable(c.combat.hp, 'hp', charKey)}</span></div>
              <div class="info-item"><span class="info-label">Speed</span><span class="info-value">${makeEditable(c.combat.speed, 'speed', charKey)} ft.</span></div>
            </div>
          </div>

          ${skillsHtml ? `<div class="sheet-section"><div class="section-header">🎯 SKILLS</div><div class="info-grid">${skillsHtml}</div></div>` : ''}

          <div class="sheet-section">
            <div class="section-header">⚔️ ATTACKS</div>
            ${attacksHtml}
          </div>

          <div class="sheet-section">
            <div class="section-header">
              <span>📜 SPELLS</span>
            </div>
            <div id="spellsList-${charKey}"></div>
            <div class="add-form">
              <input type="text" id="newSpell-${charKey}" placeholder="Spell name (e.g., Fireball 3rd)">
              <button class="btn-add" onclick="addSpell('${charKey}')">+ Add Spell</button>
            </div>
          </div>

          <div class="sheet-section">
            <div class="section-header">
              <span>✨ FEATURES & ABILITIES</span>
            </div>
            <div id="featList-${charKey}">${featuresHtml}</div>
            <div class="add-form">
              <input type="text" id="newFeatName-${charKey}" placeholder="Ability name" style="flex:1;">
              <input type="text" id="newFeatDesc-${charKey}" placeholder="Description" style="flex:2;">
              <input type="text" id="newFeatUses-${charKey}" placeholder="Uses (number or ∞)" style="width:80px;">
              <button class="btn-add" onclick="addFeature('${charKey}')">+ Add Ability</button>
            </div>
          </div>

          <div class="sheet-section">
            <div class="section-header">
              <span>🎒 EQUIPMENT</span>
            </div>
            <ul class="equipment-list" id="equipList-${charKey}"></ul>
            <div class="add-form">
              <input type="text" id="newEquip-${charKey}" placeholder="Item name">
              <button class="btn-add" onclick="addEquipment('${charKey}')">+ Add Item</button>
            </div>
          </div>

          <div class="sheet-section">
            <div class="section-header">📖 BACKSTORY</div>
            <div style="color:#c0b8e8;line-height:1.7;font-style:italic;">${makeEditable(c.backstory, 'backstory', charKey)}</div>
          </div>

          <div style="text-align:center;margin-top:0.5rem;">
            <button class="btn-save" onclick="saveAllEdits('${charKey}')">💾 Save Edits</button>
            <span style="color:#a098d0;font-size:0.8rem;margin-left:1rem;">Click ✎ to edit · + Add to create new</span>
          </div>
        </div>`;
    }

    // ─── DM PAGE ─────────────────────────────────────────
    function renderDMPage() {
      return `
        <div class="dm-pin-section">
          <h2 style="color:#d4c8ff;">🔐 DM Stargate</h2>
          <p style="color:#a098d0;">Enter the cosmic PIN to reveal secrets</p>
          <input type="password" id="pinInput" class="dm-pin-input" placeholder="****" maxlength="8">
          <br>
          <button class="btn-save" id="pinSubmit" style="margin-top:1rem;">Unlock</button>
          <p id="pinError" style="color:#e0a0c0;margin-top:1rem;"></p>
          <div id="dmSecretsContainer" style="display:none;text-align:left;margin-top:2rem;">
            <div class="section-header" style="color:#d4c8ff;">🗝️ CHARACTER SECRETS</div>
            ${Object.entries(dmSecrets).map(([key, secret]) => `
              <div class="secret-box">
                <div class="secret-label">${characterData[key]?.name || key}</div>
                <div class="secret-text">${secret}</div>
              </div>`).join('')}
          </div>
        </div>`;
    }

    // ─── TAB SWITCHING ───────────────────────────────────
    function setActiveTab(tabId) {
      ['drunken','chronurgy','grave','psi','dm'].forEach(id => {
        const btn = document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1));
        if (btn) btn.classList.remove('active');
      });
      const activeBtn = document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1));
      if (activeBtn) activeBtn.classList.add('active');
    }

    function switchTab(tabId) {
      detachListener();
      currentTab = tabId;
      setActiveTab(tabId);
      if (tabId === 'dm') {
        dmAuthenticated = false;
        contentPanel.innerHTML = renderDMPage();
        document.getElementById('pinSubmit').addEventListener('click', () => {
          if (document.getElementById('pinInput').value === DM_PIN) {
            dmAuthenticated = true;
            document.getElementById('dmSecretsContainer').style.display = 'block';
            document.getElementById('pinError').innerText = '';
          } else {
            document.getElementById('pinError').innerText = 'Incorrect PIN.';
            document.getElementById('dmSecretsContainer').style.display = 'none';
          }
        });
      } else {
        contentPanel.innerHTML = renderCharacterSheet(tabId);
        setTimeout(() => loadDynamicLists(tabId), 100);
        dmAuthenticated = false;
      }
    }

    document.getElementById('tabDrunken').addEventListener('click', () => switchTab('drunken'));
    document.getElementById('tabChronurgy').addEventListener('click', () => switchTab('chronurgy'));
    document.getElementById('tabGrave').addEventListener('click', () => switchTab('grave'));
    document.getElementById('tabPsi').addEventListener('click', () => switchTab('psi'));
    document.getElementById('tabDM').addEventListener('click', () => switchTab('dm'));

    switchTab('drunken');
  })();
</script>
</body>
</html>
